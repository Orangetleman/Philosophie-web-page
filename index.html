liberte:{c:"#D4537E",l:"Liberté",s:"Sommes-nous vraiment libres ?",
def:"La <span class='kw'>liberté</span> peut être négative (absence de contraintes), positive (capacité d'agir selon sa raison) ou politique (participation à la loi commune). Enjeu : la liberté est-elle compatible avec le déterminisme ? Avec la morale ? Avec l'État ? Est-elle donnée ou conquise ?<details><summary>Approfondir la notion</summary><div class='def-sec'><div class='def-sec-title'>Trois conceptions classiques</div><div class='def-sec-body'><strong>Liberté négative</strong> (Isaiah Berlin) : absence d'obstacles, de contraintes extérieures — « être libre de ». Mill : la seule limite légitime à la liberté est la nuisance à autrui. <strong>Liberté positive</strong> : capacité d'agir selon sa propre raison, autonomie — « être libre pour ». Kant : l'autonomie morale (se donner sa propre loi) est la vraie liberté. <strong>Liberté politique</strong> : participation à la loi commune (Rousseau : l'obéissance à la loi qu'on s'est prescrite est liberté).</div></div><div class='def-sec'><div class='def-sec-title'>Déterminisme et libre arbitre</div><div class='def-sec-body'>D'Holbach : déterminisme radical — tout est causé, la liberté est une illusion née de l'ignorance de nos causes. Spinoza : le libre arbitre est une illusion, mais la vraie liberté est d'agir selon sa nature rationnelle (nécessité comprise). Freud : l'inconscient détermine nos actes à notre insu. Sartre : l'homme est « condamné à être libre » — l'existence précède l'essence, la mauvaise foi consiste à se croire déterminé.</div></div><div class='def-sec'><div class='def-sec-title'>Liberté et connaissance</div><div class='def-sec-body'>Spinoza : « La liberté n'est pas l'indépendance mais la nécessité comprise. » Engels (<em>Anti-Dühring</em>) : la liberté consiste dans l'empire sur nous-mêmes fondé sur la connaissance des nécessités naturelles — « on ne peut commander à la nature qu'en lui obéissant ». Bourdieu : connaître les déterminismes sociaux qui nous conditionnent est la condition d'une liberté effective. La cure psychanalytique vise le même objectif.</div></div><div class='def-sec'><div class='def-sec-title'>Liberté civile et État de droit</div><div class='def-sec-body'>Hobbes : la liberté civile (limitée par la loi) est préférable à la liberté naturelle (totale mais infructueuse dans l'état de guerre). Montesquieu : « La liberté ne peut consister qu'à faire ce que les lois permettent. » Tocqueville : le despotisme doux menace les démocraties modernes — la liberté exige la vigilance active des citoyens et leur participation à la vie politique.</div></div></details>",
auteurs:[
{n:"Kant",w:"Fondements de la métaphysique des mœurs, 1785",i:"Liberté = autonomie : se donner sa propre loi. L'hétéronomie (obéir aux désirs, au bonheur, à une autorité) n'est pas la vraie liberté. L'homme est libre dans l'ordre noumènal (raison), déterminé dans le phénoménal (nature).",q:"'L'autonomie de la volonté est le principe suprême de la moralité'"},
{n:"Sartre",w:"L'Être et le Néant, 1943",i:"Condamné à être libre : l'homme n'a pas de nature préalable, il se définit par ses actes. La mauvaise foi = se prendre pour une chose déterminée pour fuir l'angoisse de la liberté. L'existence précède l'essence.",q:"'Je suis condamné à être libre'"},
{n:"Spinoza",w:"Éthique, 1677",i:"La liberté n'est pas le libre arbitre mais la nécessité comprise. L'homme libre agit selon sa nature propre (raison), non par contrainte externe. Pas de liberté contre la nécessité, mais dans la nécessité.",q:"'Est libre la chose qui existe par la seule nécessité de sa nature'"},
{n:"Rousseau",w:"Du Contrat social, 1762",i:"Liberté naturelle (illimitée mais solitaire) vs liberté civile (limitée mais garantie par la loi). 'L'obéissance à la loi qu'on s'est prescrite est liberté.' La liberté civile est plus haute que la liberté naturelle.",q:"'L'obéissance à la loi qu'on s'est prescrite est liberté'"},
{n:"Mill",w:"De la liberté, 1859",i:"Principe de non-nuisance : la seule limite légitime à la liberté individuelle est la nuisance à autrui. Liberté d'expression, de pensée, d'association sont absolues. Critique du despotisme de la majorité.",q:"'Le seul but légitime pour lequel on peut restreindre la liberté, c'est la protection d'autrui'"},
{n:"Freud",w:"Malaise dans la civilisation, 1930",i:"La liberté est limitée par les pulsions inconscientes et les contraintes de la civilisation. Le sentiment de liberté est en partie illusoire : des forces inconscientes orientent nos choix à notre insu.",q:"L'inconscient limite notre sentiment de liberté"},
{n:"D'Holbach",w:"Système de la nature, 1770",i:"Déterminisme physique radical : l'homme ne fait jamais que ce que la nature le détermine à faire. Nous croyons être libres parce que nous ignorons les causes qui nous meuvent. 'C'est la grande complication de nos mouvements [...] qui nous persuadent que nous sommes libres.' La liberté de l'homme est une illusion née de son ignorance.",q:"'L'homme ne fait jamais que ce que nature le détermine à faire'"},
{n:"Épictète",w:"Manuel (Ier-IIe s. ap. J.-C.)",i:"La vraie liberté est intérieure : distinguer ce qui dépend de nous (représentations, jugements, désirs) de ce qui n'en dépend pas (corps, richesse, réputation). La liberté stoïcienne = empire du sage sur ses propres représentations. Accepter ce qu'on ne peut changer, maîtriser ce qu'on peut.",q:"'Cherche non que les choses qui arrivent arrivent comme tu veux, mais désire que les choses qui arrivent soient comme elles sont'"},
{n:"Tocqueville",w:"De la démocratie en Amérique, 1840",i:"La démocratie peut dériver vers un despotisme doux et tutélaire si les citoyens sont passifs. L'État bienveillant prend tout en charge, réduisant les citoyens à un troupeau timide et industrieux. La vigilance active des citoyens envers leurs représentants est la condition de la liberté civile.",q:"'La démocratie peut dégénérer en despotisme doux si les citoyens abdiquent leur vigilance'"},
{new:true,n:"Sartre",w:"L'Existentialisme est un humanisme, 1945",i:"Thèse centrale : l'existence précède l'essence — l'homme n'a pas de nature prédéfinie, il se définit uniquement par ses actes. La liberté est totale et inévitable : 'L'homme est condamné à être libre.' Chaque acte engage une image de l'humanité entière : 'En me choisissant, je choisis l'homme.' La lâcheté est un choix répété (mauvaise foi), pas un tempérament. L'homme n'est rien d'autre que l'ensemble de ses actes.",q:"'L'existence précède l'essence' — 'L'homme est condamné à être libre'"},
{new:true,n:"Bourdieu",w:"Leçon sur la leçon, 1982",i:"La connaissance sociologique est libératrice : connaître les mécanismes de la reproduction sociale permet de les maîtriser et d'y introduire des éléments modificateurs. La violence symbolique tire son efficacité de la méconnaissance — la connaissance la désamorce. Bourdieu répond à Sartre : la liberté n'est pas pure spontanéité, elle est conditionnée par des structures sociales, mais leur connaissance ouvre un espace de liberté réelle.",q:"La connaissance des déterminismes sociaux est la condition d'une liberté effective"},
{new:true,n:"Engels",w:"Anti-Dühring, 1878",i:"La liberté n'est pas indépendance des lois naturelles mais connaissance de ces lois et capacité à les mettre en œuvre méthodiquement. L'arbitraire apparent (choisir sans comprendre) est non-liberté ; la nécessité comprise (agir en connaissance de cause) est vraie liberté. 'La liberté consiste dans l'empire sur nous-mêmes et sur la nature extérieure, fondée sur la connaissance des nécessités naturelles.'",q:"'La liberté consiste dans la connaissance des nécessités naturelles et la capacité à les utiliser'"},
],
textes:[
{n:"Kant — autonomie vs hétéronomie",t:"Hétéronomie : obéir à ses désirs, à la recherche du bonheur, à une autorité externe. Autonomie : obéir à la loi que la raison se donne à elle-même. Seule l'autonomie est vraie liberté morale."},
{n:"Sartre — mauvaise foi",t:"Le garçon de café joue à être garçon de café : en adoptant parfaitement son rôle, il nie sa liberté (être-en-soi). La mauvaise foi est une fuite de l'angoisse de la liberté."},
{n:"Rousseau — liberté civile et loi",t:"En entrant dans la société, on aliène la liberté naturelle mais on gagne la liberté civile et morale. La loi juste est celle qu'on s'est donnée à soi-même (volonté générale). 'L'obéissance à la loi qu'on s'est prescrite est liberté.'"},
{n:"Spinoza — nécessité et liberté",t:"Le libre arbitre est une illusion : tout a une cause. Mais agir librement = agir selon sa nature propre (raison), non sous contrainte externe. La connaissance des causes libère."},
{n:"Sartre, L'existentialisme est un humanisme — extrait 3 (cours p.96)",t:"Responsabilité universelle : en choisissant pour moi, je choisis pour l'humanité entière. 'En me choisissant, je choisis l'humanité entière.' La mauvaise foi (le lâche) : c'est une lâcheté construite par ses actes, non une nature. Existence précède l'essence."},
{n:"D'Holbach, Système de la nature (cours p.118)",t:"Déterminisme physique : 'C'est la grande complication de nos mouvements, l'interruption qui nous persuadent que nous sommes libres.' Les hommes sont semblables à un nageur emporté par le courant : ils se croient libres parce qu'ils ignorent les lois qui les meuvent. La liberté n'est qu'une illusion née de l'ignorance des causes."},
{n:"Spinoza, Lettre 58 à Schuller (cours p.123)",t:"L'homme croit être libre parce qu'il a conscience de ses désirs mais ignore les causes qui les déterminent. Exemple de la pierre lancée : si elle avait conscience d'elle-même, elle se croirait libre. La liberté n'est pas l'absence de cause, c'est l'ignorance de la cause."},
{n:"Freud, Introduction à la psychanalyse — triple blessure (cours p.125)",t:"La science a infligé trois blessures à l'égoïsme naïf de l'humanité : (1) cosmologique — Copernic : la Terre n'est pas le centre ; (2) biologique — Darwin : l'homme descend de l'animal ; (3) psychologique — Freud : 'Le moi n'est pas maître dans sa propre maison.' Nos actions sont déterminées par des forces inconscientes."},
{n:"Sartre, L'Être et le Néant — extrait 1 (cours p.137)",t:"Critique de la psychanalyse : la censure freudienne doit être de mauvaise foi. Pour refouler quelque chose, il faut d'abord en avoir conscience — ce qui contredit l'idée d'un inconscient vraiment opaque. La censure doit choisir ce qu'elle refoule, donc avoir une conscience de sa propre activité."},
{n:"Sartre, L'Être et le Néant — extrait 2 (cours p.137)",t:"La liberté en situation : même si je ne peux pas changer mon passé ou mon corps, j'ai toujours la capacité de me définir par mon projet. Jean Genet, né de parents inconnus et voleur dès l'enfance, se définit par ses actes futurs. La liberté n'est pas absence de contraintes mais puissance de se projeter autrement."},
{n:"Rousseau, Du contrat social, chap.6 — Du pacte social (cours p.96)",t:"Le contrat social permet de gagner 'l'équivalent de tout ce qu'on perd et plus de force pour conserver ce que l'on a.' La liberté civile obtenue dans et par la loi commune est supérieure à la liberté naturelle illimitée mais fragile. 'Se donnant à tous, on ne se donne à personne.'"},
{n:"Kant, Critique de la Raison Pratique (cours p.130)",t:"Preuve de l'existence de la liberté par l'expérience du devoir. Nous savons que nous sommes libres parce que nous savons que nous devons. L'impératif catégorique : la loi morale s'impose d'elle-même à la raison, distinct de la contrainte et de la nécessité naturelle."},
{n:"Engels, Anti-Dühring (cours p.133)",t:"Contre le déterminisme physique paralysant : la liberté ne consiste pas à s'affranchir des lois de la nature, mais à les connaître et à les utiliser. 'On ne peut commander à la nature qu'en lui obéissant.' La connaissance du déterminisme est la condition de son dépassement."},
{new:true,n:"Sartre, L'Existentialisme est un humanisme — plan de l'œuvre",t:"I. Défense (l'existence précède l'essence) / II. L'homme face à sa liberté ('condamné à être libre') / III. L'action contre le déterminisme (la lâcheté = choix répété, pas tempérament) / IV. L'intersubjectivité et l'universel ('en me choisissant, je choisis l'homme') / V. L'humanisme existentialiste. Citations clés : 'L'existence précède l'essence' — 'L'homme est condamné à être libre' — 'L'homme n'est rien d'autre que l'ensemble de ses actes' — 'La vie n'a pas de sens a priori, c'est à vous de lui donner un sens.'"},
{new:true,n:"Bourdieu, Leçon sur la leçon (1982) — connaissance libératrice",t:"La connaissance sociologique est libératrice : connaître les mécanismes de la reproduction sociale permet de les maîtriser et d'y introduire des éléments modificateurs. La violence symbolique tire son efficacité de la méconnaissance — la connaissance la désamorce. Bourdieu répond à Sartre : la liberté n'est pas pure spontanéité, elle est conditionnée par les structures sociales, mais leur connaissance ouvre un espace de liberté réelle."},
],
axes:[
{n:"Axe 1",t:"La liberté et le déterminisme",pb:"Le déterminisme est-il compatible avec la liberté ?",
sps:[
{l:"A",c:"Déterminisme radical : tout est causé (Spinoza, sciences naturelles). Le libre arbitre est une illusion qui vient de notre ignorance des causes. Nous croyons choisir mais nous sommes déterminés (biologie, inconscient, éducation, société).",r:"Spinoza, Éthique II ; Freud"},
{l:"B",c:"Liberté comme nécessité comprise (Spinoza) : la vraie liberté n'est pas d'agir sans cause mais d'agir selon sa propre nature rationnelle. Le sage est libre non parce qu'il échappe aux causes mais parce qu'il les comprend et agit selon la raison.",r:"Spinoza, Éthique IV-V"},
{l:"C",c:"Sartre : l'homme est 'condamné à être libre'. Même si nous sommes en situation (corps, passé, société), nous avons toujours une liberté de conscience. La mauvaise foi consiste à nier cette liberté irréductible.",r:"Sartre, L'Être et le Néant"},
]},
{n:"Axe 2",t:"Liberté et morale : autonomie vs contrainte",pb:"Obéir à une règle, est-ce être libre ?",
sps:[
{l:"A",c:"Kant : la vraie liberté est l'autonomie morale. Obéir à la loi morale que la raison se donne = être vraiment libre. À l'inverse, obéir à ses désirs (hétéronomie) = être esclave de ses penchants.",r:"Kant, Fondements de la métaphysique des mœurs"},
{l:"B",c:"Rousseau : la liberté civile est supérieure à la liberté naturelle. Obéir à la loi commune qu'on s'est donnée = s'obéir à soi-même. C'est la condition de la liberté politique.",r:"Rousseau, Du Contrat social"},
{l:"C",c:"Mill : la liberté doit être protégée contre l'État et la société (tyrannie de la majorité). La liberté d'expression et de conscience sont absolues. Limite : nuire à autrui. La liberté individuelle est un bien en soi.",r:"Mill, De la liberté"},
]},
{n:"Axe 3",t:"La liberté est-elle possible dans la société ?",pb:"La vie sociale est-elle un obstacle à la liberté ?",
sps:[
{l:"A",c:"La société comme obstacle : Rousseau (l'homme est né libre mais partout il est dans les fers). Les institutions, la propriété, l'inégalité enchaînent l'homme. La liberté naturelle est perdue dans la société civile.",r:"Rousseau, Discours sur l'inégalité"},
{l:"B",c:"La société comme condition : Hegel, Aristote. L'homme est un animal politique ; hors de la cité, il serait 'dieu ou bête'. La liberté réelle se réalise dans les institutions (famille, société, État).",r:"Aristote, Politique ; Hegel, Principes du droit"},
{l:"C",c:"Synthèse (Rousseau, Contrat social) : la liberté civile n'est pas la destruction de la liberté naturelle mais son dépassement dialectique. On perd la liberté brute mais on gagne une liberté plus haute, garantie et raisonnée.",r:"Rousseau, Du Contrat social I"},
]},
{n:"Axe 4",t:"La liberté est-elle une illusion ?",pb:"Comment comprendre que la liberté puisse être considérée comme illusoire alors que l'homme se perçoit nécessairement comme libre ?",
sps:[
{l:"A",c:"La liberté est le propre de la condition humaine (Sartre) : l'existence précède l'essence, l'homme n'a pas de nature préalable. Il se définit par ses actes, est 'condamné à être libre'. Ne pas choisir, c'est encore choisir. La liberté est l'angoisse même de l'homme.",r:"Sartre, L'existentialisme est un humanisme ; L'Être et le Néant"},
{l:"B",c:"Son existence étant impossible à prouver, la liberté semble une erreur de jugement. Les déterminismes pèsent sur nous : physique (D'Holbach), socio-économique (Bourdieu/Passeron), psychique (Freud). L'homme croit choisir mais ignore les causes qui le meuvent (Spinoza, Lettre 58).",r:"D'Holbach, Système de la nature ; Freud, Introduction à la psychanalyse ; Bourdieu, La Reproduction"},
{l:"C",c:"C'est par la connaissance de ce qui nous détermine que nous pouvons nous émanciper. La cure psychanalytique (Freud), l'agir en situation (Sartre), la connaissance des lois naturelles (Engels) permettent de reconquérir une liberté réelle. La vraie liberté politique est conférée par le contrat social (Rousseau, Épictète).",r:"Épictète, Manuel ; Rousseau, Du Contrat social ; Engels, Anti-Dühring"},
]},
{n:"Axe 5",t:"Un état de droit est-il la condition de la liberté civile ?",pb:"La loi limite-t-elle ou garantit-elle la liberté ?",
sps:[
{l:"A",c:"Montesquieu : 'La liberté ne peut consister qu'à faire ce que les lois permettent.' Sans loi, c'est la liberté du plus fort qui s'impose. La loi rend les libertés de chacun compatibles.",r:"Montesquieu, De l'Esprit des Lois, 1748"},
{l:"B",c:"Hobbes : la liberté civile (réglée, limitée) est préférable à la liberté naturelle (totale mais infructueuse dans l'état de guerre). Le contrat échange la liberté absolue contre la sécurité et une liberté garantie.",r:"Hobbes, Le Citoyen, 1642"},
{l:"C",c:"Tocqueville : l'État de droit peut dériver vers un despotisme doux si les citoyens sont passifs. La liberté civile exige la vigilance active des citoyens pour empêcher l'émergence de pouvoirs illégitimes.",r:"Tocqueville, De la démocratie en Amérique, 1840"},
]},
],
exemples:[
{tag:"Cinéma",tit:"Matrix (1999)",body:"Les humains vivent dans une simulation en croyant être libres. Néo découvre qu'il est déterminé par un programme. La pilule rouge = choix de la vérité et de la vraie liberté vs confort de l'illusion. Illustration de l'opposition Spinoza/Sartre sur le libre arbitre.",lien:"→ Spinoza (illusion libre arbitre), Sartre (choix radical)"},
{tag:"Histoire",tit:"L'esclavage antique et moderne",body:"L'esclave est l'exemple limite de la privation de liberté. Pour Arendt, les Anciens légitimaient l'esclavage car le travail servile abaissait l'homme au rang d'animal. Pour Marx, le salariat est une forme moderne d'esclavage.",lien:"→ Arendt (labor), Marx, Hegel (maître/esclave)"},
{tag:"Philosophie",tit:"Le garçon de café de Sartre",body:"Sartre décrit un garçon de café qui joue parfaitement son rôle : mouvements trop précis, trop vifs, trop certains. Il est de mauvaise foi car il se traite comme une chose (être-en-soi) pour fuir l'angoisse de sa liberté.",lien:"→ Sartre (mauvaise foi), conscience"},
{tag:"Droit",tit:"Droits et libertés fondamentaux (DDHC 1789)",body:"La Déclaration des droits de l'homme pose que la liberté est le droit naturel de l'homme : 'La liberté consiste à pouvoir faire tout ce qui ne nuit pas à autrui.' Reprise du principe de non-nuisance de Locke et Mill.",lien:"→ Mill, Locke, État, justice"},
{tag:"Psychanalyse — Cours",tit:"Le lapsus révélateur de George W. Bush (2022)",body:"En 2022, G. W. Bush voulait parler de la guerre en Ukraine menée par Poutine, mais a dit 'Irak'. Selon Freud (Psychopathologie de la vie quotidienne, 1901), ce lapsus n'est pas un accident mais un acte psychique sérieux : il révèle que Bush était hanté par la décision illégitime d'envahir l'Irak en 2003, une pulsion inconsciente échappant momentanément au contrôle du moi. Preuve du déterminisme psychique.",lien:"→ Freud (lapsus, inconscient), liberté comme illusion"},
{tag:"Littérature — Cours",tit:"Acte gratuit : Lafcadio (Gide) et Meursault (Camus)",body:"Dans Les Caves du Vatican, Lafcadio tue un inconnu pour prouver sa liberté absolue ; dans L'Étranger, Meursault tue 'l'Arabe' sans motif apparent. Ces actes 'gratuits' sont censés prouver le libre arbitre. Mais ils sont en réalité motivés par le désir même de prouver la liberté, ce qui les prive de leur caractère gratuit.",lien:"→ Liberté, déterminisme, acte sans motif"},
{tag:"Philosophie — Cours",tit:"Nietzsche : l'orgueil comme motif de croire en la liberté",body:"Dans Par-delà le Bien et le Mal (Aph. 21, 1886), Nietzsche soutient que c'est par orgueil que les hommes soutiennent l'existence du libre arbitre : ils veulent être responsables de leurs actes et ne pas être de simples marionnettes déterminées par les dieux ou le hasard. Croire à la liberté est un besoin psychologique, non une vérité.",lien:"→ Déterminisme, illusion, responsabilité (Sartre)"},
{tag:"Psychologie — Cours",tit:"Descartes et la fille louche — goût déterminé psychiquement",body:"Dans la Lettre à Chanut (1647), Descartes raconte que dans son enfance il aimait une fille qui louchait. Longtemps après, l'impression visuelle du louche était associée pour lui au sentiment amoureux. Exemple de déterminisme psychique : nos goûts ne sont pas libres mais résultent d'associations inconscientes formées dans l'enfance.",lien:"→ Déterminisme psychique, Freud, liberté illusoire"},
],

diss:["Sommes-nous libres ?","La liberté est-elle une illusion ?","La liberté est-elle compatible avec l'obéissance aux lois ?","Être libre, est-ce faire ce qu'on veut ?","Peut-on être libre seul ?",{q:"Un état de droit est-il la condition à l'exercice de la liberté civile ?"},{q:"L'inconscient remet-il en cause la liberté ?"},{q:"Peut-on se libérer des déterminismes ?"},{q:"La connaissance de nos déterminismes nous rend-elle plus libres ?"},{new:true,q:"Les déterminismes sociaux peuvent-ils être surmontés ?"},{new:true,q:"La connaissance libère-t-elle ?"},{new:true,q:"L'existence précède-t-elle l'essence ?"}]
},
art:{c:"#8B5E3C",l:"Art",s:"L'artiste travaille-t-il ?",
def:"L'<span class='kw'>art</span> (latin <em>ars</em>, grec <em>technê</em>) désigne à la fois la maîtrise technique et la création singulière. L'œuvre d'art est l'objet unique qui exprime la singularité d'un individu. Question centrale : l'artiste est-il un travailleur, un non-travailleur, ou un créateur d'une troisième espèce ?<details><summary>Approfondir la notion</summary><div class='def-sec'><div class='def-sec-title'>Étymologie : art, technique, artisan</div><div class='def-sec-body'>Le latin <em>ars</em> traduit le grec <em>technê</em>, qui possède le double sens de <strong>savoir-faire/technique</strong> et de <strong>création artistique</strong>. C'est pourquoi l'artiste et l'artisan partagent la même racine : <em>artifex</em>. Le terme « Artisee » (ou « artisan » selon les usages) désigne à la fois l'artiste et l'artisan. La limite entre les deux se trouve dans le design, l'architecture, la gastronomie, la mode — arts à la fois utiles et créatifs.</div></div><div class='def-sec'><div class='def-sec-title'>Le Beau</div><div class='def-sec-body'>L'œuvre d'art vise traditionnellement le <strong>Beau</strong>, par opposition aux objets utiles et fonctionnels. Kant : le beau est « un universel sans concept » — on attend que tout le monde partage le jugement esthétique (<em>sensus communis</em>) sans pouvoir le justifier par une règle. Bourdieu (<em>La Distinction</em>) : le jugement esthétique exprime un <strong>habitus de classe</strong> — le goût n'est pas universel mais socialement construit. Dewey (<em>L'art comme expérience</em>) : l'art comme sentiment de complétude, de totalité, d'achèvement.</div></div><div class='def-sec'><div class='def-sec-title'>Le ready-made et l'institution</div><div class='def-sec-body'>Le <strong>ready-made</strong> (Duchamp, <em>La Fontaine</em>, 1917) : un objet banal promu au statut d'œuvre d'art par simple désignation institutionnelle. L'art est ainsi ce que les institutions culturelles (musées, galeries, critiques) reconnaissent comme tel. Brian O'Doherty (<em>L'espace de la galerie et son idéologie</em>) : c'est l'espace de la galerie — et non l'objet lui-même — qui fait l'œuvre. Autres exemples : « Merda d'artista » (Manzoni), sculptures immatérielles (Salvatore Garau).</div></div><div class='def-sec'><div class='def-sec-title'>Reproductibilité et culture de masse</div><div class='def-sec-body'>Arendt (<em>La Crise de la culture</em>) : faire de l'œuvre d'art un produit de consommation de masse revient à détruire l'artiste, car les consommateurs reviennent à détruire ce qu'ils consomment. Walter Benjamin : la reproduction technique détruit l'<em>aura</em> de l'œuvre originale. Aujourd'hui : streaming, copies numériques, NFT — qu'est-ce qui subsiste de l'unicité ?</div></div></details>",
auteurs:[
{new:true,n:"Kant",w:"Critique de la faculté de juger, 1790",i:"Le génie est le talent de produire ce dont on ne peut donner de règle déterminée. L'originalité est sa première qualité. Ses productions doivent être exemplaires. L'auteur ne sait pas comment les idées s'en trouvent en lui — il ne peut décrire ni montrer comment il accomplit ses productions. Le beau est un 'universel sans concept' : un jugement esthétique attend l'accord universel sans pouvoir le démontrer.",q:"Le génie donne la règle à l'art sans pouvoir expliquer comment"},
{new:true,n:"Nietzsche",w:"Humain, trop humain, 1878",i:"Contre le mythe du génie inné. L'artiste observe, travaille, s'exerce par la répétition — comme l'inventeur ou le tacticien. L'illusion du génie naît de notre ignorance et de notre paresse : tout ce qui est fini excite l'étonnement ; tout ce qui est en train de se faire est déprécié. L'art est donc d'abord un travail.",q:"'Le génie ne fait rien que d'apprendre à poser des pierres, travailler toujours à y mettre la forme'"},
{new:true,n:"Hannah Arendt",w:"La Crise de la culture, 1961",i:"L'œuvre d'art est la plus durable des choses humaines : elle n'est ni consommée ni usée, délibérément écartée du processus vital. Fabriquée pour le monde (qui survivra aux mortels), non pour les hommes. La culture de masse menace l'art en transformant les œuvres en produits de consommation, détruisant ainsi leur permanence et leur unicité.",q:"Les œuvres d'art sont les seules choses à n'avoir aucune fonction dans le processus vital de la société"},
{new:true,n:"Hegel",w:"Esthétique, 1818–1829",i:"L'art beau est véritablement art en sa liberté propre. La source des œuvres est la libre activité de l'imagination, plus libre que la nature. L'art est un libérateur : l'objectivation des sentiments (les rendre extérieurs, représentation) leur enlève leur intensité et les rend à notre libre jugement. L'art porte une puissance de conviction et de conversion.",q:"'L'art beau n'est véritablement art qu'en cette liberté propre'"},
{new:true,n:"Bourdieu",w:"La Distinction, 1979",i:"Le jugement esthétique ('c'est beau') exprime un habitus de classe spécifique — non un universel. Le goût est socialement construit : ceux qui possèdent la culture légitime maîtrisent ses codes et se trouvent ainsi dominants. L'accès à l'art est inégal (capital culturel, économique, social). B. O'Doherty : l'espace de la galerie et son idéologie.",q:"Le goût n'est pas universel mais l'expression d'un habitus de classe particulier"},
{new:true,n:"Sartre",w:"L'Imaginaire, 1940",i:"Le paradoxe de l'objet d'art : sa signification demeure irréelle (hors du monde), mais il peut être la cause et la fin d'activités réelles. Un tableau met en jeu des intérêts économiques et politiques réels. La réalité d'une société comporte la socialisation de certaines irréalités — les œuvres reçues sont réelles en ce qu'elles provoquent des actions et des sentiments réels.",q:"'Le paradoxe de l'objet d'art c'est que sa signification demeure irréelle'"},
{new:true,n:"Bergson",w:"Le Rire, 1900",i:"L'artiste écarte le voile de la perception utilitaire. Ce que l'artiste a vu, nous ne l'aurions jamais vu sans lui. Son œuvre nous sert de leçon : l'efficacité de la leçon se mesure à la vérité de l'œuvre. L'art révèle ce que nous ne voyons pas ordinairement car notre perception est orientée vers l'action pratique.",q:"'Ce que l'artiste a vu, nous ne le reverrons pas — mais s'il a vu pour tout de bon, son œuvre nous sert de leçon'"},
{new:true,n:"Merleau-Ponty",w:"Sens et non-sens, 1966",i:"Le peintre construit une image — il faut attendre qu'elle s'anime pour les autres. Alors l'œuvre habitera indivise dans plusieurs esprits, présomptivement dans tout esprit possible, comme une acquisition pour toujours. L'œuvre d'art joint des vies séparées dans un espace commun : elle existe non dans un seul esprit mais entre les esprits.",q:"L'œuvre d'art habite indivise dans plusieurs esprits, comme une acquisition pour toujours"},
{new:true,n:"Schopenhauer",w:"Le Monde comme volonté et représentation, 1819",i:"L'œuvre d'art ne doit pas tout livrer directement aux sens — elle doit mettre l'imagination en bonne voie. L'imagination doit toujours avoir quelque chose à ajouter : c'est elle qui dit le dernier mot. Ce qu'il y a de meilleur dans l'art est trop spirituel pour être livré directement : c'est à l'imagination à le mettre au jour.",q:"'Ce qu'il y a de meilleur dans l'art est trop spirituel pour être livré directement aux sens'"},
],
textes:[
{new:true,n:"Nietzsche, Humain trop humain — I. L'artiste travaille (cours)",t:"L'activité du génie n'est pas différente de celle de l'inventeur, du savant ou du tacticien. Ce sont des hommes dont la pensée est active dans une direction unique, qui utilisent tout comme matière première, qui ne cessent d'observer diligemment leur vie intérieure et celle d'autrui. Le génie ne fait rien que d'apprendre à poser des pierres, travailler toujours à y mettre la forme. Tout ce qui est fini, parfait, excite l'étonnement ; tout ce qui est en train de se faire est déprécié."},
{new:true,n:"Arendt, La Crise de la culture — II. L'artiste ne travaille pas (cours)",t:"Les œuvres d'art ne sont pas consommées comme des biens, ni usées comme des objets d'usage : elles sont délibérément écartées des processus de consommation et d'utilisation, isolées loin de la sphère des nécessités de la vie humaine. Les œuvres d'art sont les seules choses à n'avoir aucune fonction dans le processus vital de la société. Du point de vue de la durée, elles sont clairement supérieures à toutes les autres choses — les plus mondaines."},
{new:true,n:"Kant, Critique de la faculté de juger — III. L'artiste crée (cours)",t:"Le génie est le talent de produire ce dont on ne peut donner de règle déterminée — non l'habileté qu'on peut apprendre suivant une règle. L'originalité est sa première qualité. Ses productions doivent être exemplaires : originales elles-mêmes, elles doivent pouvoir être proposées à l'imitation. Il ne peut lui-même décrire comment il accomplit ses productions — l'auteur en étant redevable à son génie, ne sait pas lui-même comment les idées s'en trouvent en lui."},
{new:true,n:"Hegel, Esthétique — liberté de la création (DM cours)",t:"Ce qui nous plaît dans la beauté artistique, c'est précisément le caractère de liberté de sa production. L'art beau n'est véritablement art qu'en cette liberté propre. La source des œuvres d'art est la libre activité de l'imagination qui, dans ses images, est plus libre que la nature. L'art est un libérateur : les passions perdent leur force du fait même qu'elles sont devenues objets de représentations — le sentiment sort de l'état de concentration et s'offre à notre libre jugement."},
{new:true,n:"Bergson, Le Rire — DM cours",t:"Ce que l'artiste a vu, nous ne le reverrons pas, du moins pas tout à fait de même. Mais s'il a vu pour tout de bon, l'effort qu'il a fait pour écarter le voile s'impose à notre imitation. Son œuvre est un exemple qui nous sert de leçon. L'efficacité de la leçon se mesure précisément à la vérité de l'œuvre. La vérité porte donc en elle une puissance de conviction, de conversion même."},
{new:true,n:"Merleau-Ponty, Sens et non-sens — DM cours",t:"Le peintre n'a pu que construire une image. Il faut attendre que cette image s'anime pour les autres. Alors l'œuvre d'art aura joint ces vies séparées — elle n'existera plus seulement en l'une d'elles comme un rêve tenace ou un délire persistant, ou dans l'espace comme une toile coloriée. Elle habitera indivise dans plusieurs esprits, présomptivement dans tout esprit possible, comme une acquisition pour toujours."},
{new:true,n:"Schopenhauer, Le Monde comme volonté — DM cours",t:"L'œuvre d'art ne doit pas tout livrer directement aux sens, mais juste ce qu'il faut pour mettre l'imagination en bonne voie. L'imagination doit toujours avoir quelque chose à ajouter. Ce qu'il y a de meilleur dans l'art est trop spirituel pour être livré directement aux sens : c'est à l'imagination à le mettre au jour, quoique l'œuvre d'art doive l'engendrer. Voltaire : 'Le secret d'être ennuyeux, c'est de tout dire.'"},
{new:true,n:"Sartre, L'Imaginaire — DM cours",t:"Le paradoxe de l'objet d'art c'est que sa signification demeure irréelle, hors du monde, et que cependant il peut être la cause et la fin d'activités réelles. Un tableau met en jeu des intérêts économiques ; en temps de guerre, on l'évacue comme une personne. La réalité d'une société comporte la socialisation de certaines irréalités : les œuvres reçues sont réelles en ceci qu'elles provoquent des actions réelles, des sentiments réels et définissent le développement historique d'une société."},
],
axes:[
{new:true,n:"Axe 1",t:"L'artiste travaille",pb:"L'activité artistique est-elle un travail comme les autres ?",
sps:[
{l:"A",c:"L'artiste produit des efforts réguliers pour transformer la matière ou réifier une idée. Un musicien, un sculpteur fournissent des efforts répétitifs. Le travail technique est un point commun entre l'artiste et le travailleur : maîtrise des matériaux, des techniques diverses.",r:"Nietzsche, Humain trop humain (cours)"},
{l:"B",c:"Nietzsche démonte le mythe du génie inné : c'est notre ignorance et notre paresse qui nous font croire au 'don'. L'activité du génie ressemble à celle du savant ou du tacticien — observation, répétition, travail acharné. La maîtrise technique et la raison instrumentale sont indispensables.",r:"Nietzsche, Humain trop humain"},
{l:"C",c:"Perspective critique (limite de I) : inégalité socio-économique d'accès à l'art (Bourdieu). Le travail ne suffit pas (capital culturel). L'art peut devenir 'prêt-à-mâcher' via les 'ready-made' — n'importe quel objet peut être art si l'institution le décide.",r:"Bourdieu, La Distinction ; Duchamp, La Fontaine"},
]},
{new:true,n:"Axe 2",t:"L'artiste ne travaille pas",pb:"En quoi l'œuvre d'art se distingue-t-elle radicalement du produit du travail ?",
sps:[
{l:"A",c:"L'artiste est toujours maître de ses outils (≠ travailleur asservi à la machine). L'œuvre est inutile au sens strict : elle ne satisfait pas les besoins vitaux. L'artiste porte un regard désintéressé sur le monde — c'est justement pourquoi il rend visible ce que nous ne voyons pas ordinairement.",r:"Kant (désintéressement esthétique) ; Bergson, Le Rire"},
{l:"B",c:"Le fruit du travail est destiné à être consommé et remplacé. L'œuvre d'art est potentiellement immortelle (Arendt) : écartée des processus de consommation, elle survit à toutes les générations. Son rapport au temps est radicalement différent de celui du produit.",r:"Arendt, La Crise de la culture"},
{l:"C",c:"L'activité artistique est elle-même sa propre fin (Hegel : liberté propre). La 'valeur esthétique' ≠ 'valeur de fait descriptif'. L'art résiste à la réduction économique — même si le marché de l'art lui assigne une valeur commerciale, son essence demeure irréductible au prix.",r:"Hegel, Esthétique ; Sartre, L'Imaginaire"},
]},
{new:true,n:"Axe 3",t:"L'artiste crée",pb:"La création artistique est-elle une troisième forme d'activité irréductible au travail et à la non-activité ?",
sps:[
{l:"A",c:"L'œuvre est unique et originale (≠ production en série). L'originalité est la première qualité du génie (Kant) : produire ce dont on ne peut donner de règle déterminée. Ce n'est pas simplement du savoir-faire — c'est du talent. L'artiste crée en un sens que l'artisan ne peut pas.",r:"Kant, Critique de la faculté de juger"},
{l:"B",c:"La création artistique met en jeu une liberté particulière : liberté de ses moyens et de ses fins (Hegel). L'imagination créatrice est plus libre que la nature. L'œuvre est une acquisition permanente qui joint des esprits séparés (Merleau-Ponty) — elle crée une forme d'intersubjectivité unique.",r:"Hegel, Esthétique ; Merleau-Ponty, Sens et non-sens"},
{l:"C",c:"Ouverture / limite : le problème de la reproductibilité de l'œuvre et de la culture de masse (Arendt). Faire de l'œuvre un produit de consommation revient à détruire l'artiste. La 'crise de la culture' : industrie culturelle (Walter Benjamin, Adorno) — quand tout est art, plus rien ne l'est.",r:"Arendt, La Crise de la culture ; Benjamin, L'œuvre d'art à l'époque de sa reproductibilité"},
]},
],
exemples:[
{new:true,tag:"Art contemporain",tit:"Duchamp — La Fontaine (1917)",body:"Un urinoir de porcelaine, signé 'R. Mutt', exposé comme œuvre d'art. Le ready-made radical : c'est l'acte de désignation institutionnelle qui crée l'œuvre, non le geste technique. Duchamp illustre la thèse de B. O'Doherty : c'est l'espace de la galerie et non l'objet lui-même qui fait l'art. Il met à mort la notion de savoir-faire artistique.",lien:"→ Institution, beau, technique (notion)"},
{new:true,tag:"Art contemporain",tit:"Manzoni — Merda d'artista / Sculture immateriali",body:"Piero Manzoni vend ses propres excréments en boîtes numérotées ('Merda d'artista', 1961). Salvatore Garau vend aux enchères des 'sculptures immatérielles' (zones de vide certifiées, comme 'Io Sono', 2021). Ces œuvres poussent à l'extrême la logique institutionnelle : l'art est ce que l'artiste désigne comme art. La valeur commerciale atteinte prouve que l'institution valide cette thèse.",lien:"→ Institution (Duchamp), valeur esthétique vs commerciale"},
{new:true,tag:"Philosophie — Cours",tit:"L'artiste travaille-t-il ? Plan du cours",body:"I. L'artiste travaille : efforts réguliers, maîtrise technique (Nietzsche, Humain trop humain). II. L'artiste ne travaille pas : œuvre inutile, immortelle, artiste maître de ses outils (Arendt, La Crise de la culture). III. L'artiste crée : œuvre unique, originale, génie (Kant, Critique de la faculté de juger). La question articule les notions de Travail, Technique et Liberté.",lien:"→ Travail, Technique, Liberté (notions liées)"},
{new:true,tag:"Cinéma",tit:"Iris Brey — Le regard féminin (2020)",body:"Brey analyse le 'female gaze' : un regard qui donne une subjectivité au personnage féminin, permettant au spectateur de ressentir l'expérience de l'héroïne sans simplement s'identifier à elle. La différence entre ressentir et s'identifier est capitale dans son approche phénoménologique. L'œuvre d'art peut ainsi créer des formes d'empathie inédites.",lien:"→ Merleau-Ponty (intersubjectivité), Sartre (imaginaire)"},
{new:true,tag:"Musique",tit:"L'esthétique musicale — sensibilité vs analyse",body:"Écouter de la musique peut faire plaisir à mon ouïe (sensibilité pure) ou mobiliser une analyse structurelle. Le 'faire travailler les sons' (Schopenhauer : laisser l'imagination compléter) illustre la distinction entre art comme expérience sensorielle et art comme expérience intellectuelle. La musique est l'art le plus 'spirituel' car le moins matériel.",lien:"→ Schopenhauer (imagination), Kant (beau sans concept)"},
],

langage:{c:"#6B4FA0",l:"Langage",s:"Le langage ne sert-il qu'à communiquer ?",
def:"Le <span class='kw'>langage</span> est tout système de signes permettant l'expression ou la communication. Il se distingue des autres systèmes par la <span class='kw'>double articulation</span> (monèmes + phonèmes). Question centrale : est-il un simple <span class='kw'>moyen</span> (instrument) ou peut-il être une <span class='kw'>fin en soi</span> ?<details><summary>Approfondir la notion</summary><div class='def-sec'><div class='def-sec-title'>Trois distinctions fondamentales</div><div class='def-sec-body'><strong>Langage</strong> (général) : système de signes permettant l'exploration ou la communication — englobe le langage animal, informatique, humain. <strong>Langue</strong> : instrument de communication propre à une communauté humaine, produit social et stable (le français, l'anglais…). <strong>Parole</strong> (Saussure) : acte individuel par lequel un individu s'approprie une langue commune. Et aussi : <strong>logos</strong> (parole rationnelle, Aristote) ≠ <strong>phone</strong> (voix animale, cri).</div></div><div class='def-sec'><div class='def-sec-title'>Signe linguistique (Saussure)</div><div class='def-sec-body'>Le signe = <strong>signifiant</strong> (image acoustique, le son) + <strong>signifié</strong> (concept mental). Lien <strong>arbitraire</strong> mais <strong>inséparable</strong> — comme le recto/verso d'une feuille. Le <strong>référent</strong> (l'objet réel) est distinct. La licorne : signifiant + signifié sans référent → le langage dépasse la transmission utilitaire.</div></div><div class='def-sec'><div class='def-sec-title'>Signal vs Symbole (Benveniste)</div><div class='def-sec-body'>Le <strong>signal</strong> est un fait physique relié à un autre par rapport naturel/conventionnel — l'animal y réagit par réflexe. Le <strong>symbole</strong> est institué par l'homme : il faut apprendre à l'interpréter. L'animal <em>exprime</em> ses émotions, il ne les <em>dénomme</em> pas. Cette capacité symbolique est à la base de toutes les fonctions conceptuelles.</div></div><div class='def-sec'><div class='def-sec-title'>6 fonctions du langage (Jakobson)</div><div class='def-sec-body'><strong>Émotive</strong> (je), <strong>conative</strong> (tu — commander, persuader), <strong>référentielle</strong> (il — décrire), <strong>phatique</strong> (maintenir le contact), <strong>métalinguistique</strong> (parler du code lui-même), <strong>poétique</strong> (la forme du message). Une phrase combine rarement une seule fonction. La fonction poétique : le langage comme fin en soi.</div></div><div class='def-sec'><div class='def-sec-title'>Le langage structure la pensée</div><div class='def-sec-body'>Saussure : sans les signes, notre pensée n'est qu'une « nébuleuse amorphe et indistincte ». Hegel (<em>Philosophie de l'esprit</em>) : « C'est dans les mots que nous pensons. » Boroditsky : les locuteurs ayant des catégories linguistiques différentes (ex. point cardinal vs gauche/droite) perçoivent le monde différemment. Orwell (<em>1984</em>) : la <em>novlangue</em> réduit le pensable en appauvrissant le vocabulaire.</div></div></details>",
auteurs:[
{new:true,n:"Saussure",w:"Cours de linguistique générale, 1916 (publié à titre posthume)",i:"Fonde la linguistique moderne. Le signe = signifiant + signifié, lien arbitraire mais inséparable. La langue est un système de différences : les mots n'ont pas de valeur en eux-mêmes, mais par rapport aux autres. Sans les signes, la pensée est une nébuleuse indistincte.",q:"'La pensée, chaotique de sa nature, est forcée de se préciser en se décomposant'"},
{new:true,n:"Benveniste",w:"Problèmes de linguistique générale, 1963",i:"Distingue signal et symbole : l'animal perçoit le signal et y réagit par réflexe conditionné — l'homme invente et comprend des symboles. Cette capacité symbolique est à la base des fonctions conceptuelles. Ex. du feu rouge : signal univoque pour l'animal (réaction adéquate, dressage), mais symbole équivoque pour l'homme qui l'interprète selon le contexte — <em>ya la police / vous pouvez passer / vous n'avez pas fermé le coffre / mettez les feux / décalez-vous</em>. La pensée est par essence symbolique.",q:"'L'homme invente et comprend des symboles ; l'animal, non. Tout découle de là'"},
{new:true,n:"Jakobson",w:"Essais de linguistique générale, 1963",i:"Identifie 6 fonctions du langage selon le pôle de communication dominant : (1) <strong>Émotive</strong> (émetteur) — ex. « Malheureusement, mes demandes d'eau restent sans réponse… » / modalisateurs « très/trop investi » ; (2) <strong>Conative/impressive</strong> (destinataire) — ex. « Donne-moi vite de l'eau / svp / pitié » ; (3) <strong>Référentielle</strong> (contexte) — ex. « Les élèves ne donnent pas d'eau » ; (4) <strong>Phatique</strong> (contact) — ex. « N'est-ce pas ? », « C'est ça », « Allô ! ho ! » ; (5) <strong>Métalinguistique</strong> (code) — ex. « Hein ?! », « Que veut dire 'propédeutique' ? », « Comment dit-on 'bonjour' en espagnol ? » ; (6) <strong>Poétique</strong> (message) — ex. « 0 de stress ya point S », « Forme formidable », « very, very, véritable », Calligrammes d'Apollinaire. Le langage est irréductible à la seule transmission d'information.",q:"La fonction poétique : l'accent mis sur le message pour son propre compte"},
{new:true,n:"Austin",w:"Quand dire, c'est faire, 1962",i:"Distingue énoncés constatatifs (décrivent, vrais/faux) et performatifs (accomplissent l'action qu'ils énoncent). 'Je vous déclare mari et femme' : dire, c'est faire. Conditions de félicité : statut du locuteur, reconnaissance institutionnelle. Le langage est un mode d'action.",q:"'Produire l'énonciation est exécuter une action'"},
{new:true,n:"Bergson",w:"Le Rire, 1900 / L'évolution créatrice, 1907",i:"<em>Le Rire</em> : les mots (termes généraux) masquent le particulier et l'intime — nous ne voyons pas les choses mais des étiquettes. Seul le « poète » peut saisir la singularité, voire créer les mots / une langue spécifique (ex. « spleen » de Baudelaire). Pb des glissements sémantiques : un même signe peut avoir des connotations variables — ex. « bonnomatisme », « qualitatif », « punition »/« bordel », « passion » (pâtir, subir → passivité), « adulti » (quelqu'un qui m'aime). L'<em>Évolution créatrice</em> : le signe intelligent est mobile (connotations, ironie, sens figurés), contrairement au signe instinctif adhérent.",q:"'Les mots s'insinuent entre la chose et nous'"},
{new:true,n:"Hegel",w:"Philosophie de l'esprit, 1817",i:"C'est dans les mots que nous pensons. La pensée ne devient consciente d'elle-même qu'en se donnant une forme extérieure par le langage. L'intuition n'est que pensée obscure à l'état de fermentation. Le mot articulé donne à la pensée son objectivité.",q:"'C'est dans les mots que nous pensons — c'est le son articulé, le mot, qui seul nous offre une existence où l'externe et l'interne sont si intimement unis'"},
{new:true,n:"Orwell",w:"1984, 1949",i:"La novlangue est une langue artificielle conçue pour réduire le champ du pensable : moins de mots = moins de pensées possibles. Instrument du pouvoir totalitaire. Illustre que le langage conditionne la pensée et peut être outil d'oppression autant que de libération.",q:"'La novlangue réduira finalement le champ de la pensée'"},
{new:true,n:"Watzlawick",w:"Une logique de la communication, 1967",i:"Analyse les injonctions paradoxales : messages qui exigent un comportement spontané ('Soyez spontané !'). Pour obéir, il faudrait être spontané par obéissance — contradiction performative. Ces paradoxes révèlent les limites de la communication humaine et expliquent certaines formes de souffrance psychique.",q:"'Soyez spontané !' — prototype de l'injonction paradoxale"},
{new:true,n:"Boroditsky",w:"'How language shapes the way we think', conférence TED 2017 (essai sur Edge.org en 2009)",i:"Linguiste cognitive américaine. Ses expériences (framework BIG : S-N-E-O) montrent que notre langue (vocabulaire + grammaire) structure nos manières de penser, percevoir, se représenter le temps et l'espace. Expériences : (1) <em>deep</em> — la langue influence le comptage ; (2) <em>early</em> — la langue influence la perception des couleurs ; (3) <em>Broad</em> — le genre grammatical des mots influence les associations de caractères (ex. 'pont' : robuste en espagnol / élégant en allemand) ; (4) <em>Weighty</em> — la langue influence l'attribution de causalité (l'accusation du gg). Ex : associations indirectes de caractères <em>lents</em> (partiellement culturellement) genrées, en raison du genre grammatical des objets.",q:"'Language crafts reality'"},
{new:true,n:"Cassin",w:"Vocabulaire européen des philosophies (dir.), 2004",i:"Les 'intraduisibles' : certains mots sont philosophiquement intraduisibles car ils condensent une vision du monde irréductible (logos ≠ raison + discours en anglais). La traduction est toujours une trahison partielle. Philosophie comme exploration des différences de langues.",q:"Les intraduisibles révèlent ce que chaque langue pense que les autres ne pensent pas"},
{new:true,n:"Arendt",w:"La Crise de la culture, 1961",i:"La langue est mémoire : elle conserve la trace des générations. Le langage n'est pas seulement communication — c'est le médium dans lequel le monde commun se constitue et se transmet. La perte de la langue commune est une perte du monde commun.",q:"Le langage conserve / trace / mémoire / historique"},
],
textes:[
{new:true,n:"Benveniste — Signal vs Symbole (cours p.6–8)",t:"Un signal est un fait physique relié à un autre par rapport naturel ou conventionnel. L'animal perçoit le signal et réagit adéquatement (réflexe conditionné, dressage). Le décodage est univoque. L'homme utilise en outre le symbole : la réponse peut être erronée et nécessite une interprétation — le symbole est équivoque. Ex. du feu rouge perçu par un policier : ya la police / vous pouvez passer / vous n'avez pas fermé le coffre / mettez les feux / décalez-vous. L'animal exprime ses émotions, il ne peut les dénommer. La capacité symbolique est à la base des fonctions conceptuelles."},
{new:true,n:"Cours p.30 — Conception partielle du langage et sa limite",t:"Conception partielle : on comprend que le langage est un moyen de communiquer en fait de nos besoins et d'actions à accomplir — considéré comme un code transmettant des informations sur un individu ou le monde extérieur. En ce sens, le langage humain = code fait de signaux. Mais cette conception ne s'y réduit pas, car la fonction symbolique et conceptuelle est démontrée : il faut recourir au contexte, interpréter (le symbole est équivoque ≠ signal univoque), et le langage produit du sens au-delà de la seule information."},
{new:true,n:"Boroditsky — 'How language shapes the way we think ?' (cours p.29)",t:"Notre langage (vocabulaire + grammaire) structure nos manières de penser, de percevoir sensoriellement le monde, de nous représenter le temps et l'espace, et conditionne l'acquisition de compétences pratiques. Framework BIG (S-N-E-O) : (1) Organisation spatiale — ceux qui utilisent les points cardinaux ont une orientation supérieure ; (2) Compter — la langue influence le comptage (deep/count) ; (3) Percevoir — la langue influence la perception des couleurs (early/colors) ; (4) Sens de valeur/attention — Broad (le genre grammatical des choses) ; (5) Weighty (la cause : l'accusation du gg). Ex. : association indirecte de caractères lents (partiellement culturellement) genrée, d'objets en raison de leur genre grammatical. 'Language crafts reality.'"},
{new:true,n:"Saussure — La langue comme pensée dans la matière phonique (cours p.17)",t:"La pensée, abstraction faite de son expression par les mots, n'est qu'une masse amorphe et indistincte. Sans les signes, nous serions incapables de distinguer deux idées d'une façon claire et constante. Le signifiant et le signifié sont les deux faces du signe linguistique, aussi inséparables que le recto et le verso d'une feuille de papier. La pensée ne préexiste pas aux sons."},
{new:true,n:"Bergson — Termes généraux (cours p.9)",t:"Nous ne voyons pas les choses mêmes ; nous nous bornons, le plus souvent, à lire des étiquettes collées sur elles. Les mots (sauf les noms propres) désignent des genres — le mot s'insinue entre la chose et nous. Seul le « poète » peut saisir la singularité avec des termes généraux, voire créer les mots d'une langue spécifique. Ex. : « Spleen » de Baudelaire — mot anglais devenu concept propre, intraduisible, condensant une humeur mélancolique moderne. Jusque dans notre propre individu, l'individualité nous échappe. (Le Rire, 1900)"},
{new:true,n:"Bergson — Mobilité du signe / glissements sémantiques (cours p.10)",t:"Ce qui caractérise les signes du langage humain, c'est leur mobilité. Le signe instinctif est un signe adhérent, le signe intelligent est un signe mobile. Un signe n'est pas figé dans une seule signification. Exemples de glissements sémantiques : « bonnomatisme », « qualitatif », « punition »/« bordel » (changement de registre), « passion » (pâtir, subir → passivité, connotation négative), « adulti » (quelqu'un qui m'aime — sens affectif construit). Le glissement sémantique montre que le langage ne peut se réduire à un code stable. (L'évolution créatrice, 1907)"},
{new:true,n:"Watzlawick — Injonctions paradoxales (cours p.10)",t:"La forme la plus fréquente sous laquelle le paradoxe s'introduit dans la communication humaine est l'injonction exigeant un comportement déterminé qui, par sa nature même, ne saurait être que spontané. 'Soyez spontané !' — pour obéir, il faudrait être spontané par obéissance, donc sans spontanéité. (Une logique de la communication, 1967)"},
{new:true,n:"Hegel — La pensée dans les mots (cours p.18)",t:"C'est dans les mots que nous pensons. Nous n'avons conscience de nos pensées déterminées et réelles que lorsque nous leur donnons la forme objective, que nous les différencions de notre intériorité et par suite nous les marquons d'une forme externe. L'intuition n'est que de la pensée obscure, à l'état de fermentation. C'est le son articulé, le mot, qui seul nous offre une existence où l'externe et l'interne sont si intimement unis. (Philosophie de l'esprit, 1817)"},
{new:true,n:"Austin — Performatif (cours p.15–16)",t:"Quand je dis 'oui je le veux' lors de la cérémonie du mariage, ce n'est ni décrire ce que je fais ni affirmer que je le fais : c'est le faire. Je propose d'appeler une telle phrase 'performative'. Ce nom dérive du verbe 'perform' : produire l'énonciation est exécuter une action. Conditions de félicité : statut du locuteur, reconnaissance par l'assistance. (Quand dire, c'est faire, 1962)"},
{new:true,n:"Cours p.4 — Fonction poétique, signifiant et synesthésie (Rimbaud)",t:"Fonction poétique (Jakobson) : les signes/mots sont des matériaux permettant l'expérimentation sensorielle — la forme se déploie sur la feuille (visuel), le son (auditif). Recherche de synesthésie comme prolongement visant à toucher les sens via les signifiés. Rimbaud, 'L'Alchimie du verbe' : 'J'inventais la couleur des voyelles / A noir, E blanc, I rouge, O bleu, U vert' / 'le bon son de septembre ou je sentais des gouttes, / I rosée à mon front comme un vin de vigueur.' Le signifiant lui-même devient matière expressive irréductible au sens conceptuel. Voir aussi : Calligrammes d'Apollinaire (forme visuelle du texte)."},
],
axes:[
{new:true,n:"Axe A",t:"Le langage est un moyen de communiquer",pb:"Le langage n'est-il qu'un instrument de transmission d'information ?",
sps:[
{l:"A",c:"Chez les animaux, le langage est un code servant à communiquer des informations sur le monde extérieur ou l'individu lui-même (codes visuels, sonores, chimiques, tactiles). Le langage humain peut en ce sens s'apparenter à un code.",r:"Éthologie animale ; Saussure (signifiant/signifié comme code)"},
{l:"B",c:"Saussure fonde la linguistique structurale : le signe = signifiant + signifié, arbitraires mais inséparables. Le langage humain est un système qui permet de désigner des objets, actions, états de manière compréhensible par autrui.",r:"Saussure, Cours de linguistique générale"},
{l:"C",c:"Cependant le langage humain ne peut se réduire à un code : comprendre un énoncé exige d'interpréter, faire des hypothèses, contextualiser. Benveniste : signal ≠ symbole — l'animal réagit au signal, l'homme interprète le symbole.",r:"Benveniste, Problèmes de linguistique générale"},
]},
{new:true,n:"Axe B",t:"Le langage a d'autres fonctions que la communication",pb:"En quoi le langage dépasse-t-il la simple transmission d'information ?",
sps:[
{l:"A",c:"Argument par l'absurde (II.1) : le langage échoue trop souvent à communiquer efficacement pour qu'on considère qu'il ne sert qu'à ça. (a) Pb des termes généraux — les mots masquent le particulier ; seul le poète peut saisir la singularité, voire créer un mot : 'spleen' de Baudelaire (Bergson, Le Rire). (b) Mobilité signifiante — glissements sémantiques : 'bonnomatisme', 'qualitatif', 'passion' (pâtir/passivité), 'adulti' (quelqu'un qui m'aime). (c) Injonctions paradoxales : 'Soyez spontané !' — ordre auquel il est logiquement impossible de répondre par l'obéissance, car si on y obéit on n'y obéit pas (Watzlawick).",r:"Bergson, Le Rire ; Watzlawick, Une logique de la communication"},
{l:"B",c:"Jakobson identifie 6 fonctions du langage. Les fonctions émotive (marques d'affect : 'Malheureusement…', modalisateurs), conative (impératif, persuasion : 'Donne-moi de l'eau !'), phatique ('Allô ! N'est-ce pas ?'), métalinguistique ('Que veut dire… ?') et poétique dépassent la seule transmission d'information référentielle.",r:"Jakobson, Essais de linguistique générale"},
{l:"C",c:"Le langage a aussi une fonction sociale/politique : facteur d'appartenance et d'identité culturelle. Il peut être instrument de pouvoir (novlangue d'Orwell : supprimer les mots c'est supprimer les pensées) ou mémoire collective (Arendt). La langue est la dimension culturelle d'une communauté.",r:"Orwell, 1984 ; Arendt, La Crise de la culture"},
]},
{new:true,n:"Axe C",t:"Loin d'être un simple moyen, le langage peut être une fin en soi",pb:"Le langage n'est-il qu'un simple moyen ou peut-il être une fin en lui-même ?",
sps:[
{l:"A",c:"La fonction poétique du langage (Jakobson) centre le message sur lui-même, détruisant le rapport utilitaire entre signifiant et signifié. Le signifiant devient matière expressive : synesthésie (Rimbaud : 'A noir, E blanc, I rouge, O bleu, U vert'), calligrammes (Apollinaire), jeux de sonorités. Le langage dépasse la communication pour atteindre l'expérimentation sensorielle.",r:"Jakobson, Essais de linguistique générale ; Rimbaud, 'L'Alchimie du verbe' ; Apollinaire"},
{l:"B",c:"Austin : le langage performatif est un mode d'action — certaines paroles font des choses. 'Je vous déclare mari et femme' modifie la réalité. Le langage n'est pas seulement représentation mais constitution du réel social. Le droit repose sur cette performativité.",r:"Austin, Quand dire, c'est faire, 1962"},
{l:"C",c:"Le langage structure et met en forme la pensée (Saussure, Hegel) — la pensée sans langage n'est qu'une nébuleuse indistincte. Plus profond encore (Boroditsky, framework BIG) : la langue oriente la manière de percevoir le monde — comptage, couleurs, espace, genre grammatical, attribution causale. Le langage n'est pas seulement moyen de la pensée mais sa condition de possibilité.",r:"Saussure, CLG ; Hegel, Philosophie de l'esprit ; Boroditsky, 'How language shapes the way we think', TED 2017"},
]},
],
exemples:[
{new:true,tag:"Littérature",tit:"Tour de Babel (Genèse 11)",body:"Mythe fondateur de l'incommunicabilité : les hommes parlaient une seule langue, construisaient la Tour de Babel. Dieu confond leurs langues et les disperse. Illustre que la multiplicité des langues est à la fois richesse (diversité des mondes) et obstacle (incompréhension). Borgès, Cassin sur les intraduisibles prolongent cette réflexion.",lien:"→ Limite de la communication, intraduisibles"},
{new:true,tag:"Littérature",tit:"Orwell — 1984 et la novlangue",body:"La novlangue est conçue pour rendre hérétique impossible : si 'liberté' est supprimé du dictionnaire, le concept disparaît avec le mot. 'Bienbon' remplace 'bien', 'doubleplusbienbon' est le superlatif absolu. Illustre la thèse que le langage conditionne la pensée — et que son contrôle est instrument de pouvoir totalitaire.",lien:"→ Langage, Liberté, État (notions liées)"},
{new:true,tag:"Philosophie — Cours",tit:"Austin — Énoncés performatifs",body:"'Je vous déclare mari et femme' (le maire), 'Je baptise ce bateau la Queen Elisabeth', 'Je lègue ma montre à mon frère'. Ces phrases ne décrivent pas une action — elles la font. Elles modifient la réalité sociale. Conditions de félicité : statut du locuteur, reconnaissance. Un convive éméché ne peut pas déclarer mari et femme deux invités.",lien:"→ Langage comme action, Travail, Droit"},
{new:true,tag:"Science — Cours",tit:"Boroditsky — Le langage oriente la perception (BIG framework)",body:"Framework BIG (S-N-E-O) — 5 domaines d'expérimentation : (1) Organisation spatiale : les Kuuk Thaayorre utilisent les points cardinaux → orientation spatiale extraordinaire ; (2) Comptage (deep/count) : la langue structure le dénombrement ; (3) Perception des couleurs (early/colors) : catégories linguistiques influencent la discrimination visuelle ; (4) Genre grammatical (Broad) : 'pont' → robuste/fort en espagnol (masculin), élégant/beau en allemand (féminin) — associations de caractères lents partiellement genrées culturellement ; (5) Attribution causale (Weighty) : la langue influence qui l'on accuse dans un accident. 'Language crafts reality.'",lien:"→ Langage, Conscience, Raison, relativisme linguistique"},
{new:true,tag:"Littérature — Cours",tit:"Rimbaud — 'L'Alchimie du verbe' et synesthésie",body:"Fonction poétique (Jakobson) : le signifiant devient matière expressive. Rimbaud : 'J'inventais la couleur des voyelles / A noir, E blanc, I rouge, O bleu, U vert.' Puis : 'le bon son de septembre ou je sentais des gouttes, / I rosée à mon front comme un vin de vigueur.' Le poète exploite la synesthésie — correspondance entre sons et sensations — pour dépasser la fonction référentielle. Le langage comme fin en soi. Voir aussi : Calligrammes d'Apollinaire (forme visuelle du poème).",lien:"→ Fonction poétique (Jakobson), Art, langage comme fin en soi"},
{new:true,tag:"Philosophie — Cours",tit:"Jakobson — Les 6 fonctions (publicités)",body:"'Dior, j'adore' → fonction poétique (jeu de sonorités). 'Allô, vous m'entendez ?' → fonction phatique. 'Vite ! Dépêche-toi !' → fonction conative. 'Hélas ! Je suis arrivé trop tard' → fonction émotive. 'Que voulez-vous dire par là ?' → fonction métalinguistique. 'Le train est en retard' → fonction référentielle.",lien:"→ Fonctions du langage, Communication"},
{new:true,tag:"Philosophie — Cours",tit:"Watzlawick — Injonctions paradoxales",body:"'Soyez spontané !' : paradoxe de communication — on ne peut obéir qu'en désobéissant à l'esprit de l'injonction. Autres exemples : 'Tu devrais m'aimer', 'Ne sois pas si docile'. Ces paradoxes révèlent que le langage peut se retourner contre sa propre fonction et produire de la souffrance psychique (double bind de Bateson).",lien:"→ Limites de la communication, Injonction paradoxale"},
],

inconscient:{c:"#7B4F9E",l:"Inconscient",s:"L'inconscient remet-il en cause notre liberté ?",
def:"L'<span class='kw'>inconscient</span> désigne chez Freud l'ensemble des représentations refoulées qui continuent d'agir sur notre psychisme à notre insu. Question centrale : si nous sommes déterminés par des forces que nous ne connaissons pas, sommes-nous encore libres et responsables ?<details><summary>Approfondir la notion</summary><div class='def-sec'><div class='def-sec-title'>Le modèle freudien</div><div class='def-sec-body'>Freud construit deux topiques : (1) <strong>Inconscient / Préconscient / Conscient</strong> ; (2) <strong>Ça / Moi / Surmoi</strong>. L'inconscient contient des désirs refoulés, des pulsions (Éros/Thanatos) que la censure maintient hors de la conscience. Il se manifeste dans les rêves, les actes manqués, les lapsus, les symptômes névrotiques.</div></div><div class='def-sec'><div class='def-sec-title'>La triple blessure narcissique</div><div class='def-sec-body'>Freud : trois blessures infligées à l'orgueil de l'humanité : (1) Copernic — la Terre n'est pas le centre du cosmos ; (2) Darwin — l'homme est un animal parmi d'autres ; (3) Freud lui-même — le moi n'est pas maître en sa propre maison.</div></div></details>",
auteurs:[
{n:"Freud",w:"L'Interprétation des rêves, 1900 / Introduction à la psychanalyse, 1916",i:"L'inconscient est le psychisme lui-même dans sa réalité profonde. Il contient des désirs refoulés qui se manifestent dans les rêves (voie royale vers l'inconscient), les actes manqués et les symptômes. La cure vise à rendre conscient l'inconscient pour que le Moi reprenne là où était le Ça.",q:"'Le moi n'est pas maître en sa propre maison'"},
],
textes:[],axes:[],
exemples:[{tag:"Psychanalyse — Cours",tit:"Freud — Triple blessure narcissique",body:"Copernic (la Terre n'est pas le centre), Darwin (l'homme est un animal), Freud (le moi n'est pas maître). Trois humiliations qui remettent en cause la prétention de l'homme à être le centre du monde.",lien:"→ Conscience, Liberté"}],
liens:["Conscience","Liberté","Nature"],
diss:["L'inconscient remet-il en cause la liberté ?","L'inconscient est-il une excuse ?","Peut-on se connaître soi-même ?","La psychanalyse est-elle une science ?"]
},

raison:{c:"#2E86AB",l:"Raison",s:"La raison peut-elle tout expliquer ?",
def:"La <span class='kw'>raison</span> est la faculté humaine de penser de manière logique et d'établir des vérités par démonstration. Elle peut désigner la <span class='kw'>raison théorique</span> (connaître) ou la <span class='kw'>raison pratique</span> (agir moralement). Question : la raison est-elle infaillible ? Y a-t-il des limites à la rationalité ?",
auteurs:[
{n:"Kant",w:"Critique de la raison pure, 1781",i:"La raison pure a des limites : elle ne peut connaître que les phénomènes (le monde tel qu'il nous apparaît) et non les noumènes (les choses en soi). Quand elle dépasse ses limites, elle produit des antinomies (contradictions). Révolution copernicienne : c'est le sujet qui structure l'expérience.",q:"'La raison produit des illusions inévitables quand elle dépasse ses limites'"},
{n:"Pascal",w:"Pensées, 1670",i:"La raison a des limites : le cœur a ses raisons que la raison ne connaît point. Le roseau pensant : l'homme est la plus faible des roseaux — mais un roseau pensant. Sa dignité est dans la pensée, mais sa condition est d'être un être fini.",q:"'Le cœur a ses raisons que la raison ne connaît point'"},
],
textes:[],axes:[],exemples:[],
liens:["Science","Vérité","Langage","Conscience","Nature"],
diss:["La raison peut-elle tout expliquer ?","Y a-t-il des vérités inaccessibles à la raison ?","La raison est-elle universelle ?","Peut-on être raisonnable sans être rationnel ?"]
},

religion:{c:"#C4682A",l:"Religion",s:"La religion est-elle compatible avec la raison ?",
def:"La <span class='kw'>religion</span> est un ensemble de croyances et de pratiques relatives au sacré, au divin ou à ce qui transcende l'ordre naturel. Elle articule une vision du monde, une morale et des rites. Question : la religion est-elle une illusion, un besoin ou une vérité ?",
auteurs:[
{n:"Nietzsche",w:"La Généalogie de la morale, 1887 / Le Gai Savoir, 1882",i:"'Dieu est mort' — la foi en Dieu a perdu sa crédibilité dans la culture moderne. La morale judéo-chrétienne est une 'morale d'esclaves' née du ressentiment. Il faut une 'transvaluation de toutes les valeurs'.",q:"'Dieu est mort ! Et c'est nous qui l'avons tué !'"},
{n:"Freud",w:"L'Avenir d'une illusion, 1927",i:"La religion est une illusion collective — une projection des désirs infantiles (le père protecteur). Elle remplit une fonction d'apaisement face à l'angoisse de la mort et à la détresse humaine. Non nécessairement fausse mais motivée par le désir.",q:"'La religion est l'illusion universelle obsessionnelle de l'humanité'"},
],
textes:[],axes:[],exemples:[],
liens:["Vérité","Raison","Science","État","Liberté"],
diss:["La religion est-elle une illusion ?","La foi est-elle raisonnable ?","La religion favorise-t-elle ou entrave-t-elle la liberté ?","Peut-on se passer de religion ?"]
},

science:{c:"#1A7A4A",l:"Science",s:"La science peut-elle tout expliquer ?",
def:"La <span class='kw'>science</span> est une connaissance rationnelle, méthodique et vérifiable des phénomènes naturels ou humains. Elle se distingue de la croyance par ses exigences de preuve et de réfutabilité. Question : la science produit-elle la vérité ? Y a-t-il des domaines hors de sa portée ?",
auteurs:[
{n:"Popper",w:"La Logique de la découverte scientifique, 1934",i:"Critère de démarcation : une théorie est scientifique si elle est réfutable (falsifiable). La psychanalyse et le marxisme ne sont pas des sciences car elles ne peuvent être réfutées. La science progresse par conjectures et réfutations.",q:"'La science n'est pas un corps de connaissances certaines mais de conjectures audacieuses'"},
{n:"Kuhn",w:"La Structure des révolutions scientifiques, 1962",i:"La science progresse par paradigmes — matrices disciplinaires partagées. La révolution scientifique est un changement de paradigme, non une accumulation linéaire. Exemple : passage de Ptolémée à Copernic.",q:"'Un paradigme est ce que les membres d'une communauté scientifique partagent'"},
],
textes:[],axes:[],exemples:[],
liens:["Raison","Vérité","Technique","Nature","Langage"],
diss:["La science peut-elle tout expliquer ?","Y a-t-il une vérité scientifique unique ?","La science est-elle objective ?","Le progrès scientifique est-il nécessairement un progrès moral ?"]
},

temps:{c:"#4E6D8C",l:"Temps",s:"Pouvons-nous maîtriser le temps ?",
def:"Le <span class='kw'>temps</span> peut être envisagé comme dimension physique (temps mesuré), psychologique (durée vécue) ou existentiel (rapport à la mort, à la mémoire). Question : le temps nous appartient-il ? Peut-on vivre pleinement dans le temps ?",
auteurs:[
{n:"Bergson",w:"Essai sur les données immédiates de la conscience, 1889",i:"La durée (durée vécue intérieure) est irréductible au temps mesuré par l'horloge. Le temps scientifique spatialise la durée — il la trahit. La vraie liberté se situe dans la durée vécue, non dans le déterminisme des sciences.",q:"'La durée est le progrès continu du passé qui ronge l'avenir'"},
{n:"Heidegger",w:"Être et Temps, 1927",i:"L'être humain (Dasein) est fondamentalement 'être-vers-la-mort'. La temporalité est la structure fondamentale de l'existence. L'authenticité consiste à assumer sa finitude au lieu de fuir dans le 'On' (das Man) anonyme.",q:"'L'être-là est fondamentalement un être-vers-la-mort'"},
],
textes:[],axes:[],exemples:[],
liens:["Conscience","Liberté","Travail","Nature","Science"],
diss:["Le temps nous appartient-il ?","Peut-on maîtriser le temps ?","La conscience du temps est-elle une malédiction ?","Peut-on vivre sans passé ?"]
},

verite:{c:"#8A6B2E",l:"Vérité",s:"Peut-on douter de tout ?",
def:"La <span class='kw'>vérité</span> est l'adéquation entre un jugement et la réalité (conception classique). Mais on distingue vérité <span class='kw'>absolue</span> (universelle, nécessaire) et vérité <span class='kw'>relative</span> (dépendante d'un contexte). Question : comment distinguer le vrai du faux ? Y a-t-il des vérités définitives ?",
auteurs:[
{n:"Descartes",w:"Méditations métaphysiques, 1641",i:"Le doute méthodique comme chemin vers la vérité : douter de tout ce qui peut être mis en doute. La seule certitude indubitable : le cogito. À partir de là, reconstruire un édifice de connaissances certaines.",q:"'Pour examiner la vérité, il est besoin de douter une fois en sa vie de toutes choses'"},
{n:"Nietzsche",w:"Par-delà le Bien et le Mal, 1886",i:"La vérité n'est pas donnée mais construite — elle est une perspective parmi d'autres. 'Il n'y a pas de faits, il n'y a que des interprétations.' La volonté de vérité cache une volonté de puissance.",q:"'Il n'y a pas de faits, seulement des interprétations'"},
],
textes:[],axes:[],exemples:[],
liens:["Science","Raison","Langage","Conscience","Religion"],
diss:["Peut-on douter de tout ?","La vérité existe-t-elle ?","Peut-on vivre sans illusions ?","Le doute est-il nécessaire à la connaissance ?","Faut-il toujours dire la vérité ?"]
}
