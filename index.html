const AM={
"Descartes":{bio:"Philosophe et mathématicien français (1596–1650). Fondateur du rationalisme moderne, il cherche à atteindre des vérités certaines par le doute méthodique.",courant:"Rationalisme",periode:"XVIIe siècle",themes:["cogito","dualisme corps/âme","méthode","maîtrise de la nature","certitude"],dialogues:[{dir:"oppose",auteur:"Hume",sujet:"certitudes de la raison",desc:"Hume montre qu'aucune relation causale n'est nécessaire : ce que Descartes tenait pour certain n'est qu'une habitude psychologique."},{dir:"oppose",auteur:"Freud",sujet:"transparence de la conscience",desc:"Freud renverse le cogito : le moi n'est pas maître en sa propre maison — l'inconscient détermine nos actes à notre insu."},{dir:"prolonge",auteur:"Spinoza",sujet:"rationalisme",desc:"Spinoza radicalise Descartes en éliminant le dualisme corps/âme et en identifiant Dieu, la Nature et la Substance."}]},
"Freud":{bio:"Neurologue autrichien (1856–1939), fondateur de la psychanalyse. Il découvre l'inconscient comme instance psychique déterminant nos actes à notre insu.",courant:"Psychanalyse",periode:"XIXe–XXe siècle",themes:["inconscient","ça/moi/surmoi","refoulement","rêve","pulsions"],dialogues:[{dir:"oppose",auteur:"Descartes",sujet:"souveraineté du cogito",desc:"Le cogito cartésien suppose que la conscience est transparente à elle-même — Freud montre que ce présupposé est faux."},{dir:"repond",auteur:"Sartre",sujet:"liberté et inconscient",desc:"Sartre refuse l'inconscient freudien : la censure doit avoir conscience de ce qu'elle refoule, ce qui la rend de 'mauvaise foi'."},{dir:"prolonge",auteur:"Nietzsche",sujet:"critique du sujet rationnel",desc:"Nietzsche annonce Freud en montrant que nos motivations réelles sont masquées par des rationalisations."}]},
"Sartre":{bio:"Philosophe français (1905–1980), chef de file de l'existentialisme. Sa thèse centrale : l'existence précède l'essence — l'homme se définit uniquement par ses actes.",courant:"Existentialisme / Phénoménologie",periode:"XXe siècle",themes:["liberté radicale","mauvaise foi","existence précède l'essence","intersubjectivité","engagement"],dialogues:[{dir:"oppose",auteur:"Freud",sujet:"inconscient et liberté",desc:"Sartre refuse l'inconscient : admettre des forces qui nous déterminent à notre insu, c'est être de mauvaise foi."},{dir:"repond",auteur:"Bourdieu",sujet:"déterminisme social et liberté",desc:"Bourdieu répond à Sartre : la liberté n'est pas pure spontanéité — elle est conditionnée par les structures sociales, mais leur connaissance la rend possible."},{dir:"prolonge",auteur:"Hegel",sujet:"conscience de soi",desc:"Sartre hérite de Hegel la structure de la conscience (pour-soi/en-soi) mais refuse la réconciliation dialectique finale."}]},
"Hegel":{bio:"Philosophe allemand (1770–1831), figure majeure de l'idéalisme. Sa dialectique (thèse/antithèse/synthèse) est une méthode pour comprendre le devenir de l'Esprit dans l'histoire.",courant:"Idéalisme allemand",periode:"XVIIIe–XIXe siècle",themes:["dialectique","maître/esclave","Esprit","liberté objective","État éthique"],dialogues:[{dir:"oppose",auteur:"Kant",sujet:"liberté et institutions",desc:"Kant place la liberté dans la raison individuelle ; Hegel la situe dans les institutions concrètes (famille, société civile, État)."},{dir:"oppose",auteur:"Marx",sujet:"moteur de l'histoire",desc:"Marx 'retourne' Hegel sur ses pieds : ce n'est pas l'Esprit mais les conditions matérielles qui font l'histoire."},{dir:"repond",auteur:"Rousseau",sujet:"volonté générale",desc:"Hegel reprend la volonté générale de Rousseau mais la réalise dans l'État comme vie éthique concrète, non comme contrat abstrait."}]},
"Kant":{bio:"Philosophe allemand (1724–1804), auteur des trois Critiques. Sa 'révolution copernicienne' : c'est le sujet qui structure l'expérience possible, non l'inverse.",courant:"Idéalisme transcendantal",periode:"XVIIIe siècle",themes:["impératif catégorique","autonomie morale","beau sans concept","génie","devoir"],dialogues:[{dir:"repond",auteur:"Hume",sujet:"fondements de la connaissance",desc:"Hume réveille Kant de son 'sommeil dogmatique' — en réponse, Kant montre que la causalité est une catégorie a priori de l'entendement."},{dir:"oppose",auteur:"Mill",sujet:"fondements de la morale",desc:"Mill fonde la morale sur le bonheur ; Kant refuse tout fondement empirique — le devoir est inconditionnel, indépendant des conséquences."},{dir:"oppose",auteur:"Aristote",sujet:"bonheur et morale",desc:"Aristote fait du bonheur la fin ultime ; Kant les sépare radicalement — le bonheur ne peut fonder la morale."}]},
"Marx":{bio:"Philosophe et économiste allemand (1818–1883). Fondateur du matérialisme historique : les rapports de production déterminent la superstructure sociale, juridique et idéologique.",courant:"Matérialisme historique",periode:"XIXe siècle",themes:["aliénation","plus-value","infrastructure/superstructure","lutte des classes","dépérissement de l'État"],dialogues:[{dir:"oppose",auteur:"Hegel",sujet:"moteur de l'histoire",desc:"Marx renverse Hegel : ce n'est pas l'Esprit mais les conditions matérielles qui font l'histoire ('retourner Hegel sur ses pieds')."},{dir:"oppose",auteur:"Nozick",sujet:"justice et propriété",desc:"Nozick défend la propriété individuelle absolue ; Marx voit dans la propriété privée la source même de l'exploitation."},{dir:"prolonge",auteur:"Engels",sujet:"matérialisme dialectique",desc:"Engels co-construit le marxisme avec Marx et développe l'analyse de l'État comme instrument de domination de classe."}]},
"Rousseau":{bio:"Philosophe genevois (1712–1778). Il théorise le contrat social et la volonté générale, et soutient que l'homme est naturellement bon mais corrompu par la société.",courant:"Lumières / Contractualisme",periode:"XVIIIe siècle",themes:["contrat social","volonté générale","liberté civile","état de nature","inégalité"],dialogues:[{dir:"oppose",auteur:"Hobbes",sujet:"état de nature",desc:"Hobbes voit l'état de nature comme une guerre de tous contre tous ; Rousseau le voit comme un état de bonheur naturel corrompu par la propriété."},{dir:"oppose",auteur:"Locke",sujet:"propriété et contrat",desc:"Locke fonde le contrat pour protéger la propriété naturelle ; Rousseau voit dans la propriété l'origine de l'inégalité."},{dir:"prolonge",auteur:"Kant",sujet:"autonomie et loi",desc:"Kant s'inspire de Rousseau pour penser l'autonomie morale : se donner sa propre loi, c'est obéir à la loi qu'on s'est prescrite."}]},
"Hobbes":{bio:"Philosophe anglais (1588–1679). Il théorise un État souverain absolu (le Léviathan) comme seul garant de la paix civile contre la violence de l'état de nature.",courant:"Contractualisme / Absolutisme",periode:"XVIIe siècle",themes:["état de nature","Léviathan","contrat social","sécurité","guerre de tous contre tous"],dialogues:[{dir:"oppose",auteur:"Rousseau",sujet:"nature humaine",desc:"Rousseau renverse Hobbes : l'homme n'est pas naturellement violent — c'est la société et la propriété qui le corrompent."},{dir:"oppose",auteur:"Locke",sujet:"étendue du contrat",desc:"Locke limite le contrat aux droits naturels à préserver ; Hobbes exige l'abandon total de la liberté naturelle au souverain."}]},
"Locke":{bio:"Philosophe anglais (1632–1704). Père du libéralisme politique, il défend les droits naturels inaliénables et la légitimité de la révolution contre un gouvernement tyrannique.",courant:"Empirisme / Libéralisme",periode:"XVIIe siècle",themes:["droits naturels","contrat révocable","propriété","identité mémorielle","tolérance"],dialogues:[{dir:"oppose",auteur:"Hobbes",sujet:"souveraineté",desc:"Hobbes veut un souverain absolu irrévocable ; Locke pose que le contrat est révocable si le gouvernement viole les droits naturels."},{dir:"prolonge",auteur:"Mill",sujet:"libéralisme",desc:"Mill hérite de Locke le souci de protéger les libertés individuelles contre l'État et la tyrannie de la majorité."}]},
"Nietzsche":{bio:"Philosophe allemand (1844–1900). Critique radical de la morale chrétienne et du rationalisme occidental. Il annonce la 'mort de Dieu' et propose la figure du 'surhomme'.",courant:"Généalogie / Philosophie de la vie",periode:"XIXe siècle",themes:["volonté de puissance","mort de Dieu","éternel retour","généalogie de la morale","travail comme police"],dialogues:[{dir:"oppose",auteur:"Kant",sujet:"morale universelle",desc:"Kant fonde une morale universelle ; Nietzsche la déconstruit par la généalogie : les valeurs morales expriment des rapports de force."},{dir:"prolonge",auteur:"Schopenhauer",sujet:"volonté",desc:"Nietzsche hérite de Schopenhauer la centralité de la volonté, mais la réinterprète positivement comme volonté de puissance."},{dir:"oppose",auteur:"Freud",sujet:"inconscient",desc:"Nietzsche anticipe Freud en montrant les rationalisations masquant nos motivations réelles, mais sans le cadre clinique."}]},
"Spinoza":{bio:"Philosophe néerlandais (1632–1677). Il développe un panthéisme rationnel : Dieu est identique à la Nature. Sa philosophie vise la libération par la connaissance.",courant:"Rationalisme / Panthéisme",periode:"XVIIe siècle",themes:["Dieu-Nature","liberté comme nécessité comprise","conatus","déterminisme","Éthique"],dialogues:[{dir:"prolonge",auteur:"Descartes",sujet:"rationalisme",desc:"Spinoza radicalise le rationalisme cartésien en éliminant le dualisme et en construisant une éthique more geometrico."},{dir:"oppose",auteur:"Sartre",sujet:"liberté",desc:"Sartre affirme une liberté absolue ; Spinoza montre que le libre arbitre est une illusion née de l'ignorance des causes."},{dir:"prolonge",auteur:"Engels",sujet:"liberté et nécessité",desc:"Engels reprend Spinoza : la liberté consiste dans la connaissance des nécessités naturelles, non dans leur absence."}]},
"Hannah Arendt":{bio:"Philosophe politique américano-allemande (1906–1975). Elle analyse les régimes totalitaires et la condition humaine moderne. Son concept de 'banalité du mal' est central.",courant:"Phénoménologie / Philosophie politique",periode:"XXe siècle",themes:["banalité du mal","labor/work/action","culture de masse","totalitarisme","permanence de l'œuvre"],dialogues:[{dir:"oppose",auteur:"Marx",sujet:"travail",desc:"Marx voit dans le travail la source de l'émancipation ; Arendt distingue le labor (aliénant, cyclique) du work (créateur) et de l'action (politique)."},{dir:"repond",auteur:"Kant",sujet:"jugement moral",desc:"Arendt reprend Kant pour penser le jugement politique : juger sans règle universelle, comme dans le jugement esthétique."}]},
"Bourdieu":{bio:"Sociologue français (1930–2002). Il analyse les mécanismes de reproduction sociale et développe les concepts d'habitus, de capital culturel et de violence symbolique.",courant:"Sociologie critique",periode:"XXe siècle",themes:["habitus","capital culturel","violence symbolique","reproduction sociale","goût de classe"],dialogues:[{dir:"oppose",auteur:"Sartre",sujet:"liberté et déterminisme",desc:"Sartre affirme une liberté radicale ; Bourdieu montre que nos choix sont conditionnés par l'habitus — mais la connaissance des déterminismes ouvre un espace de liberté."},{dir:"prolonge",auteur:"Marx",sujet:"domination",desc:"Bourdieu prolonge Marx en ajoutant la dimension symbolique : la domination culturelle reproduit les inégalités de classe."}]},
"Platon":{bio:"Philosophe grec (v. 428–348 av. J.-C.), disciple de Socrate. Il développe la théorie des Idées : le monde sensible n'est que l'ombre d'un monde intelligible parfait.",courant:"Idéalisme platonicien",periode:"Antiquité grecque",themes:["théorie des Idées","justice","âme","cité idéale","imitation (mimésis)"],dialogues:[{dir:"oppose",auteur:"Aristote",sujet:"nature des Idées",desc:"Aristote refuse les Idées séparées de Platon : la forme est immanente à la matière concrète, non transcendante."},{dir:"repond",auteur:"Rousseau",sujet:"contrat et cité",desc:"Rousseau hérite de Platon l'idée que l'État forme les citoyens, mais en renversant la hiérarchie : c'est le peuple qui est souverain."}]},
"Aristote":{bio:"Philosophe grec (384–322 av. J.-C.), disciple de Platon. Sa philosophie est empirique et encyclopédique — il fonde la logique, l'éthique et la politique sur l'observation du réel.",courant:"Empirisme antique / Aristotélisme",periode:"Antiquité grecque",themes:["eudaimonia","vertu","forme/matière","animal politique","technê / main"],dialogues:[{dir:"oppose",auteur:"Platon",sujet:"théorie des Idées",desc:"Platon sépare le monde sensible du monde intelligible ; Aristote ancre les formes dans la matière concrète."},{dir:"oppose",auteur:"Kant",sujet:"bonheur et morale",desc:"Aristote fait du bonheur (eudaimonia) la fin ultime ; Kant sépare radicalement bonheur et devoir moral."}]},
"Mill":{bio:"Philosophe et économiste britannique (1806–1873). Chef de file de l'utilitarisme, il défend aussi les libertés individuelles contre la 'tyrannie de la majorité'.",courant:"Utilitarisme / Libéralisme",periode:"XIXe siècle",themes:["principe de non-nuisance","bonheur du plus grand nombre","liberté d'expression","utilitarisme","plaisirs inférieurs/supérieurs"],dialogues:[{dir:"oppose",auteur:"Kant",sujet:"fondements de la morale",desc:"Kant fonde la morale sur le devoir rationnel ; Mill la fonde sur les conséquences (bonheur produit)."},{dir:"prolonge",auteur:"Locke",sujet:"libertés individuelles",desc:"Mill hérite de Locke et radicalise la défense des libertés individuelles, notamment la liberté d'expression absolue."}]},
"Jonas":{bio:"Philosophe allemand (1903–1993). Face aux risques de la technique moderne, il propose une éthique de la responsabilité orientée vers la préservation de la vie future.",courant:"Éthique de la responsabilité",periode:"XXe siècle",themes:["principe responsabilité","heuristique de la peur","générations futures","irréversible","technique"],dialogues:[{dir:"repond",auteur:"Kant",sujet:"éthique",desc:"Jonas prolonge Kant mais l'adapte : l'impératif catégorique doit intégrer les effets à long terme sur la biosphère."},{dir:"oppose",auteur:"Descartes",sujet:"maîtrise de la nature",desc:"Descartes veut nous rendre 'maîtres et possesseurs de la nature' ; Jonas montre que cette maîtrise crée des responsabilités nouvelles et inédites."}]},
"Heidegger":{bio:"Philosophe allemand (1889–1976). Sa question centrale est celle du sens de l'Être. Il analyse la technique moderne comme un mode de dévoilement réduisant le réel à un 'fonds disponible'.",courant:"Ontologie / Phénoménologie existentiale",periode:"XXe siècle",themes:["être-là (Dasein)","technique comme dévoilement","fonds disponible","authenticité","finitude"],dialogues:[{dir:"prolonge",auteur:"Nietzsche",sujet:"nihilisme",desc:"Heidegger voit en Nietzsche l'achèvement de la métaphysique occidentale — le nihilisme que Nietzsche annonce, Heidegger le diagnostique."},{dir:"oppose",auteur:"Descartes",sujet:"rapport à la nature",desc:"Descartes inaugure la domination de la nature ; Heidegger montre que la technique moderne en est l'aboutissement — mise à disposition totale du réel."}]},
"Simondon":{bio:"Philosophe français (1924–1989). Il développe une philosophie des objets techniques dépassant à la fois la technophobie et l'enthousiasme naïf.",courant:"Philosophie de la technique",periode:"XXe siècle",themes:["individuation","culture technique","aliénation par méconnaissance","objet technique","organisateur permanent"],dialogues:[{dir:"oppose",auteur:"Heidegger",sujet:"rapport à la technique",desc:"Heidegger voit dans la technique une menace ontologique ; Simondon propose une réconciliation par la connaissance du fonctionnement réel des machines."},{dir:"repond",auteur:"Marx",sujet:"aliénation",desc:"Marx voit l'aliénation dans les rapports de production ; Simondon la localise dans la méconnaissance — comprendre les machines, c'est s'émanciper."}]},
"Weil":{bio:"Philosophe et militante française (1909–1943). Elle combine engagement politique (usines, guerre d'Espagne) et réflexion sur le travail, l'enracinement et la condition ouvrière.",courant:"Philosophie sociale / Mysticisme",periode:"XXe siècle",themes:["condition ouvrière","enracinement","travail non servile","devoir de l'ingénieur","attention"],dialogues:[{dir:"prolonge",auteur:"Marx",sujet:"aliénation ouvrière",desc:"Weil hérite de Marx la critique de l'aliénation ouvrière, mais l'ancre dans une expérience vécue des usines et une dimension spirituelle."},{dir:"repond",auteur:"Nietzsche",sujet:"travail et sens",desc:"Nietzsche critique le culte du travail ; Weil cherche, elle, les conditions d'un travail non servile porteur de sens."}]},
"Weber":{bio:"Sociologue et économiste allemand (1864–1920). Il analyse les fondements de la légitimité politique et le processus de rationalisation des sociétés modernes.",courant:"Sociologie compréhensive",periode:"XIXe–XXe siècle",themes:["monopole violence légitime","légitimité (3 types)","éthique de conviction/responsabilité","rationalisation","bureaucratie"],dialogues:[{dir:"oppose",auteur:"Marx",sujet:"moteur de l'histoire",desc:"Marx voit l'économie comme déterminant ultime ; Weber montre que les idées (notamment religieuses) peuvent aussi être motrices — cf. L'éthique protestante."}]},
"Tocqueville":{bio:"Historien et philosophe politique français (1805–1859). Observateur lucide de la démocratie américaine, il met en garde contre le despotisme doux des démocraties modernes.",courant:"Libéralisme politique",periode:"XIXe siècle",themes:["despotisme doux","égalité des conditions","individualisme démocratique","liberté civile","participation citoyenne"],dialogues:[{dir:"prolonge",auteur:"Mill",sujet:"tyrannie de la majorité",desc:"Mill et Tocqueville convergent : la démocratie menace la liberté non seulement par la loi mais par la pression sociale de la majorité."},{dir:"repond",auteur:"Rousseau",sujet:"démocratie réelle",desc:"Rousseau idéalise la volonté générale ; Tocqueville montre les dérives concrètes des démocraties réelles."}]},
"Schopenhauer":{bio:"Philosophe allemand (1788–1860). Il développe un pessimisme métaphysique fondé sur la 'volonté de vivre' — force aveugle et insatiable à l'origine de toute souffrance.",courant:"Pessimisme / Volontarisme",periode:"XIXe siècle",themes:["volonté de vivre","pessimisme","désir insatiable","art comme salut","ascèse"],dialogues:[{dir:"oppose",auteur:"Aristote",sujet:"bonheur",desc:"Aristote croit au bonheur comme fin accessible ; Schopenhauer montre que la satisfaction est toujours provisoire — le désir est infini."},{dir:"prolonge",auteur:"Nietzsche",sujet:"volonté",desc:"Nietzsche hérite de Schopenhauer la centralité de la volonté, mais la réinterprète positivement comme volonté de puissance."}]},
"Épicure":{bio:"Philosophe grec (341–270 av. J.-C.), fondateur de l'épicurisme. Sa philosophie vise l'ataraxie (paix de l'âme) par le calcul raisonné des désirs et la retraite dans le jardin.",courant:"Épicurisme",periode:"Antiquité grecque",themes:["ataraxie","aponie","classification des désirs","amitié","mort sans crainte"],dialogues:[{dir:"oppose",auteur:"Aristote",sujet:"vie bonne",desc:"Aristote fait du bonheur une activité vertueuse engagée dans la cité ; Épicure préfère le retrait dans le jardin et l'amitié."},{dir:"oppose",auteur:"Kant",sujet:"morale et bonheur",desc:"Kant refuse que le bonheur fonde la morale ; Épicure en fait au contraire le guide suprême de toute conduite de vie."}]},
"Rawls":{bio:"Philosophe politique américain (1921–2002). Sa Théorie de la justice propose un modèle fondé sur le 'voile d'ignorance' et le principe de différence.",courant:"Libéralisme égalitaire",periode:"XXe siècle",themes:["voile d'ignorance","principe de différence","équité","désobéissance civile légitime","justice comme équité"],dialogues:[{dir:"oppose",auteur:"Nozick",sujet:"redistribution",desc:"Nozick défend la propriété absolue et refuse toute redistribution ; Rawls admet les inégalités si elles bénéficient aux plus défavorisés."},{dir:"prolonge",auteur:"Kant",sujet:"universalisme moral",desc:"Le voile d'ignorance de Rawls est un dispositif kantien : trouver des principes que tout agent rationnel pourrait universaliser."}]},
"Nozick":{bio:"Philosophe américain (1938–2002), défenseur du libertarianisme. Il soutient que l'État minimal est le seul légitime et que toute redistribution viole les droits individuels.",courant:"Libertarianisme",periode:"XXe siècle",themes:["État minimal","droits individuels","propriété","anti-redistribution","titres légitimes"],dialogues:[{dir:"oppose",auteur:"Rawls",sujet:"redistribution",desc:"Rawls justifie la redistribution par le voile d'ignorance ; Nozick y voit une violation des droits — on ne peut pas prendre à Pierre pour donner à Paul."},{dir:"oppose",auteur:"Marx",sujet:"propriété",desc:"Marx voit dans la propriété privée la source de l'exploitation ; Nozick en fait au contraire le fondement inviolable de la justice."}]},
"Bergson":{bio:"Philosophe français (1859–1941). Il développe une philosophie de la durée et de l'élan vital, en opposition au mécanisme et au déterminisme scientiste.",courant:"Vitalisme / Philosophie de la durée",periode:"XIXe–XXe siècle",themes:["durée","élan vital","homo faber","mémoire","intuition"],dialogues:[{dir:"oppose",auteur:"Descartes",sujet:"mécanisme",desc:"Descartes réduit le corps à une machine ; Bergson oppose à ce mécanisme la durée vécue, irréductible à l'espace et au calcul."},{dir:"prolonge",auteur:"Aristote",sujet:"évolution et finalité",desc:"Bergson reprend l'idée d'une finalité dans la nature mais la dynamise : l'élan vital est créateur, imprévisible, non téléologique."}]},
"Hume":{bio:"Philosophe écossais (1711–1776), figure centrale de l'empirisme. Il montre que nos certitudes rationnelles (causalité, substance, moi) ne sont que des habitudes psychologiques.",courant:"Empirisme / Scepticisme",periode:"XVIIIe siècle",themes:["causalité comme habitude","bundle theory du moi","scepticisme","raison esclave des passions","induction"],dialogues:[{dir:"oppose",auteur:"Descartes",sujet:"certitudes rationnelles",desc:"Descartes fonde des certitudes sur la raison pure ; Hume montre que toute connaissance vient de l'expérience et que la causalité n'est qu'une habitude."},{dir:"prolonge",auteur:"Locke",sujet:"empirisme",desc:"Hume radicalise l'empirisme de Locke en appliquant le même scepticisme à la notion de substance et au moi lui-même."}]},
"Merleau-Ponty":{bio:"Philosophe français (1908–1961). Il développe une phénoménologie du corps vécu, montrant que la perception est toujours déjà corporelle et engagée dans le monde.",courant:"Phénoménologie du corps",periode:"XXe siècle",themes:["corps vécu","perception","chair du monde","intersubjectivité","art et expression"],dialogues:[{dir:"prolonge",auteur:"Sartre",sujet:"phénoménologie",desc:"Merleau-Ponty partage avec Sartre l'héritage husserlien mais critique son dualisme implicite — le corps n'est pas pure facticité."},{dir:"repond",auteur:"Descartes",sujet:"dualisme corps/âme",desc:"Contre le dualisme cartésien, Merleau-Ponty montre que le corps est le sujet de la perception — être-au-monde est d'abord corporel."}]},
"Engels":{bio:"Philosophe et économiste allemand (1820–1895). Co-fondateur du marxisme avec Marx, il développe le matérialisme dialectique et l'analyse de l'État comme instrument de domination.",courant:"Matérialisme dialectique",periode:"XIXe siècle",themes:["matérialisme dialectique","État et domination","liberté et nécessité","origine de la famille","anti-Dühring"],dialogues:[{dir:"prolonge",auteur:"Marx",sujet:"matérialisme historique",desc:"Engels co-construit le marxisme avec Marx et l'étend à la dialectique de la nature entière."},{dir:"prolonge",auteur:"Spinoza",sujet:"liberté et nécessité",desc:"Engels reprend Spinoza : la liberté consiste dans la connaissance des nécessités naturelles — 'on commande à la nature en lui obéissant'."}]},
"Thoreau":{bio:"Écrivain et philosophe américain (1817–1862). Partisan du retour à la nature (Walden) et inventeur du concept de désobéissance civile contre les lois injustes.",courant:"Transcendantalisme / Anarchisme pacifiste",periode:"XIXe siècle",themes:["désobéissance civile","nature","simplicité volontaire","résistance non-violente","conscience morale"],dialogues:[{dir:"prolonge",auteur:"Rawls",sujet:"désobéissance civile",desc:"Rawls formalise en théorie politique ce que Thoreau pratiquait : la désobéissance civile est légitime contre les lois injustes, sous conditions."},{dir:"repond",auteur:"Platon",sujet:"obéissance aux lois",desc:"Platon (Criton) exige d'obéir même à une loi injuste ; Thoreau s'y oppose radicalement : obéir à une loi injuste, c'est en être complice."}]},
"La Boétie":{bio:"Humaniste français (1530–1563). Son unique grand texte analyse le mécanisme de la servitude volontaire : pourquoi des millions d'hommes obéissent-ils librement à un seul tyran ?",courant:"Humanisme de la Renaissance",periode:"XVIe siècle",themes:["servitude volontaire","tyrannie","résistance passive","habitude","liberté politique"],dialogues:[{dir:"prolonge",auteur:"Thoreau",sujet:"désobéissance",desc:"Thoreau et La Boétie convergent : la résistance ne nécessite pas de combattre — cesser d'obéir suffit à faire tomber la tyrannie."},{dir:"repond",auteur:"Hobbes",sujet:"obéissance politique",desc:"Hobbes légitime l'obéissance absolue au souverain ; La Boétie en dénonce le mystère — pourquoi obéit-on librement à ce qui nous opprime ?"}]},
"D'Holbach":{bio:"Philosophe français des Lumières (1723–1789). Il défend un matérialisme et un athéisme radical : la nature obéit à des lois mécaniques, et la liberté humaine est une illusion.",courant:"Matérialisme / Athéisme des Lumières",periode:"XVIIIe siècle",themes:["déterminisme physique","matérialisme","athéisme","liberté illusoire","nature mécaniste"],dialogues:[{dir:"oppose",auteur:"Descartes",sujet:"dualisme et liberté",desc:"Descartes maintient la liberté de l'âme ; D'Holbach étend le mécanisme cartésien à l'homme entier — il n'y a plus de place pour le libre arbitre."},{dir:"prolonge",auteur:"Spinoza",sujet:"déterminisme",desc:"D'Holbach radicalise le déterminisme spinoziste en un matérialisme physique sans Dieu ni Substance."}]},
"Épictète":{bio:"Philosophe stoïcien grec (v. 50–135 ap. J.-C.), ancien esclave. Il enseigne que la liberté intérieure est possible même dans les pires conditions extérieures.",courant:"Stoïcisme",periode:"Antiquité gréco-romaine",themes:["dichotomie du contrôle","liberté intérieure","représentations","indifférents","sagesse stoïcienne"],dialogues:[{dir:"prolonge",auteur:"Kant",sujet:"liberté intérieure",desc:"Kant et Épictète convergent : la vraie liberté est intérieure, réside dans la maîtrise de sa volonté, non dans les circonstances extérieures."},{dir:"oppose",auteur:"Sartre",sujet:"liberté en situation",desc:"Sartre dit qu'on est toujours libre de se projeter autrement ; Épictète est plus radical : la liberté ne concerne que ce qui dépend strictement de nous."}]},
"Lafargue":{bio:"Journaliste et militant politique franco-cubain (1842–1911), gendre de Marx. Son pamphlet 'Le Droit à la paresse' dénonce le culte du travail.",courant:"Socialisme / Critique du travail",periode:"XIXe siècle",themes:["droit à la paresse","culte du travail","exploitation ouvrière","temps libre","émancipation"],dialogues:[{dir:"prolonge",auteur:"Marx",sujet:"exploitation",desc:"Lafargue pousse la critique marxiste jusqu'au bout : si le travail aliène, c'est le travail lui-même qu'il faut refuser, pas seulement son exploitation."},{dir:"repond",auteur:"Nietzsche",sujet:"travail et contrôle",desc:"Nietzsche voit le travail comme 'meilleure des polices' ; Lafargue converge : le travail est l'instrument d'une exploitation intériorisée."}]},

"Anders":{bio:"Philosophe et écrivain autrichien (1902–1992). Il développe une philosophie de la technique fondée sur la 'honte prométhéenne' de l'homme face à ses propres machines.",courant:"Philosophie de la technique / Philosophie de l'existence",periode:"XXe siècle",themes:["honte prométhéenne","genre mortel","Hiroshima","obsolescence de l'homme","technique et puissance"],dialogues:[{dir:"prolonge",auteur:"Jonas",sujet:"responsabilité technique",desc:"Anders et Jonas partagent la même anxiété face à la technique nucléaire — mais Anders va plus loin : l'homme est devenu ontologiquement obsolète face à ses machines."},{dir:"prolonge",auteur:"Heidegger",sujet:"technique et humanité",desc:"Anders hérite de Heidegger la critique de la technique, mais l'ancre dans l'événement concret d'Hiroshima plutôt que dans l'ontologie."}]},
"Baudrillard":{bio:"Sociologue et philosophe français (1929–2007). Il analyse la société de consommation comme un système de signes qui remplace la réalité par des simulacres.",courant:"Philosophie de la culture / Postmodernisme",periode:"XXe siècle",themes:["simulation","simulacre","société de consommation","hyperréalité","objets et rêves"],dialogues:[{dir:"prolonge",auteur:"Marx",sujet:"critique de la société marchande",desc:"Baudrillard prolonge Marx : la marchandise n'est plus seulement un rapport social — elle est devenue signe, simulation, hyperréalité."},{dir:"repond",auteur:"Simondon",sujet:"objets techniques",desc:"Simondon analyse les objets techniques pour mieux les comprendre ; Baudrillard analyse la société de consommation pour en montrer le caractère illusoire."}]},
"Ricœur":{bio:"Philosophe français (1913–2005). Il développe une herméneutique de soi et de l'identité narrative, cherchant à réconcilier interprétation et réflexion.",courant:"Herméneutique / Phénoménologie",periode:"XXe siècle",themes:["identité narrative","idem/ipse","herméneutique","récit de soi","mémoire"],dialogues:[{dir:"prolonge",auteur:"Freud",sujet:"récit et inconscient",desc:"Ricœur voit dans la cure analytique une forme d'herméneutique du soi — reconstruire une identité narrative à partir des fragments du passé."},{dir:"repond",auteur:"Hume",sujet:"identité du moi",desc:"Hume dissout le moi en un flux de perceptions ; Ricœur répond : l'identité narrative permet de maintenir une unité sans substance fixe."}]},
"Alain":{bio:"Philosophe français (1868–1951), professeur emblématique de la Troisième République. Il développe une philosophie de la résistance à la puissance et de la formation du sujet par le travail.",courant:"Rationalisme républicain",periode:"XIXe–XXe siècle",themes:["résistance aux pouvoirs","formation du sujet","travail manuel","bonheur","propos"],dialogues:[{dir:"prolonge",auteur:"Kant",sujet:"autonomie morale",desc:"Alain hérite de Kant le souci de l'autonomie : le citoyen doit résister aux pouvoirs, y compris aux passions et aux émotions."},{dir:"prolonge",auteur:"Hegel",sujet:"conscience de soi et autrui",desc:"Alain prolonge Hegel : c'est des autres que nous tenons la première connaissance de nous-mêmes."}]},
"Pascal":{bio:"Mathématicien, physicien et philosophe français (1623–1662). Sa pensée oscille entre l'apologétique chrétienne et une lucidité radicale sur la condition humaine ('roseau pensant').",courant:"Augustinisme / Apologétique",periode:"XVIIe siècle",themes:["roseau pensant","divertissement","misère et grandeur de l'homme","pari","cœur et raison"],dialogues:[{dir:"repond",auteur:"Descartes",sujet:"raison et finitude",desc:"Descartes fonde tout sur la raison ; Pascal montre ses limites — le cœur a ses raisons que la raison ne connaît point."},{dir:"prolonge",auteur:"Nietzsche",sujet:"divertissement et travail",desc:"Pascal analyse le divertissement comme fuite de soi ; Nietzsche prolonge cette idée en montrant que le travail est la 'meilleure des polices'."}]},
"Saussure":{bio:"Linguiste suisse (1857–1913), fondateur de la linguistique structurale. Son Cours de linguistique générale (reconstitué par ses étudiants) pose les bases de la sémiologie moderne.",courant:"Structuralisme / Linguistique",periode:"XIXe–XXe siècle",themes:["signifiant/signifié","arbitraire du signe","langue comme système","synchronie/diachronie","valeur différentielle"],dialogues:[{dir:"prolonge",auteur:"Benveniste",sujet:"signe et symbole",desc:"Benveniste prolonge et nuance Saussure en distinguant signal et symbole, réservant le symbole à l'espèce humaine."},{dir:"prolonge",auteur:"Hegel",sujet:"langage et pensée",desc:"Hegel avait posé que la pensée se réalise dans le mot ; Saussure montre que la langue structure la pensée en la découpant."}]},
"Benveniste":{bio:"Linguiste français d'origine syrienne (1902–1976). Spécialiste de linguistique générale et de linguistique indo-européenne, il développe une réflexion sur la subjectivité dans le langage.",courant:"Linguistique / Phénoménologie du langage",periode:"XXe siècle",themes:["signal/symbole","subjectivité dans le langage","énonciation","personne grammaticale","intersubjectivité"],dialogues:[{dir:"prolonge",auteur:"Saussure",sujet:"arbitraire et symbole",desc:"Benveniste nuance Saussure : le lien n'est pas arbitraire pour le locuteur natif (il est motivé psychologiquement). Et distingue signal/symbole."},{dir:"repond",auteur:"Aristote",sujet:"logos et animal",desc:"Aristote distinguait logos et phone ; Benveniste formalise cette distinction avec signal/symbole."}]},
"Jakobson":{bio:"Linguiste et théoricien de la littérature russo-américain (1896–1982). Co-fondateur du Cercle linguistique de Moscou et de Prague. Il développe un modèle de la communication à six facteurs.",courant:"Structuralisme / Linguistique",periode:"XXe siècle",themes:["6 fonctions du langage","modèle de communication","phonologie","poétique","fonction poétique"],dialogues:[{dir:"prolonge",auteur:"Saussure",sujet:"structuralisme",desc:"Jakobson prolonge le structuralisme saussurien en l'appliquant à la poétique et à la communication."},{dir:"repond",auteur:"Bergson",sujet:"langage et communication",desc:"Bergson souligne les limites communicationnelles du langage ; Jakobson en fait une richesse en multipliant les fonctions."}]},
"Austin":{bio:"Philosophe britannique (1911–1960), fondateur de la philosophie du langage ordinaire. Sa distinction performatif/constatif révolutionne la conception du langage.",courant:"Philosophie analytique du langage",periode:"XXe siècle",themes:["performatif/constatif","actes de langage","conditions de félicité","langage ordinaire","dire c'est faire"],dialogues:[{dir:"prolonge",auteur:"Wittgenstein",sujet:"langage ordinaire",desc:"Austin s'inscrit dans la tradition de Wittgenstein du second Tractatus : la signification est dans l'usage."},{dir:"repond",auteur:"Jakobson",sujet:"fonctions du langage",desc:"Jakobson catalogue les fonctions ; Austin montre que le langage peut être une action à part entière, pas seulement de la communication."}]},
"Watzlawick":{bio:"Psychologue et théoricien de la communication austro-américain (1921–2007). Membre de l'École de Palo Alto, il développe une pragmatique de la communication humaine.",courant:"Pragmatique de la communication / Psychologie systémique",periode:"XXe siècle",themes:["injonction paradoxale","double bind","métacommunication","pragmatique","communication pathologique"],dialogues:[{dir:"prolonge",auteur:"Bateson",sujet:"double bind",desc:"Watzlawick prolonge Bateson : le double bind (double contrainte) est à l'origine de certaines pathologies psychiques."},{dir:"repond",auteur:"Benveniste",sujet:"limites de la communication",desc:"Benveniste montre que le langage humain est symbolique ; Watzlawick montre que cette complexité crée des paradoxes communicationnels."}]},
"Boroditsky":{bio:"Linguiste cognitive américaine (née en 1975). Ses recherches expérimentales montrent que la langue maternelle influence profondément la cognition : perception du temps, de l'espace, des couleurs, de la causalité.",courant:"Linguistique cognitive / Relativisme linguistique",periode:"XXe–XXIe siècle",themes:["relativisme linguistique","Sapir-Whorf","espace et langue","genre grammatical","temps et langue"],dialogues:[{dir:"prolonge",auteur:"Saussure",sujet:"langue et pensée",desc:"Saussure pose que la langue découpe la pensée ; Boroditsky le démontre expérimentalement avec des données cognitives."},{dir:"repond",auteur:"Chomsky",sujet:"universaux linguistiques",desc:"Chomsky défend une grammaire universelle innée ; Boroditsky montre la profonde diversité cognitive liée aux langues."}]},
"Orwell":{bio:"Écrivain et journaliste britannique (1903–1950). Ses romans 1984 et La Ferme des animaux sont des analyses politiques du totalitarisme sous forme littéraire.",courant:"Littérature politique / Socialisme démocratique",periode:"XXe siècle",themes:["novlangue","totalitarisme","propagande","langage et pouvoir","doublethink"],dialogues:[{dir:"prolonge",auteur:"Hegel",sujet:"langage et pensée",desc:"Hegel pose que c'est dans les mots que nous pensons ; Orwell tire la conséquence politique : contrôler les mots, c'est contrôler la pensée."},{dir:"prolonge",auteur:"Arendt",sujet:"totalitarisme",desc:"Arendt analyse le totalitarisme politiquement ; Orwell le représente littérairement et insiste sur le rôle du langage dans sa propagation."}]},
"Cassin":{bio:"Philosophe et philologue française (née en 1947). Directrice de recherche au CNRS, elle développe une réflexion sur les 'intraduisibles' philosophiques et la politique de la mémoire.",courant:"Philosophie du langage / Philologie",periode:"XXe–XXIe siècle",themes:["intraduisibles","logos/phone","politique de la mémoire","sophistique","traduction philosophique"],dialogues:[{dir:"prolonge",auteur:"Aristote",sujet:"logos et politique",desc:"Aristote distingue logos (parole politique) et phone (voix animale) ; Cassin prolonge en montrant que cette distinction est elle-même culturellement marquée."},{dir:"repond",auteur:"Benveniste",sujet:"langue et pensée",desc:"Benveniste analyse la subjectivité dans le langage ; Cassin élargit à la dimension interculturelle des concepts philosophiques."}]},
"Popper":{bio:"Philosophe des sciences austro-britannique (1902–1994). Il développe le principe de falsifiabilité (réfutabilité) comme critère de démarcation entre science et non-science.",courant:"Épistémologie critique",periode:"XXe siècle",themes:["falsifiabilité","conjectures et réfutations","société ouverte","démocratie","critique du totalitarisme"],dialogues:[{dir:"oppose",auteur:"Kuhn",sujet:"progrès scientifique",desc:"Kuhn voit le progrès par révolutions de paradigmes ; Popper par conjectures et réfutations cumulatives."},{dir:"oppose",auteur:"Marx",sujet:"scientificité",desc:"Popper juge le marxisme non-scientifique car non-réfutable : toute contre-évidence est réinterprétée pour confirmer la théorie."}]},

/* ── D. DONNÉES — GLOSSAIRE DE CONCEPTS ─────────────────────────────
   const CONCEPTS : ~70 concepts philosophiques clés, distincts des notions.
   Accessibles via l'onglet "Concepts" de la sidebar.
   Chaque concept contient :
     id       → identifiant unique (utilisé pour les liens .cterm)
     term     → terme affiché
     cat      → catégorie (Linguistique, Épistémologie, Éthique…)
     def      → définition HTML
     auteur   → auteur(s) associé(s) (chaîne, peut contenir " / ")
     tensions → paires de tensions conceptuelles ["A ≠ B", …]
     notions  → clés de D auxquelles ce concept est rattaché
   Les concepts dont l'id commence par "notion-" sont des raccourcis
   qui redirigent directement vers la notion du programme correspondante.  */
const CONCEPTS=[
{id:'langage-def',term:'Langage',cat:'Linguistique',def:'Tout système ou ensemble de signes permettant l\'expression ou la communication. Le langage humain se distingue par la <strong>double articulation</strong> (monèmes + phonèmes) — il peut produire un nombre illimité d\'énoncés avec ~40 sons.',auteur:'Saussure',tensions:['Langage (général) ≠ Langue (propre à une communauté)','Langage ≠ Parole (acte individuel)','Signal ≠ Symbole (Benveniste)'],notions:['langage']},
{id:'langue',term:'Langue',cat:'Linguistique',def:'Instrument de communication propre à une communauté humaine. Produit social de la faculté du langage — ensemble institué et stable de symboles verbaux ou écrits. Système de différences : chaque terme n\'a de valeur que par rapport aux autres.',auteur:'Saussure',tensions:['Langue ≠ Parole (social vs individuel)','Langue ≠ Langage (particulier vs général)'],notions:['langage']},
{id:'parole',term:'Parole',cat:'Linguistique',def:'Acte individuel par lequel s\'exerce la fonction linguistique — appropriation d\'une langue par un individu. Manière singulière dont chacun s\'empare d\'une langue commune. Fondement de la créativité linguistique (néologismes, style).',auteur:'Saussure',tensions:['Parole ≠ Langue (individuel vs social)','Parole créatrice ≠ code figé'],notions:['langage','art']},
{id:'signifiant-signifie',term:'Signifiant / Signifié',cat:'Linguistique',def:'Le <strong>signifiant</strong> est l\'image acoustique (le son du mot). Le <strong>signifié</strong> est le concept mental associé. Lien <strong>arbitraire</strong> (pas de nécessité naturelle entre le son "arbre" et l\'idée d\'arbre) mais <strong>inséparable</strong> (comme recto/verso d\'une feuille).',auteur:'Saussure',tensions:['Signifiant ≠ Référent (le mot ≠ la chose réelle)','Lien arbitraire → mais il faut l\'apprendre'],notions:['langage']},
{id:'referent',term:'Référent',cat:'Linguistique',def:'L\'objet, phénomène ou être de la réalité objective que désigne le signe linguistique. La licorne : signifiant (le son) + signifié (le concept d\'animal à corne unique) mais <em>référent absent</em> — preuve que le langage peut fonctionner sans ancrage réel.',auteur:'Saussure',tensions:['Signe sans référent → le langage dépasse la pure utilité','Référent imaginaire → fiction, mythe, abstraction'],notions:['langage','art']},
{id:'signal-symbole',term:'Signal / Symbole',cat:'Linguistique',def:'Le <strong>signal</strong> est un fait physique lié à un autre par rapport naturel ou conventionnel — l\'animal y réagit par réflexe conditionné (Pavlov). Le <strong>symbole</strong> est institué par l\'homme et doit être interprété : l\'animal exprime ses émotions, il ne les dénomme pas.',auteur:'Benveniste',tensions:['Animal = signal / Homme = signal ET symbole','Expression (animal) ≠ dénomination (homme)'],notions:['langage','nature','conscience']},
{id:'logos-phone',term:'Logos / Phone',cat:'Linguistique',def:'<strong>Phone</strong> : la voix, cri, expression sonore des émotions — partagée avec l\'animal. <strong>Logos</strong> : parole rationnelle, discours structuré permettant de délibérer du juste et de l\'injuste. Aristote : seul l\'homme possède le logos, ce qui fait de lui un <em>animal politique</em>. Cassin : logos = à la fois raison ET discours (intraduisible).',auteur:'Aristote / Cassin',tensions:['Phone → expression / Logos → argumentation et délibération','Logos ≠ raison pure (il est aussi rhétorique, persuasion)'],notions:['langage','raison','etat']},
{id:'double-articulation',term:'Double articulation',cat:'Linguistique',def:'Propriété distinctive du langage humain (Martinet) : (1) articulation en <strong>monèmes</strong> (unités de son ET de sens minimales) ; (2) articulation en <strong>phonèmes</strong> (unités de son pur, sans sens, en nombre fini ~40). Combinatoire illimitée à partir d\'éléments finis.',auteur:'Martinet / Saussure',tensions:['Double articulation → richesse infinie ≠ code animal (nombre fini de messages)'],notions:['langage']},
{id:'performatif',term:'Performatif / Constatif',cat:'Philosophie du langage',def:'Austin : un énoncé <strong>constatif</strong> décrit et peut être vrai/faux ("Il pleut"). Un énoncé <strong>performatif</strong> <em>accomplit</em> ce qu\'il énonce — dire c\'est faire. "Je vous déclare mari et femme" : la réalité est modifiée par la parole. Conditions de félicité : statut du locuteur, reconnaissance institutionnelle.',auteur:'Austin',tensions:['Performatif ≠ Constatif (action vs description)','Langage comme moyen ≠ Langage comme action constitutive du réel'],notions:['langage','travail','etat','droit']},
{id:'novlangue',term:'Novlangue',cat:'Politique / Linguistique',def:'Dans <em>1984</em> d\'Orwell : langue artificielle réduisant le vocabulaire pour réduire le pensable. Si un mot disparaît, la pensée correspondante disparaît. Exemple : "crimepensée" remplace toute idée hérétique — un seul mot empêche d\'articuler une pensée complexe.',auteur:'Orwell',tensions:['Novlangue → le langage peut supprimer la liberté de pensée','Langue appauvrie ≠ langue enrichissante (Cassin)'],notions:['langage','liberté','etat']},
{id:'fonctions-langage',term:'6 fonctions du langage',cat:'Linguistique',def:'Jakobson : <strong>émotive</strong> (je — interjections), <strong>conative</strong> (tu — impératif, persuasion), <strong>référentielle</strong> (il — décrire le contexte), <strong>phatique</strong> (maintenir le contact), <strong>métalinguistique</strong> (parler du code), <strong>poétique</strong> (le message pour lui-même — rythme, sonorités). Une phrase combine rarement une seule fonction.',auteur:'Jakobson',tensions:['Communication ≠ seule fonction','Fonction poétique → langage comme fin en soi ≠ moyen'],notions:['langage','art']},
{id:'injonction-paradoxale',term:'Injonction paradoxale',cat:'Pragmatique',def:'"Soyez spontané !" — contradiction performative : pour obéir, il faudrait être spontané par obéissance, donc sans spontanéité. Watzlawick : ces paradoxes sont au cœur de la communication pathologique (double bind de Bateson). Révèlent les limites structurelles de la communication.',auteur:'Watzlawick',tensions:['Le langage peut se retourner contre sa fonction de communication','Injonction paradoxale → souffrance psychique, névrose'],notions:['langage','conscience']},
{id:'cogito',term:'Cogito',cat:'Épistémologie',def:'<em>Cogito ergo sum</em> — "je pense donc je suis" (Descartes, <em>Méditations métaphysiques</em>, 1641). Première certitude après le doute hyperbolique. Fondement du rationalisme moderne. Critiques : Nietzsche ("ça pense"), Hume (pas de moi stable), Freud (l\'inconscient contredit la transparence du cogito).',auteur:'Descartes',tensions:['Cogito → conscience transparente à elle-même','Freud : le moi n\'est pas maître en sa propre maison — cogito illusoire ?'],notions:['conscience','raison','liberté','langage']},
{id:'mauvaise-foi',term:'Mauvaise foi',cat:'Existentialisme',def:'Sartre : attitude qui consiste à se croire déterminé comme une chose, à nier sa liberté radicale en "jouant un rôle". Exemple : le garçon de café qui "joue" à être garçon de café. ≠ mensonge (on se ment à soi-même conscient de sa liberté).',auteur:'Sartre',tensions:['Mauvaise foi ≠ mensonge (auto-illusion)','Mauvaise foi ↔ authenticité (assumer sa liberté)'],notions:['conscience','liberté']},
{id:'dialectique-maitre-esclave',term:'Dialectique Maître/Esclave',cat:'Idéalisme',def:'Hegel (<em>Phénoménologie de l\'Esprit</em>, 1807) : la conscience de soi ne s\'obtient que dans la <strong>reconnaissance</strong> par une autre conscience. Le maître exige la reconnaissance de l\'esclave qu\'il nie — reconnaissance creuse. L\'esclave se réalise dans le travail et accède à une vraie conscience de soi.',auteur:'Hegel',tensions:['Domination → reconnaissance vide','Travail de l\'esclave → émancipation paradoxale'],notions:['conscience','liberté','travail']},
{id:'determinisme',term:'Déterminisme',cat:'Métaphysique',def:'Doctrine : tout événement, y compris les actes humains, est la conséquence nécessaire de causes antérieures. D\'Holbach : l\'homme est "une machine". Spinoza et Engels : compatibilisme — la liberté est la nécessité comprise. Différent du fatalisme (qui nie l\'action).',auteur:"D'Holbach / Spinoza / Engels",tensions:['Déterminisme strict ≠ libre arbitre','Compatibilisme : déterminisme + liberté possible'],notions:['liberté','conscience','nature','science']},
{id:'libre-arbitre',term:'Libre arbitre',cat:'Métaphysique',def:'Capacité à choisir librement entre plusieurs possibles, indépendamment de toute détermination. Descartes : la liberté est "la plus grande perfection de l\'homme". Sartre : "nous sommes condamnés à être libres". Remis en cause par le déterminisme et la psychanalyse (inconscient).',auteur:'Descartes / Sartre',tensions:['Libre arbitre ≠ liberté spinoziste (nécessité comprise)','Libre arbitre ≠ caprice / indéterminisme'],notions:['liberté','conscience','devoir']},
{id:'alienation',term:'Aliénation',cat:'Philosophie sociale',def:'Marx : le travailleur est étranger à son produit (qui lui échappe), à son activité (imposée), à son espèce (déshumanisé), à ses semblables (concurrence). Hegel : l\'esprit s\'aliène dans le monde avant de se retrouver. Simondon : aliénation par méconnaissance des machines.',auteur:'Marx / Hegel / Simondon',tensions:['Aliénation économique (Marx) ≠ aliénation de l\'Esprit (Hegel)','Travail aliéné ≠ travail libre (créateur)'],notions:['travail','liberté','conscience','technique']},
{id:'labor-work-action',term:'Labor / Work / Action',cat:'Philosophie politique',def:'Arendt (<em>Condition de l\'homme moderne</em>, 1958) : <strong>Labor</strong> (cycle biologique, sans durée — corvée) ; <strong>Work/Œuvre</strong> (fabrication d\'un monde durable — artisan, artiste) ; <strong>Action</strong> (activité politique libre entre égaux — seule vraiment humaine). La modernité réduit tout au labor.',auteur:'Arendt',tensions:['Labor (animal laborans) ≠ Work (homo faber) ≠ Action (politique)','Modernité : tout devient labor — appauvrissement'],notions:['travail','art','liberté','etat']},
{id:'plus-value',term:'Plus-value',cat:'Économie politique',def:'Marx : écart entre la valeur produite par le travailleur et le salaire reçu. Fondement de l\'exploitation capitaliste. Journée divisée en <strong>temps nécessaire</strong> (reproduit le salaire) et <strong>surtravail</strong> (produit la plus-value pour le capitaliste).',auteur:'Marx',tensions:['Plus-value → le travail crée la valeur mais le travailleur ne la reçoit pas','≠ profit (qui peut avoir d\'autres sources)'],notions:['travail','justice']},
{id:'contrat-social',term:'Contrat social',cat:'Philosophie politique',def:'Théorie de la légitimité politique par accord entre individus. <strong>Hobbes</strong> : abandon total des droits au souverain absolu pour la sécurité. <strong>Locke</strong> : contrat révocable si les droits naturels sont violés. <strong>Rousseau</strong> : aliénation à la volonté générale — "en obéissant à la loi qu\'on s\'est prescrite, on est libre".',auteur:'Hobbes / Locke / Rousseau',tensions:['Sécurité (Hobbes) ≠ droits naturels (Locke) ≠ liberté civile (Rousseau)','Contrat fictif ou historique ?'],notions:['etat','liberté','justice']},
{id:'volonte-generale',term:'Volonté générale',cat:'Philosophie politique',def:'Rousseau : volonté du corps politique visant le bien commun. ≠ "volonté de tous" (somme des intérêts particuliers). Inaliénable et indivisible. Base de la souveraineté populaire. Peut légitimer la contrainte de l\'individu au nom du bien commun.',auteur:'Rousseau',tensions:['Volonté générale ≠ volonté de tous (arithmétique)','Peut-elle justifier la tyrannie de la majorité ?'],notions:['etat','liberté','justice']},
{id:'etat-de-nature',term:'État de nature',cat:'Philosophie politique',def:'Fiction philosophique : condition humaine avant tout ordre politique. <strong>Hobbes</strong> : guerre de tous contre tous ("vie solitaire, pauvre, brutale et brève"). <strong>Locke</strong> : état pacifique mais fragile. <strong>Rousseau</strong> : bonheur naturel, égalité, pas encore corrompu par la propriété.',auteur:'Hobbes / Locke / Rousseau',tensions:['Violent (Hobbes) ≠ Pacifique (Locke) ≠ Heureux (Rousseau)','Fiction conceptuelle ≠ fait historique'],notions:['etat','nature','liberté']},
{id:'ataraxie',term:'Ataraxie',cat:'Éthique antique',def:'Terme épicurien : état de paix de l\'âme, absence de trouble et d\'inquiétude. Joint à l\'<strong>aponie</strong> (absence de douleur corporelle), elle constitue le bonheur épicurien. S\'obtient par le calcul des désirs : désirs naturels et nécessaires > naturels non nécessaires > vains.',auteur:'Épicure',tensions:['Ataraxie (paix, repos) ≠ eudaimonia (activité, vertu — Aristote)','Ataraxie → bonheur passif ≠ bonheur actif'],notions:['bonheur']},
{id:'eudaimonia',term:'Eudaimonia',cat:'Éthique antique',def:'Terme aristotélicien traduit par "bonheur" ou "félicité". Littéralement : "avoir un bon démon". Pour Aristote, c\'est l\'<strong>activité de l\'âme conforme à la vertu</strong> la plus haute. Ce n\'est pas un état passif mais une <em>energeia</em> (actualisation de ses capacités).',auteur:'Aristote',tensions:['Eudaimonia (activité) ≠ ataraxie (repos — Épicure)','Eudaimonia ≠ hedone (plaisir sensoriel pur)'],notions:['bonheur','travail']},
{id:'habitus',term:'Habitus',cat:'Sociologie',def:'Bourdieu : système de dispositions durables acquises dans la socialisation — façons d\'agir, de penser, de percevoir incorporées. Génère des pratiques adaptées aux structures sociales sans calcul conscient. Le goût esthétique est un habitus de classe.',auteur:'Bourdieu',tensions:['Habitus → déterminisme social mais non absolu (il peut être transformé)','Habitus ≠ habitude (structure profonde vs comportement répété)'],notions:['bonheur','art','nature','liberté']},
{id:'imperatif-categorique',term:'Impératif catégorique',cat:'Éthique kantienne',def:'Kant : commandement moral qui s\'impose inconditionnellement, sans égard aux conséquences ou aux désirs. Trois formulations : (1) <em>Universalisation</em> : "Agis seulement selon la maxime qui peut devenir loi universelle" ; (2) <em>Humanité comme fin</em> ; (3) <em>Législation universelle</em>.',auteur:'Kant',tensions:['Impératif catégorique ≠ hypothétique ("si tu veux X, fais Y")','Devoir inconditionnel ≠ utilitarisme (Mill) — les conséquences ne comptent pas'],notions:['devoir','liberté','justice']},
{id:'banalite-du-mal',term:'Banalité du mal',cat:'Philosophie politique',def:'Arendt (<em>Eichmann à Jérusalem</em>, 1963) : le mal radical ne suppose pas de monstruosité mais l\'<strong>absence de pensée</strong> — obéissance sans jugement. Eichmann exécutait des ordres sans réfléchir à leur sens moral. La pensée est une condition de résistance au mal.',auteur:'Arendt',tensions:['Mal banal (absence de pensée) ≠ mal radical (intentions diaboliques)','Obéissance sans pensée ≠ devoir moral kantien (autonomie)'],notions:['devoir','etat','conscience']},
{id:'ready-made',term:'Ready-made',cat:'Art contemporain',def:'Duchamp (<em>La Fontaine</em>, 1917) : objet manufacturé ordinaire promu au statut d\'œuvre d\'art par désignation institutionnelle. Ce n\'est pas le geste technique qui crée l\'œuvre mais l\'acte de désignation. O\'Doherty : c\'est l\'espace de la galerie qui fait l\'art.',auteur:'Duchamp',tensions:['Ready-made → l\'art ≠ maîtrise technique','Valeur esthétique ≠ valeur commerciale','Art institutionnel ≠ art comme expression singulière'],notions:['art','travail','technique']},
{id:'genie',term:'Génie',cat:'Esthétique',def:'Kant (<em>Critique de la faculté de juger</em>, 1790) : talent de produire ce dont on ne peut donner de règle déterminée. L\'originalité est sa première qualité. Ses productions doivent être exemplaires. Nietzsche critique le mythe du génie inné : c\'est l\'ignorance et la paresse qui font croire au "don".',auteur:'Kant / Nietzsche',tensions:['Génie inné (mythe romantique) ≠ travail acharné (Nietzsche)','Génie ≠ simple habileté technique'],notions:['art','travail','liberté']},
{id:'beau-sans-concept',term:'Beau sans concept',cat:'Esthétique',def:'Kant : le jugement de goût ("c\'est beau") est un <strong>universel sans concept</strong> — on attend l\'accord universel sans pouvoir le justifier par une règle. Bourdieu critique : ce prétendu universel cache un habitus de classe. Le "goût" dominant est celui de la classe dominante.',auteur:'Kant / Bourdieu',tensions:['Universalité esthétique (Kant) ≠ relativisme de classe (Bourdieu)','Jugement de goût ≠ jugement moral ≠ jugement de connaissance'],notions:['art','bonheur']},
{id:'autonomie',term:'Autonomie',cat:'Éthique kantienne',def:'Kant : se donner sa propre loi (auto-nomos). L\'<strong>autonomie</strong> morale est la capacité à agir selon des principes que l\'on s\'est soi-même donnés par la raison. ≠ hétéronomie (obéir à une loi extérieure). C\'est le fondement de la dignité humaine.',auteur:'Kant',tensions:['Autonomie ≠ hétéronomie (contrainte extérieure, désir, Dieu)','Autonomie ≠ liberté arbitraire (c\'est la raison qui légifère)'],notions:['devoir','liberté','conscience']},
{id:'servitude-volontaire',term:'Servitude volontaire',cat:'Philosophie politique',def:'La Boétie (<em>Discours de la servitude volontaire</em>, ~1548) : mystère politique — pourquoi des millions d\'hommes obéissent-ils librement à un seul tyran ? Par habitude, coutume, peur. La tyrannie repose non sur la force mais sur le consentement. Résistance = cesser d\'obéir.',auteur:'La Boétie',tensions:['Servitude volontaire → complicité des dominés','Résistance passive ≠ révolution armée'],notions:['etat','liberté','devoir']},
{id:'intersubjectivite',term:'Intersubjectivité',cat:'Phénoménologie',def:'Relation entre sujets par laquelle chacun reconnaît l\'autre comme une autre conscience. Fondement du monde commun et de l\'objectivité. Husserl : la réalité partagée se constitue par l\'intersubjectivité. Sartre : "l\'enfer, c\'est les autres" — mais aussi la condition de la conscience de soi.',auteur:'Husserl / Sartre / Merleau-Ponty',tensions:['Intersubjectivité → monde commun ≠ solipsisme','Autrui comme menace (Sartre) ≠ autrui comme condition (Merleau-Ponty)'],notions:['conscience','langage','etat']},
{id:'elan-vital',term:'Élan vital',cat:'Vitalisme',def:'Bergson (<em>L\'Évolution créatrice</em>, 1907) : principe de la vie — force créatrice qui s\'exprime à travers l\'évolution des espèces. Imprévisible, créateur, non téléologique (≠ finalisme). L\'homme est la pointe de cet élan vital grâce à l\'intelligence et à l\'intuition.',auteur:'Bergson',tensions:['Élan vital ≠ mécanisme (déterministe)','Élan vital ≠ finalisme (un but préétabli)'],notions:['nature','temps','liberté']},
{id:'physis',term:'Physis',cat:'Philosophie antique',def:'Terme grec désignant la nature comme processus de croissance spontané (de <em>phuein</em> : pousser, naître). ≠ <em>nomos</em> (la loi, la convention humaine). La physis est ce qui s\'engendre de soi-même sans artifice humain. Aristote : la physis a une finalité interne.',auteur:'Aristote / Héraclite',tensions:['Physis ≠ tekhnê (nature ≠ art/technique)','Physis ≠ nomos (nature ≠ loi humaine)'],notions:['nature','technique','art']},

/* ── Notions comme concepts (redirigent vers la notion) ─────── */
{id:'notion-conscience',term:'Conscience',cat:'Notion — Terminale',def:'La conscience est la présence à soi et au monde. On distingue la <strong>conscience immédiate</strong> (perception du monde) et la <strong>conscience réflexive</strong> (retour sur soi). La psychanalyse remet en cause sa transparence.',auteur:'Descartes / Freud / Sartre',tensions:['Conscience immédiate ≠ conscience réflexive','Conscience (Descartes) ≠ inconscient (Freud)'],notions:['conscience']},
{id:'notion-liberté',term:'Liberté',cat:'Notion — Terminale',def:'La liberté est la capacité d\'agir selon sa propre volonté, sans contrainte extérieure ni intérieure. On distingue la liberté naturelle, la liberté civile (Rousseau), la liberté morale (Kant) et la liberté existentielle (Sartre).',auteur:'Kant / Sartre / Rousseau',tensions:['Liberté de faire ≠ liberté d\'être','Liberté (Sartre : absolue) ≠ liberté (Spinoza : nécessité comprise)'],notions:['liberté']},
{id:'notion-justice',term:'Justice',cat:'Notion — Terminale',def:'La justice est le principe selon lequel chacun reçoit ce qui lui est dû. On distingue la justice commutative (égalité stricte) et la justice distributive (selon les mérites ou les besoins). Rawls : équité et voile d\'ignorance.',auteur:'Aristote / Rawls / Marx',tensions:['Justice formelle ≠ justice réelle','Mérite ≠ besoin comme critère de justice'],notions:['justice']},
{id:'notion-etat',term:'État',cat:'Notion — Terminale',def:'L\'État est l\'institution politique souveraine qui détient le monopole de la violence légitime (Weber) sur un territoire délimité. Il naît d\'un contrat social (Hobbes, Locke, Rousseau) censé garantir la paix civile et les droits des citoyens.',auteur:'Weber / Hobbes / Rousseau',tensions:['État comme protecteur ≠ État comme oppresseur','État libéral (Locke) ≠ État absolu (Hobbes)'],notions:['etat']},
{id:'notion-travail',term:'Travail',cat:'Notion — Terminale',def:'Le travail est l\'activité par laquelle l\'homme transforme la nature pour satisfaire ses besoins. Il peut aliéner (Marx) ou libérer (Hegel). Arendt distingue labor (biologique), work (création durable) et action (politique).',auteur:'Marx / Hegel / Arendt',tensions:['Travail aliénant (Marx) ≠ travail libérateur (Hegel)','Labor (cyclique) ≠ Work (durable) ≠ Action (politique)'],notions:['travail']},
{id:'notion-technique',term:'Technique',cat:'Notion — Terminale',def:'La technique est l\'ensemble des procédés rationnels visant à transformer la nature. Elle pose la question de la maîtrise : maîtrisons-nous la technique ou est-ce elle qui nous maîtrise ? Simondon propose une culture technique.',auteur:'Heidegger / Simondon / Descartes',tensions:['Technique comme libération (Descartes) ≠ technique comme domination (Heidegger)','Technophobie ≠ culture technique (Simondon)'],notions:['technique']},
{id:'notion-nature',term:'Nature',cat:'Notion — Terminale',def:'La nature désigne l\'ensemble du réel non produit par l\'homme, mais aussi l\'essence d\'un être (sa nature profonde). Elle peut être modèle (Rousseau), objet de domination (Descartes) ou sujet de droits (Jonas, Stone).',auteur:'Rousseau / Jonas / Descartes',tensions:['Nature comme norme ≠ sophisme naturaliste','Nature-objet ≠ nature-sujet de droits'],notions:['nature']},
{id:'notion-bonheur',term:'Bonheur',cat:'Notion — Terminale',def:'Le bonheur est un état durable de satisfaction complète, distinct du plaisir (fugace) et du contentement passager. Aristote : eudaimonia (activité vertueuse). Épicure : ataraxie + aponie. Kant : mériter d\'être heureux.',auteur:'Aristote / Épicure / Kant',tensions:['Bonheur (durable) ≠ plaisir (fugace)','Bonheur et morale : accord (Mill) ≠ séparation (Kant)'],notions:['bonheur']},
{id:'notion-art',term:'Art',cat:'Notion — Terminale',def:'L\'art est une activité créatrice produisant des œuvres qui visent le beau ou l\'expression. Platon : imitation (mimésis). Kant : beau sans concept, génie. Hegel : l\'art incarne l\'Esprit. Duchamp : le ready-made remet en cause la définition même de l\'art.',auteur:'Platon / Kant / Hegel / Duchamp',tensions:['Art comme imitation (Platon) ≠ art comme création libre (Kant)','Art ≠ technique (finalité désintéressée)'],notions:['art']},
{id:'notion-temps',term:'Temps',cat:'Notion — Terminale',def:'Le temps est la dimension dans laquelle se succèdent les événements du passé, présent et futur. Bergson oppose le temps vécu (durée) au temps spatialisé de la science. Heidegger : l\'être-vers-la-mort comme horizon de toute temporalité.',auteur:'Bergson / Heidegger / Augustin',tensions:['Temps objectif (science) ≠ durée vécue (Bergson)','Temps linéaire ≠ éternel retour (Nietzsche)'],notions:['temps']},
{id:'notion-langage',term:'Langage',cat:'Notion — Terminale',def:'Le langage est tout système de signes permettant la communication et la pensée. Il est propre à l\'homme (logos vs phone). Saussure : langue/parole. Wittgenstein : les limites de mon langage sont les limites de mon monde.',auteur:'Saussure / Wittgenstein / Benveniste',tensions:['Langage comme outil ≠ langage comme constitutif de la pensée','Langue commune ≠ parole individuelle'],notions:['langage']},
{id:'notion-raison',term:'Raison',cat:'Notion — Terminale',def:'La raison est la faculté humaine de penser de manière logique et d\'établir des vérités. Kant distingue raison théorique (connaître) et raison pratique (agir moralement). Pascal : le cœur a ses raisons que la raison ne connaît point.',auteur:'Kant / Pascal / Descartes',tensions:['Raison théorique (connaître) ≠ raison pratique (agir)','Raison ≠ passion / sentiment'],notions:['raison']},
{id:'notion-science',term:'Science',cat:'Notion — Terminale',def:'La science est un ensemble de connaissances méthodiques visant à expliquer le réel. Popper : une théorie est scientifique si elle est falsifiable. Kuhn : la science progresse par révolutions de paradigmes, non de façon linéaire.',auteur:'Popper / Kuhn / Bachelard',tensions:['Science (vérifiable) ≠ pseudoscience','Progrès cumulatif (Popper) ≠ révolutions paradigmatiques (Kuhn)'],notions:['raison']},
{id:'notion-religion',term:'Religion',cat:'Notion — Terminale',def:'La religion est un ensemble de croyances et de pratiques relatives au sacré. Elle articule vision du monde, morale et rites. Freud : illusion. Marx : opium du peuple. Pascal : pari raisonnable face à l\'infini.',auteur:'Freud / Marx / Pascal',tensions:['Foi ≠ raison (mais dialogue possible)','Religion comme consolation ≠ religion comme vérité'],notions:['religion']},
{id:'notion-verite',term:'Vérité',cat:'Notion — Terminale',def:'La vérité est l\'adéquation d\'un énoncé à la réalité (conception classique). Descartes : certitude par le doute. Nietzsche : la vérité est une métaphore usée. Popper : on ne prouve pas la vérité, on réfute l\'erreur.',auteur:'Descartes / Nietzsche / Popper',tensions:['Vérité objective ≠ vérité subjective','Certitude ≠ vérité'],notions:['verite']},
{id:'notion-inconscient',term:'Inconscient',cat:'Notion — Terminale',def:'L\'inconscient freudien désigne les représentations refoulées qui continuent d\'agir sur le psychisme à notre insu. Topique : Ça / Moi / Surmoi. Il se manifeste dans les rêves, les actes manqués, les lapsus. Remet en cause la souveraineté du moi.',auteur:'Freud / Jung / Lacan',tensions:['Inconscient (Freud) ≠ conscience (Descartes)','Inconscient ≠ simple méconnaissance (c\'est du refoulé actif)'],notions:['inconscient']},

/* ── Concepts philosophiques manquants ───────────────────────── */
{id:'désir',term:'Désir',cat:'Anthropologie philosophique',def:'Mouvement vers ce qui manque, vers un objet qui n\'est pas encore possédé. Platon (<em>Banquet</em>) : le désir est manque — Éros est fils de Pénia (pauvreté). Spinoza : le désir est l\'essence même de l\'homme (conatus). Freud : le désir naît du refoulement pulsionnel.',auteur:'Platon / Spinoza / Freud',tensions:['Désir comme manque (Platon) ≠ désir comme puissance (Spinoza)','Satisfaire le désir ≠ supprimer le désir'],notions:['bonheur','inconscient','liberté']},
{id:'plaisir',term:'Plaisir',cat:'Éthique',def:'État affectif positif lié à la satisfaction d\'un besoin ou d\'un désir. Épicure distingue les plaisirs stables (katastématiques — ataraxie) et les plaisirs mobiles (en mouvement). Mill distingue plaisirs inférieurs (corporels) et supérieurs (intellectuels).',auteur:'Épicure / Mill / Aristote',tensions:['Plaisir (fugace) ≠ bonheur (durable)','Plaisirs inférieurs ≠ plaisirs supérieurs (Mill)'],notions:['bonheur']},
{id:'refoulement',term:'Refoulement',cat:'Psychanalyse',def:'Freud : mécanisme par lequel le Moi repousse dans l\'inconscient les représentations liées à des pulsions inacceptables. Le refoulé n\'est pas détruit — il agit en retour sous forme de symptômes, rêves, actes manqués. Fondement de la névrose.',auteur:'Freud',tensions:['Refoulement ≠ simple oubli (le refoulé persiste et agit)','Refoulement ≠ répression consciente'],notions:['inconscient','conscience','liberté']},
{id:'pulsion',term:'Pulsion',cat:'Psychanalyse',def:'Freud : force représentant une exigence de travail pour le psychisme, à la frontière du corporel et du psychique. Pulsions de vie (Éros) vs pulsions de mort (Thanatos). La pulsion est une poussée constante — ≠ instinct (réponse fixe à un stimulus).',auteur:'Freud',tensions:['Pulsion (psychique) ≠ instinct (biologique fixe)','Éros (vie) ≠ Thanatos (mort, destruction)'],notions:['inconscient','nature']},
{id:'catharsis',term:'Catharsis',cat:'Esthétique antique',def:'Aristote (<em>Poétique</em>) : la tragédie opère une purification des émotions (pitié et crainte) par leur représentation dramatique. Le spectateur ressent et décharge ses passions de manière sécurisée. Controversée : s\'agit-il de purgation ou de purification morale ?',auteur:'Aristote',tensions:['Catharsis (Aristote) ≠ mimésis dangereuse (Platon)','Art thérapeutique ≠ art purement esthétique'],notions:['art','bonheur']},
{id:'mimesis',term:'Mimésis',cat:'Esthétique antique',def:'Imitation ou représentation du réel dans les arts. Platon (<em>République</em>) : la mimésis est une copie de copie — l\'artiste imite un objet sensible qui lui-même imite une Idée. L\'art est au troisième degré de la vérité et peut tromper. Aristote réhabilite la mimésis : elle est un apprentissage du réel.',auteur:'Platon / Aristote',tensions:['Mimésis condamnée (Platon) ≠ mimésis réhabilitée (Aristote)','Art comme copie ≠ art comme création'],notions:['art']},
{id:'sublime',term:'Sublime',cat:'Esthétique',def:'Kant (<em>Critique de la faculté de juger</em>) : sentiment produit par ce qui dépasse notre faculté de représentation — la nature immense ou terrifiante. Différent du beau (harmonieux, fini). Le sublime mathématique (infini) et le sublime dynamique (puissance). Notre raison triomphe de l\'écrasement.',auteur:'Kant / Burke / Longin',tensions:['Sublime ≠ beau (dépasse la forme, effraie)','Sublime naturel ≠ sublime artistique'],notions:['art','nature']},
{id:'volonte-puissance',term:'Volonté de puissance',cat:'Philosophie nietzschéenne',def:'Nietzsche : principe fondamental de la vie — non pas désir de dominer autrui mais force expansive, créatrice, qui cherche à se dépasser elle-même. Le surhomme (<em>Übermensch</em>) est celui qui assume sa volonté de puissance et crée de nouvelles valeurs après la mort de Dieu.',auteur:'Nietzsche',tensions:['Volonté de puissance (créer) ≠ volonté de domination','Volonté de puissance ≠ ressentiment (morale des esclaves)'],notions:['liberté','travail','art']},
{id:'paradigme',term:'Paradigme',cat:'Épistémologie',def:'Kuhn (<em>La Structure des révolutions scientifiques</em>, 1962) : ensemble de présupposés, méthodes et exemples partagés par une communauté scientifique. La science normale travaille dans un paradigme. Une révolution scientifique est un changement de paradigme (ex : Copernic, Darwin, Einstein).',auteur:'Kuhn',tensions:['Paradigme dominant ≠ science alternative','Science normale ≠ révolution scientifique'],notions:['raison']},
{id:'falsifiabilite',term:'Falsifiabilité',cat:'Épistémologie',def:'Popper : critère de démarcation entre science et non-science. Une théorie est scientifique si elle peut, en principe, être réfutée par l\'expérience. Ex : "Tous les corbeaux sont noirs" est falsifiable (un corbeau blanc suffit à l\'infirmer). La psychanalyse et le marxisme sont non-falsifiables selon Popper.',auteur:'Popper',tensions:['Falsifiable ≠ vrai (une théorie peut être falsifiable et fausse)','Falsifiabilité ≠ vérifiabilité (positivisme logique)'],notions:['raison','verite']},
{id:'contrat-nature',term:'Contrat naturel',cat:'Philosophie de l\'environnement',def:'Serres (<em>Le Contrat naturel</em>, 1990) : face au parasitisme humain sur la nature, étendre le contrat social à la nature. Le droit de symbiose remplace le droit de maîtrise : chacun doit à l\'autre. La nature devient partenaire du contrat, non objet de domination.',auteur:'Serres',tensions:['Contrat naturel ≠ contrat social classique (entre humains)','Symbiose ≠ parasitisme'],notions:['nature','etat','devoir']},
{id:'principe-responsabilite',term:'Principe responsabilité',cat:'Éthique',def:'Jonas (<em>Le Principe responsabilité</em>, 1979) : "Agis de façon que les effets de ton action soient compatibles avec la permanence d\'une vie authentiquement humaine sur Terre." La responsabilité s\'étend aux générations futures et à la biosphère. L\'heuristique de la peur : anticiper la catastrophe pour guider l\'action.',auteur:'Jonas',tensions:['Responsabilité future ≠ responsabilité rétrospective','Précaution ≠ immobilisme'],notions:['devoir','nature','technique']},
{id:'divertissement',term:'Divertissement',cat:'Anthropologie philosophique',def:'Pascal (<em>Pensées</em>) : l\'homme fuit la pensée de sa condition (misère, finitude, mort) en se jetant dans l\'action et le divertissement. Le roi chasseur préfère la chasse à la possession du lièvre. Le divertissement est l\'anesthésie de l\'angoisse existentielle.',auteur:'Pascal',tensions:['Divertissement ≠ repos (il est une fuite, non une pause)','Occuper son esprit ≠ être heureux'],notions:['bonheur','travail','temps']},
{id:'heuristique-peur',term:'Heuristique de la peur',cat:'Éthique',def:'Jonas : face à l\'incertitude des effets de la technique, donner la priorité aux prophéties de malheur sur celles de bonheur. Mieux vaut se tromper par excès de prudence que par optimisme. Principe de précaution étendu à la biosphère et aux générations futures.',auteur:'Jonas',tensions:['Peur comme boussole ≠ peur comme paralysie','Précaution ≠ refus du progrès'],notions:['devoir','technique','nature']},
{id:'culture-technique',term:'Culture technique',cat:'Philosophie de la technique',def:'Simondon : dépasser la technophobie et l\'enthousiasme naïf par la connaissance réelle du fonctionnement des machines. L\'aliénation vient de la méconnaissance — comprendre les objets techniques, c\'est les coordonner comme un chef d\'orchestre. La culture doit intégrer la réalité humaine contenue dans les machines.',auteur:'Simondon',tensions:['Technophobie (ignorance) ≠ technolatrie (enthousiasme aveugle)','Culture technique ≠ simple utilisation'],notions:['technique','travail','art']},
{id:'tabula-rasa',term:'Tabula rasa',cat:'Épistémologie empiriste',def:'Locke : l\'esprit humain est à la naissance une "table rase" — il n\'y a pas d\'idées innées. Toute connaissance vient de l\'expérience sensible. S\'oppose à Descartes (idées innées) et à Leibniz (monades). Fondement de l\'empirisme.',auteur:'Locke',tensions:['Tabula rasa (tout vient de l\'expérience) ≠ idées innées (Descartes, Platon)'],notions:['raison','conscience']},
{id:'elan-vital2',term:'Élan vital',cat:'Vitalisme',def:'Bergson (<em>L\'Évolution créatrice</em>, 1907) : principe de la vie — force créatrice imprévisible qui s\'exprime à travers l\'évolution des espèces. ≠ mécanisme (déterministe) et ≠ finalisme (but préétabli). L\'homme est la pointe de cet élan grâce à l\'intelligence et à l\'intuition.',auteur:'Bergson',tensions:['Élan vital ≠ mécanisme (déterministe)','Élan vital ≠ finalisme (un but préétabli)'],notions:['nature','liberté']},
{id:'duree',term:'Durée',cat:'Philosophie du temps',def:'Bergson : le temps vécu intérieurement, flux continu et qualitatif — ≠ temps de la physique (homogène, spatialisé, quantifiable). La conscience est durée : ses états se fondent les uns dans les autres. L\'introspection révèle cette durée irréductible au chronomètre.',auteur:'Bergson',tensions:['Durée (qualitatif, vécu) ≠ temps physique (quantitatif, mesurable)','Durée ≠ instant'],notions:['temps','conscience']},
{id:'etre-vers-mort',term:'Être-vers-la-mort',cat:'Phénoménologie existentiale',def:'Heidegger : la mort est la possibilité la plus propre, inconditionnelle et certaine du Dasein (être-là). L\'angoisse face à la mort révèle l\'authenticité — elle arrache à la "déchéance" dans le "on" (das Man). Assumer sa finitude, c\'est exister authentiquement.',auteur:'Heidegger',tensions:['Authenticité (assumer la mort) ≠ déchéance (fuir dans le "on")','Être-vers-la-mort ≠ désir de mourir'],notions:['temps','conscience','liberté']},
{id:'fonds-disponible',term:'Fonds disponible',cat:'Philosophie de la technique',def:'Heidegger (<em>La Question de la technique</em>, 1954) : la technique moderne dévoile le réel comme un stock d\'énergie exploitable (Bestand). Le Rhin devient "centrale électrique", non fleuve majestueux. Ce mode de dévoilement menace d\'effacer tous les autres.',auteur:'Heidegger',tensions:['Dévoilement technique (fonds) ≠ dévoilement artistique (poiêsis)','Technique moderne ≠ technique artisanale'],notions:['technique','nature','art']},
{id:'eudaimonia2',term:'Eudaimonia',cat:'Éthique antique',def:'Terme aristotélicien : bonheur au sens d\'<em>activité de l\'âme conforme à la vertu</em>. Ce n\'est pas un état passif mais une energeia (actualisation). Exige les vertus morales ET intellectuelles (phronesis) ET des biens extérieurs. Fin ultime de l\'existence humaine.',auteur:'Aristote',tensions:['Eudaimonia (activité) ≠ ataraxie (repos, Épicure)','Eudaimonia ≠ hedone (plaisir sensoriel)'],notions:['bonheur','travail']},
{id:'honte-prométhéenne',term:'Honte prométhéenne',cat:'Philosophie de la technique',def:'Anders : l\'homme éprouve de la honte face à ses propres machines — sa fragilité biologique est humiliante comparée à leurs performances. Nous sommes devenus "antiqués" par rapport à nos productions. Conséquence : l\'homme risque de se modéliser sur ses machines.',auteur:'Anders',tensions:['Honte prométhéenne → aliénation inverse (la machine domine le créateur)','Anders ≠ Simondon (peur des machines ≠ culture technique)'],notions:['technique','travail','nature']},
{id:'desobeissance-civile',term:'Désobéissance civile',cat:'Philosophie politique',def:'Thoreau (<em>La Désobéissance civile</em>, 1849) : refus public, non-violent et assumé d\'une loi injuste. Légitime lorsque la loi viole la conscience morale. Rawls la formalise : acte non-violent, public, adressé au sens de la justice de la majorité.',auteur:'Thoreau / Rawls / Gandhi',tensions:['Désobéissance civile ≠ révolution armée','Résistance individuelle ≠ résistance collective'],notions:['justice','etat','devoir']},
{id:'identite-narrative',term:'Identité narrative',cat:'Herméneutique',def:'Ricœur : l\'identité personnelle n\'est ni substance fixe (idem) ni flux incohérent (Hume), mais <strong>ipse</strong> — identité narrative. C\'est en racontant notre vie que nous nous constituons comme sujet. Les récits culturels que nous appliquons à notre vie font notre identité.',auteur:'Ricœur',tensions:['Identité narrative (ipse) ≠ identité substantielle (idem)','Narration de soi ≠ fiction de soi'],notions:['conscience','temps','langage']},
{id:'jugement-reflexissant',term:'Jugement de goût',cat:'Esthétique kantienne',def:'Kant (<em>Critique de la faculté de juger</em>) : le jugement esthétique ("c\'est beau") prétend à l\'universalité sans se fonder sur un concept. Il est désintéressé (≠ agréable), libre (≠ parfait) et communicable. On postule l\'accord universel sans pouvoir le prouver.',auteur:'Kant',tensions:['Jugement de goût (universalité sans concept) ≠ jugement de connaissance (concept déterminant)','Beau ≠ agréable (subjectif) ≠ parfait (conceptuel)'],notions:['art','bonheur']},
{id:'travail-hegel',term:'Travail et reconnaissance',cat:'Phénoménologie',def:'Hegel : l\'esclave se libère par le travail. En transformant la matière, il s\'y reconnaît et forme sa conscience de soi. Le maître, dépendant de l\'esclave pour ses besoins, perd sa liberté. Le travail est le chemin de l\'émancipation par la résistance de la matière.',auteur:'Hegel',tensions:['Travail de l\'esclave → émancipation paradoxale','Travail libre (expression de soi) ≠ travail forcé (aliénation)'],notions:['travail','liberté','conscience']},
];
