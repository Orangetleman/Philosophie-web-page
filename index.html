justice:{c:"#D85A30",l:"Justice",s:"Qu'est-ce qu'une société juste ?",
def:"La <span class='kw'>justice</span> est une vertu morale (rendre à chacun ce qui lui est dû) et un principe politique (organisation équitable de la société). Elle implique l'égalité — mais laquelle, arithmétique ou proportionnelle ? Elle pose aussi la question de la <span class='kw'>légitimité des lois</span> et du droit à la désobéissance.<details><summary>Approfondir la notion</summary><div class='def-sec'><div class='def-sec-title'>Deux grandes distinctions</div><div class='def-sec-body'><strong>Justice distributive</strong> (Aristote) : distribuer les biens et les honneurs selon le mérite ou le besoin. <strong>Justice commutative</strong> : égalité dans les échanges (contrats, réparations). <strong>Égalité arithmétique</strong> (même chose pour tous) vs <strong>égalité proportionnelle/géométrique</strong> (selon le mérite, les besoins). Rawls distingue <em>equité</em> (fair) et <em>égalité</em> : une inégalité est juste si elle bénéficie aux plus défavorisés.</div></div><div class='def-sec'><div class='def-sec-title'>Droit naturel vs droit positif</div><div class='def-sec-body'>Le <strong>droit naturel</strong> est universel, fondé sur la raison ou la nature humaine (Locke : vie, liberté, propriété sont des droits inaliénables). Le <strong>droit positif</strong> est l'ensemble des lois en vigueur dans une société donnée (variable, historique). Conflit possible : une loi légale peut être injuste. Sophocle (<em>Antigone</em>) : loi divine vs loi de la cité.</div></div><div class='def-sec'><div class='def-sec-title'>Justice sociale et redistribution</div><div class='def-sec-body'>Rawls (<em>Théorie de la justice</em>) : voile d'ignorance — choisir les principes de justice sans savoir quelle place on occupera. Deux principes : (1) libertés de base égales pour tous ; (2) les inégalités sont justes si elles bénéficient aux moins favorisés (principe de différence). Nozick s'y oppose : la redistribution est une violation des droits individuels — la justice est dans l'acquisition légitime.</div></div><div class='def-sec'><div class='def-sec-title'>Justice et désobéissance civile</div><div class='def-sec-body'>Thoreau : face à une loi injuste, désobéir est un devoir moral. King : « On a le devoir moral de désobéir aux lois injustes. » Rawls : la désobéissance civile est légitime si elle est non-violente, publique et accepte ses conséquences légales. Platon (<em>Criton</em>) : Socrate refuse de désobéir, même injustement condamné — loyauté aux lois qui l'ont éduqué.</div></div></details>",
auteurs:[
{n:"Platon",w:"La République / Protagoras (TEXTE 6)",i:"Justice = harmonie de l'âme et de la cité. Mythe de Prométhée : Zeus envoie justice (diké) et pudeur (aidôs) à TOUS les hommes (pas seulement aux spécialistes) comme condition de la vie en société.",q:"'Tout homme incapable de pudeur et de justice sera exterminé comme un fléau de la société'"},
{n:"Aristote",w:"Éthique à Nicomaque, Liv. V",i:"Justice distributive : à chacun selon son mérite (inégalité proportionnelle). Justice corrective : rétablir l'égalité après un tort (arithmétique). La justice = juste milieu.",q:"'La justice distributive : à chacun selon son mérite'"},
{n:"Rawls",w:"Théorie de la justice, 1971",i:"Voile d'ignorance : imaginons que nous ne savons pas quelle place nous occuperons. 2 principes : égale liberté pour tous + principe de différence (les inégalités ne sont justes que si elles profitent aux plus défavorisés).",q:"'Les inégalités sont justifiées si elles profitent aux plus défavorisés'"},
{n:"Marx",w:"Le Capital, 1867",i:"La justice bourgeoise masque l'exploitation. La plus-value : le travailleur crée plus de valeur qu'il n'en reçoit. La vraie justice = abolir la propriété privée des moyens de production.",q:"'De chacun selon ses capacités, à chacun selon ses besoins'"},
{n:"Hobbes",w:"Léviathan, 1651",i:"Sans État, pas de justice possible : état de nature = guerre de tous contre tous. La justice naît du contrat : est juste ce que le souverain déclare juste.",q:"'L'homme est un loup pour l'homme' (formule du De Cive, 1642)"},
{n:"Rousseau",w:"Discours sur l'inégalité, 1755",i:"Les inégalités naturelles sont légitimes. Les inégalités sociales sont artificielles et injustes. La propriété est la source de l'injustice sociale.",q:"'Le premier qui clôtura un terrain... fut le vrai fondateur de la société civile'"},
{n:"Robert Nozick",w:"Anarchie, État et Utopie, 1974 (cours p.78)",i:"Libertarianisme : critique de Rawls. Chacun a un droit absolu à son corps, sa façon de penser, sa beauté, les fruits de son travail. L'égalité des chances + droit de propriété = justice. Redistribuer les richesses viole les droits individuels. 3 enfants et une flûte : Pierre (l'a fabriquée), Paul (le plus pauvre), Jacqueline (la seule qui sache jouer) → selon Nozick, Pierre y a droit.",q:"L'État minimal : protéger les droits sans redistribuer — toute redistribution forcée est injuste"},
{n:"Thoreau",w:"La Désobéissance civile, 1849 (cours p.82, 89)",i:"Face à une loi injuste, la résistance est un devoir moral. 'Il n'est pas plus juste d'obéir à une loi injuste qu'à une loi juste.' La désobéissance civile = non-violence, acte public, acceptation des conséquences. Priorité de la conscience morale sur la loi.",q:"'Sous un gouvernement qui emprisonne injustement, la vraie place d'un homme juste est aussi en prison'"},
],
textes:[
{n:"TEXTE 6 — Platon, Protagoras",t:"Zeus donne justice et pudeur à tous les hommes (contrairement aux techniques réservées aux spécialistes). Sans ces vertus civiques, pas de cité possible."},
{n:"Aristote — justice distributive vs corrective",t:"Distributive : inégalité proportionnelle au mérite (5€ donnés → 5€ reçus, mais selon un rapport). Corrective : égalité arithmétique stricte (rembourser exactement)."},
{n:"Rawls — voile d'ignorance",t:"Expérience de pensée : derrière le voile, on ignore sa position sociale, ses talents, sa conception du bien. On choisira des principes justes par intérêt bien compris."},
{n:"Marx — infrastructure et superstructure",t:"L'État et le droit (superstructure) reflètent les intérêts de la classe dominante (infrastructure économique). La justice bourgeoise légalise l'exploitation."},
{n:"Nozick — l'exercice de la flûte (cours p.78)",t:"Pierre a fabriqué la flûte → libertarianisme : droit de propriété. Paul est le plus pauvre → égalitarisme économique (Rawls). Jacqueline est la seule qui sache jouer → utilitarisme (Mill). Pour Nozick, Pierre y a droit. Mais les différents arguments renvoient chacun à un type différent de logique impartiale. Rawls : il faut se mettre à la place du moins bien loti."},
{n:"Thoreau — La Désobéissance civile (cours p.82, 89)",t:"Face à une loi injuste, il ne suffit pas de voter contre. 'Sous un gouvernement qui emprisonne injustement, la vraie place de l'homme juste est en prison.' La désobéissance civile vise à 'bloquer la machine du gouvernement' en refusant d'en être le rouage. Elle est non-violente, publique et accepte ses conséquences légales."},
],
axes:[
{n:"Axe 1",t:"Justice = égalité arithmétique ou proportionnelle ?",pb:"Traiter tout le monde pareil, est-ce juste ?",
sps:[
{l:"A",c:"L'égalité arithmétique (corrective, Aristote) : même traitement pour tous. Chacun reçoit exactement la même chose. Modèle de la justice devant la loi : 'la loi est la même pour tous'.",r:"Aristote, Éthique à Nicomaque V"},
{l:"B",c:"Mais l'égalité formelle peut masquer des inégalités réelles. Anatole France : 'La loi interdit également aux riches et aux pauvres de coucher sous les ponts.' L'égalité de droit peut être injuste en fait.",r:"Rawls : principe de différence"},
{l:"C",c:"Justice proportionnelle (Aristote) ou principe de différence (Rawls) : traiter différemment les différents pour obtenir une égalité réelle. La discrimination positive comme application.",r:"Rawls, Théorie de la justice"},
]},
{n:"Axe 2",t:"La justice : naturelle ou conventionnelle ?",pb:"La justice est-elle inscrite dans la nature ou dans nos conventions ?",
sps:[
{l:"A",c:"Justice naturelle : pour les Stoïciens, Platon, il existe un droit naturel universel antérieur aux lois humaines. Les Droits de l'Homme en sont l'expression moderne.",r:"Platon, La République ; Déclaration 1789"},
{l:"B",c:"Justice conventionnelle : pour Hobbes, la justice naît du contrat social. Sans État, il n'y a ni juste ni injuste. Les lois sont arbitraires mais nécessaires.",r:"Hobbes, Léviathan ; Pascal : 'la coutume fait toute l'équité'"},
{l:"C",c:"Nuance : même si les lois sont conventionnelles, certains principes semblent universels (interdiction du meurtre, de la torture). La question du droit naturel reste ouverte.",r:"Rawls : principes universels via le voile d'ignorance"},
]},
{n:"Axe 3",t:"Peut-on légitimement désobéir aux lois injustes ?",pb:"L'obligation d'obéir aux lois est-elle absolue ?",
sps:[
{l:"A",c:"Non : Hobbes, Hegel. La légitimité de l'État repose sur l'obéissance aux lois. La désobéissance menace l'ordre social qui rend possible la justice elle-même.",r:"Hobbes, Léviathan ; Hegel, Philo du droit"},
{l:"B",c:"Oui : désobéissance civile (Thoreau, Gandhi, MLK). Face à des lois injustes, la conscience morale peut exiger la résistance. La loi juste est celle conforme à la loi morale.",r:"Martin Luther King, Lettre de Birmingham ; Thoreau cours p.82"},
{l:"C",c:"Nuance : la désobéissance civile est légitime si elle est non-violente, publique, et accepte ses conséquences légales. Elle vise à changer la loi, non à la supprimer.",r:"Rawls : la désobéissance civile dans une société presque juste"},
]},
],
exemples:[
{tag:"Histoire",tit:"Rosa Parks (1955) — désobéissance civile",body:"Rosa Parks refuse de céder sa place dans un bus à un blanc en Alabama. Acte de désobéissance civile qui déclenche le boycott des bus de Montgomery. Exemple de résistance à une loi formellement valide mais moralement injuste.",lien:"→ Rawls, Thoreau, désobéissance civile"},
{tag:"Actualité",tit:"Impôt progressif vs flat tax",body:"Le débat entre impôt proportionnel (taux unique) et progressif (qui augmente avec le revenu) illustre l'opposition entre justice arithmétique et principe de différence de Rawls.",lien:"→ Rawls (principe différence), Aristote (distributive)"},
{tag:"Mythe — Cours",tit:"Mythe de Prométhée (Platon, TEXTE 6)",body:"Zeus distribue justice et pudeur à TOUS les hommes (pas seulement aux spécialistes). Sans vertu civique partagée, pas de cité possible. La justice est condition d'existence de la société.",lien:"→ État, technique, nature"},
{tag:"Philosophie",tit:"L'expérience du voile d'ignorance (Rawls)",body:"Expérience de pensée : si vous deviez choisir les règles de la société sans savoir si vous serez riche ou pauvre, homme ou femme, vous choisiriez des règles justes. Le voile d'ignorance simule l'impartialité.",lien:"→ Rawls, contrat social"},
{tag:"Cours — texte",tit:"Nozick et l'exercice de la flûte (cours p.78)",body:"À qui donner la flûte ? Pierre (a fabriqué la flûte) → libertarianisme. Paul (le plus pauvre) → égalitarisme économique. Jacqueline (la seule qui sache jouer) → utilitarisme. Pour Nozick, Pierre y a droit (droit de propriété). Pour Rawls, il faut partir du plus défavorisé. Cet exercice illustre l'impossibilité d'une définition unique et consensuelle de la justice.",lien:"→ Nozick (libertarianisme), Rawls, Aristote"},
{tag:"Histoire — Cours",tit:"Thoreau et la résistance au gouvernement injuste (cours p.82, 89)",body:"Thoreau refuse de payer ses impôts en signe de protestation contre l'esclavage et la guerre du Mexique. Il est emprisonné. Pour lui, c'est exactement là que doit être 'la vraie place d'un homme juste'. Il accepte les conséquences légales de sa désobéissance. C'est l'exemple fondateur de la désobéissance civile moderne.",lien:"→ Thoreau, King, Gandhi, désobéissance civile"},
],

devoir:{c:"#993556",l:"Devoir",s:"Sommes-nous obligés d'agir moralement ?",
def:"Le <span class='kw'>devoir moral</span> est une obligation inconditionnelle de la raison (Kant), distincte de l'intérêt ou de l'inclination. Pour Kant, le devoir est <span class='kw'>catégorique</span> — il s'impose à tous, indépendamment des conséquences. Mais le devoir peut aussi être compris comme fait social (Durkheim) ou création existentielle (Sartre).<details><summary>Approfondir la notion</summary><div class='def-sec'><div class='def-sec-title'>L'impératif catégorique (Kant)</div><div class='def-sec-body'>Kant distingue <strong>impératif hypothétique</strong> (si tu veux X, fais Y — conditionnel) et <strong>impératif catégorique</strong> (fais cela, quoi qu'il arrive — inconditionnel). Trois formulations : (1) <em>Universalisation</em> : « Agis comme si ta maxime devait devenir loi universelle » ; (2) <em>Humanité comme fin</em> : « Traite l'humanité toujours comme fin, jamais seulement comme moyen » ; (3) <em>Législation universelle</em> : agis comme membre d'un règne des fins. Une action n'a de valeur morale que si elle est accomplie <em>par devoir</em> (et non simplement <em>conformément</em> au devoir).</div></div><div class='def-sec'><div class='def-sec-title'>Devoir légal vs devoir moral</div><div class='def-sec-body'>Le devoir légal est l'ensemble des obligations imposées par la loi positive (code pénal, contrats). Le devoir moral est intérieur, fondé sur la conscience ou la raison. Ils peuvent coïncider ou entrer en conflit. Arendt (<em>Eichmann à Jérusalem</em>) : l'obéissance aveugle à la loi sans exercice du jugement moral conduit à la « banalité du mal ». Nuremberg : « j'obéissais aux ordres » refusé comme justification.</div></div><div class='def-sec'><div class='def-sec-title'>Désobéissance civile</div><div class='def-sec-body'>Quand la loi est injuste, le devoir moral peut exiger de désobéir. Thoreau (<em>La Désobéissance civile</em>, 1849) : une loi injuste n'est pas une loi. King : « On a le devoir moral de désobéir aux lois injustes. » La désobéissance civile est non-violente, publique, et accepte ses conséquences légales (distinguée de l'anarchisme). Rawls la légitime sous trois conditions : injustice grave, recours légaux épuisés, non-violence.</div></div><div class='def-sec'><div class='def-sec-title'>Devoirs envers la nature et l'avenir</div><div class='def-sec-body'>Jonas (<em>Le Principe responsabilité</em>) : la technique moderne crée de nouveaux devoirs envers les générations futures et la biosphère. « Heuristique de la peur » : anticiper la catastrophe pour s'en prémunir. Simone Weil : devoir de l'ingénieur envers les travailleurs — la technique doit intégrer le bien-être humain dans sa conception même.</div></div></details>",
auteurs:[
{n:"Kant",w:"Fondements de la métaphysique des mœurs, 1785",i:"Impératif catégorique : 'Agis uniquement d'après la maxime que tu peux vouloir voir devenir une loi universelle.' Agir par devoir (non conformément au devoir par intérêt). Autrui comme fin, jamais seulement comme moyen.",q:"'Agis de telle sorte que tu traites l'humanité toujours comme une fin, jamais seulement comme un moyen'"},
{n:"Hans Jonas",w:"Le Principe responsabilité, 1990 (TEXTE 5)",i:"Nouveau devoir face à la puissance technique : responsabilité envers les générations futures et la nature. Heuristique de la peur : anticiper les risques pour agir prudemment. Devoir de non-nuisance au futur.",q:"'Agis de façon que les effets de ton action soient compatibles avec la permanence d'une vie humaine authentique'"},
{n:"Sartre",w:"L'existentialisme est un humanisme, 1946 (conférence 1945)",i:"Condamnés à être libres, nous sommes responsables de tout. Pas de nature humaine préalable, pas de Dieu pour dicter le devoir. Le devoir vient de notre liberté radicale. Mauvaise foi = fuir cette responsabilité.",q:"'Condamné à être libre' — le devoir vient de notre liberté, non d'une loi donnée"},
{n:"Durkheim",w:"De la division du travail social, 1893",i:"Le devoir moral est un fait social : la morale est la conscience collective intériorisée. L'obligation morale vient de la société, non d'une raison pure.",q:"La morale = 'manière d'agir obligatoire' issue du social"},
{n:"Simone Weil",w:"L'Enracinement, 1943 (TEXTE 10)",i:"L'ingénieur a un devoir moral envers les travailleurs : intégrer leur bien-être dans la conception des machines. Le devoir professionnel dépasse le contrat. La technique doit être au service de l'homme.",q:"'Poser en termes techniques les problèmes des répercussions des machines sur le bien-être moral des ouvriers'"},
{n:"Nietzsche",w:"Généalogie de la morale, 1887",i:"Critique de la morale du devoir : elle est issue du ressentiment des faibles. La 'morale des esclaves' (christianisme, Kant) valorise la soumission. Le devoir est une forme de culpabilité institutionnalisée.",q:"La mauvaise conscience = intériorisation de la cruauté contre soi-même"},
{n:"Platon",w:"Criton, ~399 av. J.-C. (étude de texte cours p.76-77)",i:"Socrate condamné à mort refuse de fuir malgré l'invitation de Criton. Les lois lui parlent : elles l'ont fait naître, éduquer, protéger. Les désobéir serait les trahir comme des parents. Nous avons le devoir d'obéir à la loi même si elle nous paraît injuste — ou alors convaincre légalement qu'elle est injuste. Analogie lois/parents : pertinente en démocratie, mais limitée.",q:"'Nous avons toujours le devoir d'obéir à la loi, même si elle nous paraît injuste'"},
{n:"Hannah Arendt",w:"Eichmann à Jérusalem — Rapport sur la banalité du mal, 1963 (cours p.83)",i:"Adolf Eichmann, organisateur de la Solution finale, se défend en disant qu'il 'faisait son devoir de citoyen respectueux de la loi' et obéissait aux ordres. Il invoque même Kant pour justifier son obéissance. Arendt montre que c'était une déformation inconsciente de Kant : il s'agissait d'une 'obéissance de cadavre'. La banalité du mal : le mal peut être accompli sans haine, par simple absence de jugement moral.",q:"L''obéissance de cadavre' : obéir sans exercer son jugement moral est la source du mal banal"},
{n:"Henry David Thoreau",w:"La Désobéissance civile, 1849 (cours p.82, 89)",i:"Face à une loi injuste, ne pas l'amender, c'est en être complice. 'Une minorité est impuissante tant qu'elle se conforme à la majorité.' La désobéissance civile = acte public, non violent, qui accepte ses conséquences légales. Elle vise à 'bloquer la machine du gouvernement'. Le passage de la pensée à l'acte est essentiel.",q:"'Il n'est pas plus juste d'obéir à une loi injuste qu'à une loi juste'"},
{n:"Étienne de La Boétie",w:"Discours de la servitude volontaire, 1549 (cours p.89)",i:"Pourquoi les hommes obéissent-ils librement à la tyrannie ? Parce qu'ils s'y habituent dès l'enfance. La servitude est volontaire : si les hommes cessaient de donner leur force au tyran, il tomberait. La liberté se retrouve en cessant de servir, non en combattant.",q:"'Un tyran n'a que la puissance que vous lui donnez — cessez de le servir, il tombera'"},
{n:"Srdja Popovic",w:"Comment faire tomber un dictateur quand on est seul, tout petit, et sans armes, 2015 (cours p.86, 91)",i:"Fondateur du mouvement Otpor en Serbie. Stratégie de la désobéissance non-violente. L'humour comme outil politique : faire perdre en crédibilité les dirigeants. Méthode CANVAS : petites transgressions mineures, actions créatives, désunion des piliers du régime. Appliqué en Syrie sous Bachar Al-Assad (balles de ping-pong).",q:"L'humour et la créativité comme armes de la désobéissance non-violente"},
],
textes:[
{n:"Kant — 3 formulations de l'impératif catégorique",t:"(1) Universalisation : 'Agis comme si ta maxime devait devenir loi universelle.' (2) Humanité comme fin : 'Traite l'humanité toujours comme fin.' (3) Législation universelle : 'Agis comme membre d'un règne des fins.'"},
{n:"TEXTE 5 — Jonas (cours)",t:"Prométhée déchaîné par la science. Face à l'irréversible et au planétaire, anticipation de la catastrophe comme guide éthique. 'Heuristique de la peur.'"},
{n:"TEXTE 10 — Simone Weil (cours)",t:"Les ingénieurs ont jusqu'ici eu en vue seulement les besoins de la fabrication. La technique entière de la production devrait être transformée. Le bien-être moral des ouvriers doit devenir matière d'enseignement."},
{n:"Sartre — liberté et responsabilité",t:"En choisissant pour moi-même, je choisis pour tous les hommes. L'angoisse est la marque de la liberté. La mauvaise foi = se croire déterminé, nier sa liberté pour fuir la responsabilité."},
{n:"Platon, Criton (cours p.76-77) — étude de texte",t:"Criton incite Socrate à désobéir au jugement en s'enfuyant. Socrate s'appuie sur le principe de justice : désobéir à la justice c'est trahir la démocratie. Les lois lui ont permis de grandir, il leur doit obéissance — comme à des parents. Mais cette analogie a des limites : elle suppose que les lois soient le reflet de la volonté commune, ce qui n'est pas toujours vrai."},
{n:"Arendt, Eichmann à Jérusalem (cours p.83) — texte central",t:"Transition de I à II : 'L'obéissance de cadavre'. Eichmann agissait en citoyen respectueux de la loi. Il finissait par insister sur 'les avantages et les inconvénients de l'obéissance aveugle'. Kant déformé : Eichmann disait avoir vécu selon les préceptes moraux de Kant — mais il les avait réduits à l'obéissance aux lois générales de l'État, non à la loi morale universelle."},
{n:"Thoreau, La Désobéissance civile (cours p.82, 89)",t:"Face à une loi injuste, si tu te contentes de respecter la loi, tu deviens l'agent de l'injustice. La machine du gouvernement est corrompue. Il faut que des hommes cessent d'être la 'machine' qui l'entretient. La désobéissance civile est non-violente, publique, et accepte ses conséquences. C'est un acte politique qui vise à bloquer la machine par la vertu morale, non la violence."},
{n:"La Boétie, Discours de la servitude volontaire (cours p.89)",t:"'Comment des milliers d'hommes se laissent-ils asservir par un seul ?' L'habitude et l'éducation expliquent la servitude volontaire. Résistance : ne pas obéir suffit — 'cessez de servir, et vous serez libres'. Mais cette résistance individuelle est insuffisante : il faut une action collective et organisée."},
],
axes:[
{n:"Axe 1",t:"Le devoir comme impératif rationnel universel",pb:"Le devoir est-il une loi que la raison se donne à elle-même ?",
sps:[
{l:"A",c:"Oui (Kant) : l'autonomie morale consiste à se donner sa propre loi. L'hétéronomie (obéir au bonheur, aux désirs, à l'autorité) n'est pas morale. Seul le devoir accompli par respect de la loi morale a une valeur morale.",r:"Kant, Fondements, I"},
{l:"B",c:"L'universalité de l'impératif catégorique garantit son objectivité : une maxime est morale si elle peut être universalisée sans contradiction. Exemple : le mensonge ne peut être universalisé (si tout le monde mentait, la notion de vérité disparaîtrait).",r:"Kant, Fondements, II"},
{l:"C",c:"Critique : peut-on toujours universaliser ? Cas limites (mentir à un assassin pour protéger sa victime). Kant répond qu'on doit toujours dire la vérité. Mais cette rigidité est contestée.",r:"Schiller, Constant : critique du kantisme"},
]},
{n:"Axe 2",t:"Les limites du devoir formel : cas de conscience",pb:"A-t-on toujours le devoir d'obéir ?",
sps:[
{l:"A",c:"Désobéissance civile : face à une loi injuste, la conscience morale peut primer. Martin Luther King : 'On a le devoir moral de désobéir aux lois injustes.' Le devoir moral peut entrer en conflit avec le devoir légal.",r:"King, Lettre de Birmingham"},
{l:"B",c:"Objection de conscience (soldats, médecins) : certains professionnels refusent d'exécuter des ordres contraires à leur conscience. La notion de 'crimes contre l'humanité' reconnaît ce droit.",r:"Procès de Nuremberg : 'j'obéissais aux ordres' refusé"},
{l:"C",c:"Mais qui décide de ce qui est 'injuste' ? Le risque de l'anarchie morale. Rawls : la désobéissance civile est légitime si elle est non-violente, publique et accepte ses conséquences.",r:"Rawls, Théorie de la justice"},
]},
{n:"Axe 3",t:"De nouveaux devoirs : la responsabilité envers l'avenir",pb:"Avons-nous des devoirs envers ce qui n'existe pas encore ?",
sps:[
{l:"A",c:"Oui (Jonas) : la technique crée des effets irréversibles à l'échelle planétaire. Les générations futures ne peuvent pas encore défendre leurs droits. Nous avons donc le devoir de les protéger.",r:"Jonas, Le Principe responsabilité"},
{l:"B",c:"Ce devoir implique un principe de précaution : en cas de doute sur un risque grave et irréversible, agir comme si la catastrophe était probable. 'L'heuristique de la peur' guide l'action.",r:"Jonas — développé dans le cours TEXTE 5"},
{l:"C",c:"Application concrète : devoir de Simone Weil envers les travailleurs. Les ingénieurs et concepteurs de machines ont le devoir de penser aux conditions de travail. Le devoir s'étend à tous les acteurs techniques.",r:"TEXTE 10 — Simone Weil"},
]},
],
exemples:[
{tag:"Histoire",tit:"Le procès de Nuremberg (1945-46)",body:"Les officiers nazis invoquent le devoir d'obéissance ('Befehl ist Befehl' = un ordre est un ordre). Mais le tribunal reconnaît que certains actes sont criminels même si légaux. Le devoir moral prime sur le devoir légal.",lien:"→ Kant (humanité comme fin), Jonas"},
{tag:"Littérature",tit:"Antigone (Sophocle)",body:"Antigone doit choisir entre obéir à la loi de Créon (ne pas enterrer son frère) et obéir à la loi divine (enterrer les morts). Elle choisit le devoir moral contre le devoir légal et en meurt.",lien:"→ Désobéissance civile, justice naturelle"},
{tag:"Actualité",tit:"Lanceurs d'alerte (Snowden, Assange)",body:"Ces individus ont révélé des pratiques illégales au nom d'un devoir moral envers les citoyens. Ils ont violé leur devoir légal (secret défense) par devoir moral envers la vérité et la démocratie.",lien:"→ Rawls (désobéissance civile), Kant"},
{tag:"Philosophie — Cours",tit:"Simone Weil et le devoir de l'ingénieur (TEXTE 10)",body:"Weil décrit des ingénieurs qui conçoivent des machines en ne pensant qu'aux bénéfices et à la production, jamais au bien-être moral des ouvriers. Elle appelle à un devoir professionnel élargi intégrant la dimension humaine.",lien:"→ Technique, travail, Jonas"},
{tag:"Histoire — Cours",tit:"Socrate et le Criton (cours p.76-77)",body:"Condamné à mort injustement, Socrate refuse pourtant de fuir. Argument : les lois lui ont tout donné (naissance, éducation, protection). Les désobéir serait les trahir comme des parents. Mais l'analogie a des limites : elle ne vaut qu'en démocratie, quand les lois reflètent la volonté commune.",lien:"→ Platon (Criton), justice, État, désobéissance civile"},
{tag:"Histoire — Cours",tit:"Eichmann et la banalité du mal (Arendt, cours p.83)",body:"Eichmann organisait la déportation des Juifs tout en se croyant 'bon citoyen respectueux de la loi'. Il invoque même Kant. Arendt montre que le mal peut être accompli sans haine, par simple absence de jugement moral. La leçon : la morale exige de penser, pas seulement d'obéir.",lien:"→ Arendt (banalité du mal), Kant (jugement moral), désobéissance"},
{tag:"Actualité — Cours",tit:"Popovic et les balles de ping-pong en Syrie (cours p.86, 91)",body:"Des activistes syriens envoyaient des balles de ping-pong dans les rues avec des slogans anti-Assad. Impossible à contrôler pour la police. Exemple de désobéissance non-violente créative. L'humour comme outil politique qui fait perdre en crédibilité les dictateurs.",lien:"→ Popovic, Thoreau, La Boétie, désobéissance civile"},
{tag:"Texte — Cours",tit:"La Boétie — 'Cessez de servir, vous serez libres' (cours p.89)",body:"La Boétie pose la question fondamentale : comment un seul tyran domine-t-il des milliers d'hommes ? Par l'habitude, l'éducation, la peur. La liberté ne nécessite pas de combattre — il suffit de cesser d'obéir. Mais la résistance individuelle ne suffit pas : il faut une action collective.",lien:"→ La Boétie (servitude volontaire), Thoreau, Popovic"},
],

travail:{c:"#3B6D11",l:"Travail",s:"Le travail libère-t-il ou aliène-t-il ?",
def:"Le <span class='kw'>travail</span> est la transformation de la nature par l'activité humaine. Il est à la fois <span class='kw'>aliénant</span> (pénible, asservissant, marchandisé) et potentiellement <span class='kw'>libérateur</span> (réalisation de soi, humanisation). Arendt distingue labor/work/action. Nietzsche le critique comme instrument de contrôle social.<details><summary>Approfondir la notion</summary><div class='def-sec'><div class='def-sec-title'>Étymologie &amp; trois dimensions (Arendt)</div><div class='def-sec-body'>Du latin <em>tripalium</em> (instrument de torture à trois pieux) : le travail est d'abord pénibilité. Hannah Arendt (<em>Condition de l'homme moderne</em>, 1958) distingue trois activités : <strong>Labor</strong> (cycle biologique nécessaire, répétitif, sans œuvre durable — corvée quotidienne) ; <strong>Work / Œuvre</strong> (fabrication d'un monde durable : artisan, artiste) ; <strong>Action</strong> (activité politique libre entre hommes). Seuls l'œuvre et l'action permettent de se réaliser pleinement comme humain.</div></div><div class='def-sec'><div class='def-sec-title'>Aliénation et exploitation (Marx)</div><div class='def-sec-body'>Marx distingue le travail libre (expression de la vie) du travail aliéné (sous le capitalisme). Quatre formes d'aliénation : (1) par rapport au <strong>produit</strong> qui échappe au travailleur ; (2) par rapport à l'<strong>activité</strong> imposée et mécanique ; (3) par rapport à l'<strong>espèce</strong> (déshumanisation) ; (4) par rapport aux <strong>autres</strong> (concurrence). La <em>plus-value</em> est le temps de travail non payé extorqué par le capitaliste.</div></div><div class='def-sec'><div class='def-sec-title'>L'artiste travaille-t-il ? (question clé)</div><div class='def-sec-body'>Le PDF du cours pose cette question centrale. <strong>L'artiste travaille</strong> : il produit des efforts réguliers, maîtrise une technique (Nietzsche, <em>Humain trop humain</em> : le « génie » est une illusion — l'artiste observe, travaille, s'exerce). <strong>L'artiste ne travaille pas</strong> : l'œuvre est inutile (≠ satisfaction des besoins), potentiellement immortelle (Arendt), et l'artiste est toujours maître de ses outils (≠ le travailleur asservi à la machine). <strong>L'artiste crée</strong> : l'œuvre est unique, originale, non reproductible par règle — c'est ce que Kant appelle le <em>génie</em>.</div></div><div class='def-sec'><div class='def-sec-title'>Le sens du travail aujourd'hui</div><div class='def-sec-body'>Weil : le travail non servile est celui où le travailleur comprend le lien entre son geste et la finalité du produit. Graeber (<em>Bullshit Jobs</em>) : de nombreux emplois modernes sont perçus comme inutiles par ceux qui les exercent — source de souffrance psychique. Lafargue (<em>Le Droit à la paresse</em>, 1880) : la classe ouvrière s'est laissé intoxiquer par la passion du travail, instrument de sa propre exploitation.</div></div></details>",
auteurs:[
{n:"Hegel",w:"Phénoménologie de l'Esprit, 1807",i:"Dialectique maître/esclave : le maître jouit sans travailler mais reste dépendant. L'esclave, en travaillant la matière, se forme lui-même et découvre sa liberté. Le travail = médiation entre l'homme et le monde.",q:"'C'est dans le travail que l'esclave se retrouve lui-même'"},
{n:"Marx",w:"Manuscrits de 1844 / Le Capital, 1867",i:"4 formes d'aliénation : par rapport au produit (qui lui échappe), à l'activité (mécanique), à l'espèce (déshumanisation), aux autres (concurrence). Plus-value : exploitation du travail. Mais le travail libre est l'essence de l'homme.",q:"'Le travail aliéné arrache à l'homme son activité vitale'"},
{n:"Arendt",w:"Condition de l'homme moderne, 1958 (extraits cours)",i:"Labor (nécessité biologique, cycle sans fin : Extraits 1-4) vs Work/Œuvre (fabrique un monde durable, transforme la nature : Extrait 3) vs Action (activité politique libre). Le labor seul ne réalise pas l'homme.",q:"Travail (répétitif, nécessaire) ≠ Œuvre (durable) ≠ Action (politique, libre)"},
{n:"Nietzsche",w:"Aurore, 1881 (cours p.18-25)",i:"Le travail comme 'meilleure des polices' : il tient les individus occupés, les détourne de la réflexion. La glorification du travail cache la peur de la liberté individuelle. Danger du 'travailleur' qui s'oublie lui-même.",q:"'Un tel travail constitue la meilleure des polices'"},
{n:"Simone Weil",w:"Condition ouvrière / Enracinement, 1943 (TEXTE 10)",i:"Expérience vécue des usines. Le travail en usine est écrasant mais peut être libérateur si le travailleur comprend ce qu'il fait. Devoir de l'ingénieur : concevoir des machines qui ennoblissent les travailleurs.",q:"'La matière sort ennoblie de la fabrique, les travailleurs en sortent avilis' (Marx cité par Weil)"},
{n:"Lafargue",w:"Le Droit à la paresse, 1880",i:"Pamphlet contre le culte du travail. La classe ouvrière s'est laissé intoxiquer par la passion du travail, instrument de sa propre exploitation. Revendiquer le temps libre comme droit fondamental.",q:"'Une étrange folie possède les classes ouvrières : la passion du travail'"},
{new:true,n:"Nietzsche",w:"Humain, trop humain, 1878 (cours art)",i:"Contre le mythe du « don » naturel ou du « génie » inné. L'artiste observe, travaille, s'exerce par la répétition. Cette illusion naît de notre ignorance et de notre paresse : on préfère croire au miracle plutôt qu'au labeur. L'activité du génie n'est pas différente de celle de l'inventeur, du savant ou du tacticien — ce sont des hommes dont la pensée est active dans une direction unique.",q:"'Le génie ne fait rien que d'apprendre à poser des pierres, travailler toujours à y mettre la forme'"},
{new:true,n:"Hannah Arendt",w:"La Crise de la culture, 1961 (cours art)",i:"L'œuvre d'art est l'objet le plus durable qui soit : elle n'est ni consommée (comme les produits du labor) ni usée (comme les objets d'usage). Elle est délibérément écartée des processus de consommation. Elle est fabriquée pour le monde, qui survivra à la vie des mortels — et non pour les hommes. Cette permanence est ce qui distingue l'œuvre de toute autre production humaine.",q:"Les œuvres d'art sont les seules choses à n'avoir aucune fonction dans le processus vital de la société"},
{new:true,n:"Bergson",w:"Le Rire, 1900 (cours art — DM)",i:"L'artiste voit là où les autres ne voient pas : il écarte le voile de la perception utilitaire. Ce que l'artiste a vu, nous ne l'aurions pas vu sans lui — il nous ouvre les yeux sur une réalité que nous n'apercevons pas ordinairement. La vérité de l'œuvre se mesure à l'efficacité de la leçon.",q:"'Ce que l'artiste a vu, nous ne le reverrons pas, du moins entièrement, mais s'il a vu pour tout de bon, son œuvre nous sert de leçon'"},
],
textes:[
{n:"Hegel — dialectique maître/esclave",t:"Maître : jouit sans travailler, mais reste dépendant de l'esclave et de la nature. Esclave : travaille, transforme le monde, se forme. Inversion dialectique : le vrai maître de lui-même devient l'esclave."},
{n:"Arendt — Extraits 1-4 (cours p.35)",t:"Extrait 1 : dans l'Antiquité, travailler = être asservi aux nécessités. Extrait 2 : le labor reproduit la vie biologique (cycle consommation/production). Extrait 3 : productivité = surplus au-delà des besoins vitaux. Extrait 4 : le travail comme conservation du monde commun."},
{n:"Nietzsche — Aurore (cours p.18)",t:"La glorification du travail cache 'la peur de tout ce qui est individuel'. Le travailleur dur est présenté comme 'dangereux'. La sécurité sociale repose sur l'occupation permanente des individus."},
{n:"Weil — Condition première d'un travail non servile (cours p.40)",t:"Le travail servile est gouverné par la nécessité, non la finalité. Il est exécuté à cause d'un besoin, non en vue d'un bien. Exister n'est pas une fin : il faut une 'lumière d'éternité' pour rendre le travail supportable."},
{n:"Cours p.30 — plan dissertation sur l'aliénation",t:"I. Le travail peut être aliénation (peine, servile, déshumanisant). II. Le travail constitue cependant une condition nécessaire à l'émancipation (transforme la nature, crée un surplus, garantit le temps libre)."},
{new:true,n:"Nietzsche, Humain trop humain (cours art — I.L'artiste travaille)",t:"L'activité du génie n'est pas foncièrement différente de celle de l'inventeur, du savant ou du tacticien. Ce sont des hommes dont la pensée est active dans une direction unique, qui utilisent tout comme matière première, qui ne cessent d'observer diligemment leur vie intérieure et celle d'autrui. Le génie ne fait rien que d'apprendre à poser des pierres, travailler toujours à y mettre la forme. Tout ce qui est fini, parfait, excite l'étonnement ; tout ce qui est en train de se faire est déprécié."},
{new:true,n:"Arendt, La Crise de la culture (cours art — II.L'artiste ne travaille pas)",t:"Parmi les choses qu'on ne rencontre pas dans la nature mais seulement dans le monde fabriqué par l'homme, on distingue entre objets d'usage et œuvres d'art. Les deux possèdent une certaine permanence. Les œuvres d'art sont clairement supérieures : comme elles durent plus longtemps que n'importe quoi d'autre, elles sont les plus mondaines des choses. Du point de vue de la durée pure, les œuvres d'art sont les seules choses à n'avoir aucune fonction dans le processus vital de la société."},
{new:true,n:"Hegel, Esthétique (cours art — II.2 création libre)",t:"Ce qui nous plaît dans la beauté artistique, c'est précisément le caractère de liberté de sa production. L'art beau n'est véritablement art qu'en cette liberté propre. La source des œuvres d'art est la libre activité de l'imagination, plus libre que la nature. Face à la sombre intériorité de la pensée, on cherche l'apaisement dans les figures de l'art."},
{new:true,n:"Kant, Critique de la faculté de juger (cours art — III.L'artiste crée)",t:"Le génie est le talent de produire ce dont on ne peut donner de règle déterminée — non l'habileté qu'on peut montrer en faisant ce qu'on peut apprendre suivant une règle. L'originalité est sa première qualité. Ses productions doivent être exemplaires et servir de mesure ou de règle d'appréciation. Il ne peut lui-même décrire comment il accomplit ses productions — l'auteur en étant redevable à son génie, ne sait pas lui-même comment les idées s'en trouvent en lui."},
{new:true,n:"Merleau-Ponty, Sens et non-sens, 1966 (DM art)",t:"Le peintre n'a pu que construire une image. Il faut attendre que cette image s'anime pour les autres. Alors l'œuvre d'art aura joint ces vies séparées — elle n'existera plus seulement en l'une d'elles comme un rêve tenace ou un délire persistant, mais dans l'espace comme une toile coloriée. Elle habitera indivise dans plusieurs esprits, présomptivement dans tout esprit possible, comme une acquisition pour toujours."},
{new:true,n:"Schopenhauer, Le Monde comme volonté et représentation, 1819 (DM art)",t:"L'œuvre d'art ne doit pas tout livrer directement aux sens, mais juste ce qu'il faut pour mettre l'imagination en bonne voie. L'imagination doit toujours avoir quelque chose à ajouter — c'est elle qui doit dire le dernier mot. Ce qu'il y a de meilleur dans l'art est trop spirituel pour être livré directement aux sens : c'est à l'imagination à le mettre au jour, quoique l'œuvre d'art doive l'engendrer."},
],
axes:[
{n:"Axe 1",t:"Le travail comme aliénation",pb:"Le travail prive-t-il l'homme de sa liberté ?",
sps:[
{l:"A",c:"Le travail comme peine (étym. tripalium = instrument de torture). Dans l'Antiquité, réservé aux esclaves car asservissement à la nécessité. Le travail force biologique, répétitif et sans fin (labor d'Arendt).",r:"Arendt, Condition moderne, Extrait 1 ; cours p.35"},
{l:"B",c:"Marx : aliénation du travail salarié. 4 formes : rapport au produit (qui appartient au patron), à l'activité (mécanique, imposée), à l'espèce (déshumanisation), aux autres (concurrence). La plus-value = vol légalisé.",r:"Marx, Manuscrits de 1844"},
{l:"C",c:"Nietzsche : la glorification du travail sert le contrôle social. 'Bullshit jobs' (Graeber, cours) : des millions de travailleurs occupent des postes inutiles mais bien payés, source de malaise. Le burn-out comme pathologie du culte du travail.",r:"Cours p.19 — Nietzsche ; Graeber cité cours"},
]},
{n:"Axe 2",t:"Le travail comme condition de l'émancipation humaine",pb:"Le travail peut-il libérer l'homme ?",
sps:[
{l:"A",c:"Hegel : l'esclave se libère par le travail. En transformant la matière, il s'y retrouve lui-même. Le travail forme la conscience de soi. Marx dans les 1844 : le travail libre est 'l'expression de la vie'.",r:"Hegel, Phénoménologie ; cours p.30 axe II"},
{l:"B",c:"L'œuvre (Arendt) permet de créer un monde durable et commun. L'artisan, l'artiste réalisent leur humanité dans leur production. Ce que je fabrique me survit et dit qui je suis.",r:"Arendt, Condition moderne, Extrait 3 ; cours p.31"},
{l:"C",c:"Le surplus créé par le travail (Arendt/Marx) garantit un temps libre ('temps hors-travail'). Ce temps libre est la condition de la vie politique, culturelle, de l'action (3e catégorie d'Arendt).",r:"Cours p.31 — le surplus et le temps libre"},
]},
{n:"Axe 3",t:"Quel sens donner au travail aujourd'hui ?",pb:"Le travail est-il encore une valeur ?",
sps:[
{l:"A",c:"La question du sens : Weil dénonce le travail servile (gouverné par la nécessité). Elle cherche une 'condition première d'un travail non servile' : que le travailleur comprenne le lien entre son geste et la finalité du produit.",r:"Weil, Condition ouvrière ; cours p.40"},
{l:"B",c:"Graeber et les 'bullshit jobs' : de nombreux emplois modernes sont perçus comme inutiles par ceux qui les exercent. Le travail bien payé mais vide de sens cause autant de souffrance que le travail pénible.",r:"Cours p.19 — Graeber"},
{l:"C",c:"Pascal et le divertissement : le travail nous détourne du néant et de la mort (cours p.19). Il est à la fois nécessaire (survie), potentiellement aliénant (Nietzsche) et potentiellement réalisateur (Hegel). La valeur du travail dépend de ses conditions.",r:"Cours p.19 — Pascal, Nietzsche"},
]},
],
exemples:[
{tag:"Cinéma",tit:"Charlie Chaplin — Les Temps modernes (1936)",body:"Charlot sur la chaîne de montage fordiste : il répète indéfiniment le même geste (serrer des boulons), finit par visser tout ce qui ressemble à un boulon. Image parfaite de l'aliénation par le travail industriel et de la 'déshumanisation' décrite par Marx.",lien:"→ Marx (aliénation), Arendt (labor), cours p.30"},
{tag:"Histoire",tit:"La révolution industrielle (XIXe s.)",body:"Le passage à la manufacture et à l'usine transforme le rapport au travail : le paysan qui maîtrisait son cycle de production devient ouvrier parcellaire, asservi au rythme de la machine. Marx analyse cette transformation comme source d'aliénation.",lien:"→ Marx, Arendt, cours p.30"},
{tag:"Cours — texte",tit:"Weil — Condition première d'un travail non servile (cours p.40)",body:"Weil décrit le travail servile comme gouverné par la nécessité pure : on travaille pour survivre, pour pouvoir manger, pour pouvoir retravailler. La seule chose qui rende le travail supportable est 'une lumière d'éternité' — une signification transcendant l'immédiateté.",lien:"→ Aliénation, bonheur, sens"},
{tag:"Contemporain",tit:"Burn-out et bore-out (cours p.19)",body:"Le burn-out (épuisement par excès de travail) et le bore-out (ennui au travail) sont deux pathologies du rapport au travail. Elles illustrent que le travail peut 'fortifier son corps et ruiner son esprit' (cours). Le travail forcé sur le corps devient accident du travail intérieur.",lien:"→ Nietzsche, Graeber, aliénation"},
],
liens:["Technique","Liberté","Justice","État"],
diss:["Le travail est-il une valeur ?","Travailler, est-ce perdre sa liberté ?","Le travail humanise-t-il l'homme ?","Peut-on se réaliser dans le travail ?","Le travail est-il 'la meilleure des polices' ?"]
},
technique:{c:"#185FA5",l:"Technique",s:"La technique nous libère-t-elle ou nous aliène-t-elle ?",
def:"La <span class='kw'>technique</span> est l'ensemble des procédés rationnels visant à transformer la nature. Elle pose la question de la <span class='kw'>maîtrise</span> : maîtrisons-nous la technique ou est-ce elle qui nous maîtrise ? Simondon propose une troisième voie : développer une culture technique.<details><summary>Approfondir la notion</summary><div class='def-sec'><div class='def-sec-title'>Étymologie : technê et art</div><div class='def-sec-body'>Du grec <em>technê</em> (art, habileté, savoir-faire) traduit en latin par <em>ars</em>. La <em>technê</em> a le double sens de <strong>savoir-faire technique</strong> (artisan) et de <strong>création artistique</strong> (artiste). C'est pourquoi le latin <em>ars</em> désigne à la fois l'artiste et l'artisan (<em>artifex</em>). La technique se distingue de l'art en visant l'<strong>utilité et l'efficacité</strong> plutôt que la beauté désintéressée, et elle se distingue de la science en étant pratique (application) plutôt que théorique.</div></div><div class='def-sec'><div class='def-sec-title'>Technique et nature humaine</div><div class='def-sec-body'>Aristote : la main est « l'outil à faire des outils » — la technique est constitutive de l'humanité. Bergson : <em>homo faber</em> avant <em>homo sapiens</em> — l'intelligence est d'abord fabrication. Platon (<em>Protagoras</em>) : le mythe de Prométhée montre que l'homme est l'animal <em>déficient</em> qui compense par la technique et la vie politique. La technique est donc liée à la raison instrumentale (<em>Vernunft</em>).</div></div><div class='def-sec'><div class='def-sec-title'>Technique moderne : aliénation ou libération ?</div><div class='def-sec-body'>Descartes : nous rendre « maîtres et possesseurs de la nature ». Heidegger : la technique moderne n'est pas un outil mais un <strong>mode de dévoilement</strong> — elle réduit le réel à un « fonds disponible » exploitable (le Rhin = centrale électrique). Anders : après Hiroshima, nous sommes devenus un « genre mortel » comme espèce. Jonas : heuristique de la peur — anticiper la catastrophe pour créer de nouveaux devoirs. Ellul : la technique est désormais notre milieu total.</div></div><div class='def-sec'><div class='def-sec-title'>Culture technique (Simondon)</div><div class='def-sec-body'>Simondon (<em>Du Mode d'existence des objets techniques</em>, 1958) : la technophobie vient de la méconnaissance des machines. La vraie aliénation est celle de l'utilisateur ignorant. Solution : développer une <strong>culture technique</strong> — comprendre le fonctionnement des machines pour les coordonner (comme un chef d'orchestre) plutôt que les subir. Les objets techniques contiennent une réalité humaine que la culture doit intégrer.</div></div></details>",
auteurs:[
{n:"Aristote",w:"Les Parties des animaux (TEXTE 7)",i:"La main humaine est 'l'outil à faire des outils' (outil polymorphe). Ce n'est pas parce que l'homme a des mains qu'il est intelligent — c'est parce qu'il est intelligent qu'il a des mains. La technique est dans la nature de l'homme.",q:"'La main semble être non pas un outil, mais plusieurs : elle tient lieu des autres'"},
{n:"Bergson",w:"L'Évolution créatrice, 1907 (TEXTE 8)",i:"Homo faber : l'intelligence est d'abord faculté de fabriquer des objets artificiels (outils à faire des outils). Notre vie sociale gravite autour de la fabrication. La technique modèle l'individu et la société.",q:"'L'intelligence est la faculté de fabriquer des objets artificiels, en particulier des outils à faire des outils'"},
{n:"Descartes",w:"Discours de la méthode, 1637 (TEXTE 9)",i:"La technique permet de 'nous rendre comme maîtres et possesseurs de la nature'. La physique pratique : connaître feu, eau, air pour les utiliser. But : améliorer la santé, 'premier bien et fondement de tous les autres biens'.",q:"'Nous rendre comme maîtres et possesseurs de la nature'"},
{n:"Simondon",w:"Du Mode d'existence des objets techniques, 1958 (TEXTES 11-15)",i:"La plus forte aliénation vient de la méconnaissance de la machine. Pour dépasser la technophobie, il faut une culture technique. L'homme est 'organisateur permanent' des machines (chef d'orchestre, pas surveillant). Machine automatique (bas degré) vs machine ouverte (haute technicité).",q:"'La plus forte cause d'aliénation réside dans la méconnaissance de la machine'"},
{n:"Hans Jonas",w:"Le Principe responsabilité, 1990 (TEXTE 5)",i:"Prométhée déchaîné par la science. Loi de Gabor : tout ce qui est possible sera réalisé. Face à l'irréversible, heuristique de la peur. Nécessité d'un encadrement légal et moral de la technique.",q:"'Le Prométhée définitivement déchaîné réclame une éthique qui empêche le pouvoir de l'homme de devenir une malédiction pour lui'"},
{n:"Ellul",w:"Le Système technicien, 1977",i:"La technique est notre milieu naturel actuel. Elle n'est pas un simple outil mais un système autonome qui conditionne toute la société. Loi de Gabor. L'homme n'en est plus maître : il est dans le 'système technicien'.",q:"La technique comme milieu total : nous y vivons comme dans la nature"},
{n:"Simone Weil",w:"L'Enracinement, 1943 (TEXTE 10)",i:"Les ingénieurs n'ont eu que les besoins de la fabrication en vue. Devoir moral : intégrer le bien-être des ouvriers dans la conception des machines. La technique doit servir l'homme, pas le capital.",q:"'Poser en termes techniques les problèmes des répercussions des machines sur le bien-être moral des ouvriers'"},
{new:true,n:"Hannah Arendt",w:"La Condition de l'homme moderne, 1958 (TEXTE 1)",i:"Le désir d'échapper à la condition terrestre — éprouvette, prolongation de vie, modification de la nature humaine — constitue une révolte contre l'existence humaine telle qu'elle est donnée. C'est le même désir d'Icare : se soustraire à la condition humaine. C'est une question politique primordiale qui ne peut être abandonnée aux seuls professionnels de la science.",q:"Vouloir échapper à la condition humaine, c'est vouloir abolir l'humain lui-même"},
{new:true,n:"Gunther Anders",w:"Le Temps de la fin, 1972 (TEXTE 2)",i:"Après Hiroshima, l'humanité est passée du rang de 'genre des mortels' à celui de 'genre mortel' : nous avons désormais le pouvoir-mourir comme espèce entière. Ce nouveau statut métaphysique est la plus grande transformation de l'histoire humaine. La technique a créé quelque chose d'irréversible et d'inédit.",q:"'Nous sommes passés du rang de genre des mortels à celui de genre mortel'"},
{new:true,n:"Heidegger",w:"'La question de la technique', Essais et conférences, 1953 (TEXTE 3)",i:"La technique moderne n'est pas un outil mais un mode de dévoilement — une 'mise à disposition' qui provoque la nature à livrer de l'énergie extractible et accumulable. Le réel n'est plus perçu que comme 'fonds disponible' (Bestand). Exemple : le Rhin mis en demeure de livrer son énergie hydraulique n'est plus un fleuve, c'est une centrale électrique. Différence avec le moulin à vent : la technique moderne commande la nature, elle ne coopère pas avec elle.",q:"L'essence de la technique moderne = mise à disposition du réel comme fonds exploitable"},
{new:true,n:"Baudrillard",w:"La Société de consommation, 1970 (TEXTE 4)",i:"Les hommes modernes sont entourés non plus d'hommes mais d'objets. La technique ne répond plus aux besoins primaires mais au rêve d'abondance — elle sert le rêve de l'humanité et non ses besoins premiers. On peut se demander si la technique est née d'un besoin ou si elle est là pour accomplir nos rêves. La technique devient prescriptrice de l'être : elle définit ce que nous sommes en définissant ce que nous consommons.",q:"'Les hommes de l'opulence ne sont plus entourés d'hommes, mais d'objets'"},
],
textes:[
{n:"TEXTE 7 — Aristote",t:"La main comme outil polymorphe : griffe, serre, lance ou épée. Elle peut tout saisir et tenir. L'homme n'est pas moins bien pourvu que les animaux : il a la main."},
{n:"TEXTE 8 — Bergson, Homo faber",t:"L'invention mécanique est la démarche essentielle de l'intelligence. Notre vie sociale gravite autour de la fabrication et de l'utilisation d'instruments artificiels. La machine à vapeur définira notre âge."},
{n:"TEXTE 9 — Descartes",t:"La physique pratique pour maîtriser feu, eau, air, astres. Améliorer la santé : 'premier bien et fondement de tous les autres biens de cette vie'."},
{n:"TEXTE 10 — Simone Weil",t:"Les ingénieurs pensent aux bénéfices et à la production, jamais aux ouvriers. La technique entière doit être transformée. Devoir d'inclure le bien-être moral dans le 'cahier des charges des ingénieurs'."},
{n:"TEXTES 11-15 — Simondon",t:"11: la culture ignore la réalité humaine de la technique. 12: aliénation de l'utilisateur ignorant. 13: puissance de l'homme habile (relation de causalité récurrente avec la matière). 14: machine automatique (bas degré) vs ouverte (haute technicité). 15: l'individu technique — l'homme comme organisateur permanent."},
{n:"TEXTE 5 — Jonas",t:"Heuristique de la peur : l'anticipation de la menace elle-même est ce qui peut nous aider à découvrir les nouveaux devoirs. La loi de Gabor : tout ce qui est possible sera exhaustivement tenté."},
{new:true,n:"TEXTE 1 — Arendt, La Condition de l'homme moderne, chap. III §1",t:"La Terre est la quintessence de la condition humaine. Le désir d'échapper à la condition terrestre (créer la vie en éprouvette, prolonger la vie, modifier la nature humaine) = révolte contre l'existence donnée. Cet homme futur produit par les savants 'paraît en proie à la révolte contre l'existence humaine telle qu'elle est donnée'. C'est une question politique primordiale qui ne peut être abandonnée aux professionnels."},
{new:true,n:"TEXTE 2 — Anders, Le Temps de la fin",t:"Hiroshima nous a transformés métaphysiquement. Jusqu'en 1945 on ne se posait jamais la question : le genre humain est-il mortel ? Désormais nous appartenons à un genre qui, en tant que tel, est mortel. 'Nous sommes passés du rang de genre des mortels à celui de genre mortel' — passage du pouvoir-mourir individuel au pouvoir-mourir collectif de l'espèce entière."},
{new:true,n:"TEXTE 3 — Heidegger, La question de la technique (1953)",t:"Le dévoilement qui régit la technique moderne = mise à disposition par laquelle la nature est mise en demeure de livrer une énergie qui puisse être extraite et accumulée. Le paysan qui cultivait autrefois entourait la terre de soins. Aujourd'hui l'agriculture est une industrie motorisée. Le Rhin mis sous haute tension : la centrale est construite dans le Rhin, non le Rhin dans la centrale — il est commandé au sens d'une mise à disposition."},
{new:true,n:"TEXTE 4 — Baudrillard, La Société de consommation",t:"À proprement parler, les hommes de l'opulence ne sont plus entourés d'autres hommes, mais par des OBJETS. Leur commerce quotidien n'est plus le commerce avec leurs semblables mais la réception et la manipulation de biens et de messages. La technique devient prescriptrice de l'être : elle définit ce que nous sommes en définissant ce que nous consommons et ce dont nous rêvons."},
],
axes:[
{n:"Axe 1",t:"La technique libère et prolonge la puissance humaine",pb:"La technique est-elle l'expression de la liberté humaine ?",
sps:[
{l:"A",c:"La technique prolonge les capacités naturelles de l'homme. Aristote : la main est déjà 'outil à faire des outils'. Bergson : l'homo faber précède l'homo sapiens. La technique est constitutive de l'humanité.",r:"TEXTE 7 (Aristote), TEXTE 8 (Bergson)"},
{l:"B",c:"Descartes : la maîtrise de la nature par la technique améliore nos conditions de vie. La médecine, l'agriculture, les transports libèrent l'homme des contraintes naturelles (faim, maladie, distance).",r:"TEXTE 9 (Descartes)"},
{l:"C",c:"Simondon : l'homme habile (TEXTE 13) entretient une 'relation de causalité récurrente' avec la matière. Il n'impose pas sa volonté mais compose avec les propriétés de la matière. La technique au service de la créativité.",r:"TEXTE 13 (Simondon)"},
]},
{n:"Axe 2",t:"La technique aliène et échappe à la maîtrise",pb:"L'homme maîtrise-t-il encore la technique ?",
sps:[
{l:"A",c:"La technique est devenue notre milieu naturel (Ellul). Elle n'est plus un outil utilisé par l'homme mais un système qui nous conditionne. La loi de Gabor : tout ce qui est techniquement possible sera réalisé.",r:"Ellul, Le Système technicien ; cours"},
{l:"B",c:"Simondon (TEXTE 12) : aliénation de l'utilisateur ignorant. L'homme connaît ce qui entre et sort de la machine mais pas ce qui s'y passe. Cette méconnaissance est la vraie cause d'aliénation, plus que la machine elle-même.",r:"TEXTE 12 (Simondon)"},
{l:"C",c:"Jonas : la technique crée des effets irréversibles que nous ne maîtrisons plus (nucléaire, OGM, IA). La 'loi de Gabor' signifie que nous ne pouvons pas maîtriser le développement technique pris dans une logique d'auto-accroissement.",r:"TEXTE 5 (Jonas) ; cours p.2"},
]},
{n:"Axe 3",t:"La culture technique comme réponse",pb:"Comment vivre avec la technique sans être dominé par elle ?",
sps:[
{l:"A",c:"Simondon (TEXTE 11) : la technophobie est une réaction de méconnaissance. La culture s'est constituée en défense contre les techniques, mais cette opposition est fausse. Les objets techniques contiennent une réalité humaine.",r:"TEXTE 11 (Simondon)"},
{l:"B",c:"L'homme doit devenir 'organisateur permanent' des machines (TEXTE 15), comme un chef d'orchestre. Pas les surveiller (esclave/maître) mais les coordonner en comprenant leur fonctionnement.",r:"TEXTE 15 (Simondon)"},
{l:"C",c:"Jonas et Weil convergent : la technique exige un encadrement éthique et légal. Weil : devoir de l'ingénieur envers les travailleurs. Jonas : principe de précaution. La technique doit être mise au service de valeurs humaines.",r:"TEXTE 10 (Weil), TEXTE 5 (Jonas)"},
]},
{new:true,n:"Axe 4",t:"Faut-il craindre le développement technique ?",pb:"La peur de la technique est-elle légitime et philosophiquement utile ?",
sps:[
{l:"A",c:"Oui, la crainte est légitime : l'augmentation de notre puissance destructrice crée la démesure (hybris — Arendt, mythe d'Icare ; bombe atomique — Anders, TEXTE 2). La technique moderne provoque la nature comme fonds exploitable (Heidegger, TEXTE 3) et menace la sixième extinction (Leakey & Lewin, 1995). La société de consommation déshumanise (Baudrillard, TEXTE 4).",r:"Arendt, TEXTE 1 ; Anders, TEXTE 2 ; Heidegger, TEXTE 3 ; Baudrillard, TEXTE 4"},
{l:"B",c:"La peur peut s'avérer utile — c'est l'heuristique de la peur (Jonas, TEXTE 5) : l'anticipation de la menace elle-même nous aide à découvrir les nouveaux devoirs. Ne pas attendre la catastrophe pour agir. La peur est une boussole éthique face à l'irréversible.",r:"Jonas, Le Principe responsabilité, TEXTE 5"},
{l:"C",c:"Mais la peur sans culture technique engendre une technophobie stérile (Simondon). La technique est dans la nature humaine depuis 2,5 millions d'années (homo faber). La vraie réponse est une éducation technique, une culture des objets techniques, et des technologies démocratiques (open access contre monopoles des GAFAM).",r:"Platon, Protagoras, TEXTE 6 ; Simondon, TEXTES 11-15 ; Jonas"},
]},
],
exemples:[
{tag:"Histoire",tit:"La machine à vapeur et la révolution industrielle",body:"La machine à vapeur (Watt, 1769) illustre Bergson : elle 'tracera la route du progrès'. Elle modifie en profondeur les habitudes sociales, les conditions de travail, la structure des villes. L'homo faber transforme son propre milieu de vie.",lien:"→ TEXTE 8 (Bergson), Marx, travail"},
{tag:"Contemporain",tit:"Intelligence artificielle générative",body:"L'IA (ChatGPT, etc.) illustre la loi de Gabor : ce qui est possible sera réalisé, sans qu'aucun acteur ne décide globalement. Elle pose la question de Simondon (aliénation de l'utilisateur ignorant) et de Jonas (effets irréversibles sur l'emploi, la culture, la vérité).",lien:"→ Loi Gabor, Simondon (TEXTE 12), Jonas"},
{tag:"Mythe — Cours",tit:"Mythe de Prométhée (TEXTE 6)",body:"Prométhée vole le feu (technique) à Héphaïstos pour compenser la nudité naturelle de l'homme. C'est le mythe fondateur de la technique comme supplément à la nature. Mais le châtiment de Prométhée (enchaîné, foie dévoré) symbolise aussi le danger de la démesure technique.",lien:"→ Nature, devoir, Jonas"},
{tag:"Philosophie",tit:"L'histoire des greffes d'organes (cours — conférence)",body:"Les greffes d'organes illustrent la puissance et les limites éthiques de la technique médicale. La greffe du cœur pose la question de l'identité (symbolique de l'organe) ; les greffes de visage celle des limites de la transformation du corps humain. Lien direct avec la notion de nature humaine.",lien:"→ Corps, conscience, nature, devoir"},
{new:true,tag:"Histoire — Cours",tit:"Hiroshima (1945) — Anders et le genre mortel",body:"Hiroshima est l'exemple par excellence d'un effet irréversible de la technique. Anders : avant 1945, l'humanité ne se savait pas mortelle en tant qu'espèce. Après, elle l'est. Cela transforme le statut métaphysique de l'humain : nous sommes désormais co-responsables de la survie de l'espèce entière. Jonas tire de cela l'heuristique de la peur.",lien:"→ Anders (TEXTE 2), Jonas (principe responsabilité), devoir"},
{new:true,tag:"Philosophie — Cours",tit:"Chantier Castor — lowtech et biomimétisme (Morizot)",body:"Le Chantier Castor illustre une troisième voie technique : ni domination (Descartes/Heidegger) ni rejet (technophobie). Le lowtech (biomimétisme, techniques simples, appropriables, durables, résilientes) utilise la nature comme modèle. L'alliance avec les castors pour régénérer une rivière = technique au service de la diplomatie inter-espèces.",lien:"→ Morizot (nature), Heidegger (mise à disposition), Simondon (culture technique)"},
{new:true,tag:"Philosophie — Cours",tit:"Simondon et la méfiance envers les machines (SF, robots)",body:"La crainte de la technique s'exprime dans la SF (robots, IA maléfiques). Simondon montre que cette peur vient de la méconnaissance : l'homme moderne ignore le fonctionnement des machines et les fantasme. La machine est en réalité une réalité ouverte, adaptable, qui trouve mieux sa place quand elle est comprise. Derrière le monde technique, Simondon voit une symphonie.",lien:"→ Simondon (TEXTES 11-15), aliénation technique"},
],

diss:["La technique est-elle libératrice ?","L'homme maîtrise-t-il la technique ?","La technique peut-elle résoudre tous les problèmes ?","Faut-il craindre la technique ?","La culture technique est-elle possible ?",{new:true,q:"Faut-il craindre le développement technique ?"},{new:true,q:"L'être humain peut-il devenir le produit de ses techniques ?"},{new:true,q:"La technique change-t-elle la condition humaine ?"},{new:true,q:"La technique nous déshumanise-t-elle ?"},{new:true,q:"La technique naît-elle de nos besoins ou de nos rêves ?"},{new:true,q:"La technique décuple-t-elle nécessairement notre puissance ?"}]
},
etat:{c:"#5F5E5A",l:"État",s:"L'État est-il nécessaire ?",
def:"L'<span class='kw'>État</span> est une forme d'organisation politique qui détient le <span class='kw'>monopole de la violence légitime</span> (Weber) sur un territoire. Il naît d'un contrat social ou d'un rapport de force. Question centrale : l'État est-il garant de la liberté ou menace contre elle ? La désobéissance peut-elle être légitime face à un État injuste ?<details><summary>Approfondir la notion</summary><div class='def-sec'><div class='def-sec-title'>Origine et légitimité</div><div class='def-sec-body'>Weber (<em>Le Savant et le politique</em>, 1919) : l'État détient le <strong>monopole de la violence physique légitime</strong> sur un territoire. Trois types de légitimité : <strong>traditionnelle</strong> (coutume, héritage), <strong>charismatique</strong> (personnalité exceptionnelle du chef), <strong>légale-rationnelle</strong> (règles impersonnelles — l'État de droit moderne). Les théories du contrat social (Hobbes, Locke, Rousseau) cherchent à fonder cette légitimité rationnellement.</div></div><div class='def-sec'><div class='def-sec-title'>Trois visions du contrat social</div><div class='def-sec-body'><strong>Hobbes</strong> : état de nature = guerre de tous contre tous → contrat cède tous les droits à un souverain absolu (Léviathan) pour la sécurité. <strong>Locke</strong> : état de nature pacifique mais fragile → l'État protège les droits naturels, le contrat est révocable si le gouvernement viole ces droits. <strong>Rousseau</strong> : volonté générale souveraine, inaliénable — l'État juste exprime la volonté générale (≠ volonté de tous = somme des intérêts particuliers).</div></div><div class='def-sec'><div class='def-sec-title'>Critiques de l'État</div><div class='def-sec-body'><strong>Marx &amp; Engels</strong> : l'État est l'instrument de la classe dominante (police + armée + prison au service du capital). L'État bourgeois protège les intérêts du capital, non l'intérêt général. Objectif révolutionnaire : dépérissement de l'État. <strong>Nozick</strong> (libertarianisme) : l'État minimal est seul légitime — la redistribution viole les droits individuels. <strong>La Boétie</strong> : la tyrannie repose sur la servitude volontaire — le tyran n'a que la puissance qu'on lui donne.</div></div><div class='def-sec'><div class='def-sec-title'>État et liberté</div><div class='def-sec-body'>Hegel : l'État n'est pas seulement instrument mais fin en soi — la liberté objective se réalise dans les institutions (famille → société civile → État). Tocqueville : la démocratie peut dériver vers un <strong>despotisme doux</strong> si les citoyens sont passifs — l'État bienveillant prend tout en charge et réduit les citoyens à un troupeau. Exigence : vigilance active des citoyens.</div></div></details>",
auteurs:[
{n:"Hobbes",w:"Léviathan, 1651",i:"Sans État : état de nature = guerre de tous contre tous, vie 'solitaire, misérable, bestiale et brève'. Le contrat cède tous les droits à un souverain absolu (Léviathan) en échange de la sécurité. La justice naît du contrat.",q:"'L'homme est un loup pour l'homme' (formule du De Cive, 1642)"},
{n:"Locke",w:"Traité du gouvernement civil, 1690",i:"L'état de nature est pacifique mais fragile (sans juge impartial). L'État protège les droits naturels (vie, liberté, propriété). Le contrat est révocable : si le gouvernement viole les droits, la révolution est légitime.",q:"L'État = protecteur des droits naturels, contrat révocable"},
{n:"Rousseau",w:"Du Contrat social, 1762",i:"Volonté générale : la souveraineté appartient au peuple, inaliénable et indivisible. Le contrat transforme la liberté naturelle en liberté civile. L'État juste = expression de la volonté générale, pas de la volonté de tous.",q:"'L'obéissance à la loi qu'on s'est prescrite est liberté'"},
{n:"Hegel",w:"Principes de la philosophie du droit, 1820",i:"L'État est la réalité effective de la liberté objective. Il n'est pas seulement instrument mais fin en soi : la vie éthique concrète. La famille (amour) → la société civile (intérêts) → l'État (universalité).",q:"'L'État est la réalité effective de la liberté concrète'"},
{n:"Marx",w:"L'Idéologie allemande / Le Manifeste, 1848",i:"L'État est l'instrument de la classe dominante. Infrastructure économique → superstructure (État, droit, idéologie). L'État bourgeois protège les intérêts du capital. Objectif : dépérissement de l'État dans la société communiste.",q:"'L'État n'est que le comité d'affaires de la bourgeoisie'"},
{n:"Weber",w:"Le Savant et le politique, 1919",i:"L'État = monopole de la violence physique légitime sur un territoire. 3 types de légitimité : traditionnelle, charismatique, légale-rationnelle. L'État moderne repose sur la légitimité légale-rationnelle.",q:"'L'État revendique le monopole de la violence physique légitime'"},
{n:"Engels",w:"L'Origine de la famille, de la propriété et de l'État, 1884 (cours p.92-93)",i:"L'État dispose de 3 instruments de domination : la police, l'armée et la prison. Il répond au besoin de la classe dominante de contrôler la classe exploitée. L'État s'appuie sur la force (contrainte) et sur l'idéologie (légitimation). Distinction infrastructure (économie) / superstructure (État, droit, idées). Concept de 'conscience de classe'.",q:"L'État = police + armée + prison au service de la classe dominante"},
{n:"Robert Nozick",w:"Anarchie, État et Utopie, 1974 (cours p.78)",i:"Libertarianisme : l'État minimal est seul légitime. Chacun a le droit absolu à son corps, sa façon de penser, ses biens. L'égalité des chances + droit de propriété = justice. Critique de Rawls : redistribuer les richesses viole les droits individuels. La justice n'est pas dans la redistribution mais dans le respect des titres de propriété acquis légitimement.",q:"L'État minimal : seul légitime — protéger les droits sans redistribuer"},
{n:"La Boétie",w:"Discours de la servitude volontaire, 1549 (cours p.89)",i:"Pourquoi les hommes obéissent-ils librement à la tyrannie ? Par habitude, éducation, complicité. Le tyran n'a que la puissance qu'on lui donne. La résistance n'exige pas de combattre : il suffit de cesser de servir. Mais la résistance individuelle ne suffit pas — il faut une action collective organisée.",q:"'Un tyran n'a que la puissance que vous lui donnez — cessez de le servir, il tombera'"},
],
textes:[
{n:"Hobbes — état de nature",t:"Sans loi : pas de justice, ni propriété, ni industrie. 'La force et la ruse sont les deux vertus cardinales.' Le Léviathan : l'État-monstre qui garantit la paix par sa puissance absolue."},
{n:"Rousseau — contrat social",t:"Aliéner la liberté naturelle pour gagner la liberté civile. La loi = volonté générale (ce que le peuple veut pour le bien commun), différente de la volonté de tous (somme des intérêts particuliers)."},
{n:"Marx — infrastructure et superstructure (cours)",t:"Infrastructure économique détermine la superstructure (État, droit, idéologie). L'État semble neutre et universel mais défend les intérêts de la bourgeoisie. Engels développe cette analyse dans le contexte du cours."},
{n:"Platon — justice dans la cité (TEXTE 6)",t:"Zeus donne justice et pudeur à tous pour que la cité soit possible. Sans vertu civique partagée, pas de société. L'État repose sur une éducation morale des citoyens."},
{n:"Engels — L'Origine de la famille... (cours p.92-93)",t:"L'État répond au besoin de la classe dominante de se maintenir au pouvoir. Ses 3 instruments : police (contrôle quotidien), armée (force brute), prison (répression). La classe ouvrière (prolétariat) possède uniquement sa force de travail. La bourgeoisie possède les moyens de production (capital). L'État est le gardien de cet ordre."},
{n:"Nozick — libertarianisme (cours p.78)",t:"L'égalité des chances a semblé à de nombreux auteurs être le but égalitaire minimal. Il y a deux façons d'assurer une telle égalité : en dégradant directement la situation de ceux qui sont le plus favorisés par le hasard ou en améliorant la situation des moins favorisés. Cette dernière solution exige l'utilisation des ressources, et suppose donc l'aggravation de certains pour améliorer les autres. Nozick s'y oppose : cela viole les droits individuels."},
{n:"Hobbes, Le Citoyen (cours p.96)",t:"Liberté civile vs liberté naturelle : à l'état de nature, chacun a droit sur toute chose, ce qui produit le chaos. La liberté civile, limitée et réglée par la loi, est préférable à la liberté naturelle totale mais infructueuse. Le contrat social échange la liberté absolue contre la sécurité et une liberté garantie."},
{n:"Rousseau, Du contrat social — Du pacte social (cours p.96-130)",t:"'Trouver une forme d'association qui défende et protège de toute la force commune la personne et les biens de chaque associé, et par laquelle chacun, s'unissant à tous, n'obéisse pourtant qu'à lui-même, et reste aussi libre qu'auparavant.' En entrant dans la société civile, on gagne 'l'équivalent de tout ce qu'on perd et plus de force pour conserver ce que l'on a.'"},
{n:"Tocqueville, De la démocratie en Amérique (cours p.96-130)",t:"La démocratie peut dériver vers un despotisme doux et tutélaire. Si les citoyens, enivrés de jouissances, abandonnent leur vigilance, l'État prend en charge tous leurs besoins et les réduit à un troupeau timide et industrieux. La responsabilité des citoyens est d'empêcher l'émergence de pouvoirs illégitimes en maintenant leur participation active."},
],
axes:[
{n:"Axe 1",t:"L'État comme nécessité face à la violence naturelle",pb:"Peut-on se passer de l'État ?",
sps:[
{l:"A",c:"Hobbes : sans État, état de guerre. La violence est le seul régulateur des conflits. La vie est 'solitaire, misérable, bestiale et brève'. L'État est la condition de toute vie sociale stable.",r:"Hobbes, Léviathan XIII"},
{l:"B",c:"Mais tous ne partagent pas ce pessimisme. Locke : l'état de nature est pacifique, gouverné par la loi naturelle et la raison. L'État n'est pas nécessaire pour éviter la guerre, mais pour trancher les conflits.",r:"Locke, Traité du gouvernement civil"},
{l:"C",c:"Anarchisme (Proudhon, Bakounine) : l'État est lui-même source de violence et d'oppression. Les associations libres et la coopération peuvent organiser la vie collective sans État. Mais cette thèse reste utopique ou très exigeante.",r:"Proudhon : 'l'anarchie c'est l'ordre sans le pouvoir'"},
]},
{n:"Axe 2",t:"L'État et la liberté : protecteur ou oppresseur ?",pb:"L'État garantit-il la liberté ou la menace-t-il ?",
sps:[
{l:"A",c:"L'État protège la liberté (Locke, Rousseau) : sans État, la liberté du plus faible est nulle. L'État garantit les droits individuels et l'égalité devant la loi. La liberté civile est supérieure à la liberté naturelle.",r:"Locke, Rousseau Du Contrat social"},
{l:"B",c:"Mais l'État peut devenir tyrannie. Tocqueville : le despotisme démocratique menace les libertés par le biais de la 'tyrannie de la majorité'. L'État providence peut conduire à une 'douce servitude'.",r:"Tocqueville, De la démocratie en Amérique"},
{l:"C",c:"Marx : l'État bourgeois est structurellement oppresseur. Il protège la liberté formelle (égalité devant la loi) mais maintient l'inégalité réelle. La liberté réelle exige la transformation de l'économie, pas seulement de l'État.",r:"Marx, Le Capital ; La Question juive"},
]},
{n:"Axe 3",t:"La légitimité de l'État : d'où vient l'autorité ?",pb:"Pourquoi obéit-on à l'État ?",
sps:[
{l:"A",c:"Consentement (Locke, Rousseau) : l'État est légitime si les citoyens y ont consenti (contrat social). La démocratie est la forme d'État la plus légitime car la loi y est l'expression de la volonté du peuple.",r:"Rousseau, Du Contrat social III"},
{l:"B",c:"Weber : la légitimité peut être traditionnelle (roi de droit divin), charismatique (leader charismatique) ou légale-rationnelle (État de droit). L'État moderne repose sur la loi, non sur la personne du gouvernant.",r:"Weber, Le Savant et le politique"},
{l:"C",c:"Rawls : l'État est légitime s'il respecte les principes de justice que les citoyens auraient choisis derrière le voile d'ignorance. La légitimité se fonde sur la justice, pas seulement sur le consentement.",r:"Rawls, Théorie de la justice"},
]},
],
exemples:[
{tag:"Histoire",tit:"La Révolution française (1789)",body:"La Révolution française illustre le passage de la légitimité traditionnelle (roi de droit divin) à la légitimité légale-rationnelle (souveraineté nationale). La Déclaration des droits de l'homme incarne l'idée lockéenne que l'État doit protéger les droits naturels.",lien:"→ Locke, Rousseau, légitimité"},
{tag:"Philosophie",tit:"Le Léviathan de Hobbes",body:"La couverture du Léviathan (1651) montre un souverain géant dont le corps est fait de milliers de sujets. Métaphore parfaite : l'État est la somme des volontés individuelles qui lui ont cédé leur force en échange de la sécurité.",lien:"→ Hobbes, contrat social"},
{tag:"Actualité",tit:"États faillis (Somalie, Libye post-2011)",body:"Les 'États faillis' illustrent la thèse de Hobbes : quand l'État s'effondre, c'est bien l'état de nature (guerre civile, milices, insécurité totale) qui revient. Preuve a contrario de la nécessité de l'État.",lien:"→ Hobbes (état de nature), Weber (monopole violence)"},
{tag:"Contemporain",tit:"Désobéissance fiscale et justice",body:"Le débat sur l'évasion fiscale des multinationales illustre la tension entre l'État et les intérêts économiques. Marx dirait que l'État défend les intérêts du capital ; Rawls demanderait si cette situation profite aux plus défavorisés.",lien:"→ Marx (État bourgeois), Rawls (principe différence)"},
{tag:"Histoire — Cours",tit:"George Floyd/Naël — la légitimité de la violence d'État (cours p.92)",body:"Les violences policières illustrent la question de la légitimité du monopole de la violence d'État. Quand la force de l'État est perçue comme illégitime et disproportionnée, elle engendre des mouvements de résistance. Weber : la légitimité du monopole de la violence doit être continuellement réaffirmée.",lien:"→ Weber (monopole violence légitime), Engels (police/armée/prison), désobéissance"},
{tag:"Actualité — Cours",tit:"La Boétie et la servitude volontaire — s'applique aux régimes autoritaires (cours p.89)",body:"La Boétie : si les peuples soumis à une tyrannie cessaient simplement d'obéir, le tyran tomberait de lui-même. Appliqué aux régimes contemporains : Popovic en Serbie (mouvement Otpor), puis en Syrie (balles de ping-pong anti-Assad). La désobéissance collective est l'outil ultime face à l'État tyrannique.",lien:"→ La Boétie, Popovic, Thoreau, désobéissance civile"},
],

diss:["Peut-on se passer de l'État ?","L'État est-il garant de la liberté ?","L'État doit-il tout réguler ?","Obéir à l'État, est-ce renoncer à sa liberté ?","D'où vient la légitimité de l'État ?","L'État est-il toujours l'instrument de la classe dominante ?","La désobéissance à l'État peut-elle être légitime ?"]
