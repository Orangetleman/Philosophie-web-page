<!DOCTYPE html>
<!--
╔══════════════════════════════════════════════════════════════════════════╗
║        GRAPHE PHILOSOPHIE — TERMINALE  ·  index.html                   ║
║        Application de révision mono-fichier HTML/CSS/JS                ║
╚══════════════════════════════════════════════════════════════════════════╝

  STRUCTURE DU FICHIER
  ────────────────────
  1. <head>          Métadonnées, police Google Fonts (Inter)
  2. <style>         Tout le CSS (variables, layout, composants UI)
  3. <body> HTML     Squelette minimal : sidebar (#sb) + zone principale (#main)
  4. <script>        Toute la logique JS, données et rendu

  ARCHITECTURE JS (dans l'ordre d'apparition)
  ─────────────────────────────────────────────
  A. DONNÉES
     · const D        — Les 9 notions du programme (conscience, nature…)
                        Chaque notion contient : auteurs, textes, axes, exemples,
                        liens, questions de dissertation, définition enrichie.
     · const AM       — Métadonnées des auteurs : bio, courant, période, thèmes,
                        dialogues philosophiques (qui répond à qui, sur quoi).
     · const CONCEPTS — Glossaire de ~70 concepts clés (cogito, aliénation…)
                        avec définition, tensions, auteur, notions liées.
     · const CC       — Couleurs par courant philosophique (Rationalisme → bleu…)

  B. ÉTAT DE L'APPLICATION
     · cur            — Notion actuellement sélectionnée (clé de D)
     · curTab         — Onglet actif dans la vue notion (auteurs/textes/axes…)
     · sbMode         — Mode de la sidebar : 'notions' | 'auteurs' | 'concepts'
     · curAuthor      — Auteur actuellement sélectionné
     · curAuthorTab   — Onglet actif dans la fiche auteur (idées/citations…)
     · curConcept     — Concept actuellement sélectionné
     · historyStack   — Pile de navigation (bouton Retour)

  C. FONCTIONS UTILITAIRES
     · buildAI()         — Construit un index auteur → {notions, entries} depuis D
     · authorsSorted()   — Trie les auteurs par nombre de notions couvertes
     · pushHistory()     — Sauvegarde l'état actuel dans la pile de navigation
     · backBtnHTML()     — Génère le HTML du bouton Retour (désactivé si pile vide)
     · linkTerms(html)   — Détecte les termes du glossaire dans un texte HTML
                           et les transforme en liens cliquables (.cterm)

  D. RENDU (fonctions render*)
     · renderSB()              — Reconstruit toute la sidebar (tabs + liste)
     · renderSBList()          — Liste des auteurs filtrée/recherchée
     · renderSBConceptsList()  — Liste des concepts filtrée/recherchée
     · renderContent()         — Vue principale d'une notion (5 onglets)
     · renderAuthorContent()   — Fiche d'un auteur (idées/citations/œuvres/dialogues)
     · renderConceptContent()  — Fiche d'un concept du glossaire

  E. NAVIGATION
     · tab(id)          — Change l'onglet actif dans la vue notion
     · openAuthor(name) — Ouvre la fiche d'un auteur (depuis n'importe où)
     · openConcept(id)  — Ouvre un concept ou redirige vers la notion liée

  DONNÉES : STRUCTURE D'UNE NOTION (objet dans D)
  ────────────────────────────────────────────────
  {
    c:       "#couleur hex",
    l:       "Label affiché",
    s:       "Sous-titre / question",
    def:     "HTML de la définition (peut contenir <details>)",
    auteurs: [ { n, w, i, q, new?, modified? }, … ],
    textes:  [ { n, t, new?, modified? }, … ],
    axes:    [ { n, t, pb, sps:[{l,c,r}], new?, modified? }, … ],
    exemples:[ { tag, tit, body, lien, new?, modified? }, … ],
    liens:   [ "AutreNotion", … ],
    diss:    [ "Question ?", { q, new?, modified? }, … ]
  }

  DONNÉES : STRUCTURE D'UN AUTEUR DANS AM
  ────────────────────────────────────────
  {
    bio:       "Présentation biographique",
    courant:   "Courant philosophique",
    periode:   "XVIIe siècle",
    themes:    ["thème1", "thème2", …],
    dialogues: [{ dir: "oppose"|"prolonge"|"repond", auteur, sujet, desc }, …]
  }

  CORRECTIONS APPLIQUÉES (vérifiées)
  ───────────────────────────────────
  Orthographe : "indubitable" (×5), "autoconscience" (×2), "Aurore" (×6),
  "diligemment" (×2), "ennoblissent", "Redistribuer", "névrose".
  Factuel : Merda d'artista (Manzoni), Salvatore Garau, Constitution
  équatorienne 2008, Serres 1990, La Boétie ~1549, Saussure CLG 1916,
  Schopenhauer 1819, Sartre 1946, Aristote ~335 av. J.-C., Boroditsky
  TED 2017, Hobbes De Cive 1642.
-->
<html lang="fr"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Graphe Philosophie — Terminale</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
<style>
/* ══════════════════════════════════════════════════════════════════
   CSS — TABLE DES MATIÈRES
   ──────────────────────────────────────────────────────────────────
   1. Variables globales (:root)
   2. Layout de base  — body, .wrap, .sidebar, .main
   3. Sidebar         — items de notion (.nb), titre (.stitle)
   4. Tabs            — barre d'onglets (.tab)
   5. En-tête notion  — .notion-head, .ntitle, .nsub, .def-box
   6. Contenu notion  — .ag/.ac (auteurs), .tbox (textes),
                        .axe-card (axes), .ex-card (exemples),
                        .lpill/.dq (liens & dissertations)
   7. Badges          — .new-badge (nouveau), .modified-badge (modifié)
   8. Bouton retour   — .back-btn
   9. Définition enrichie — .def-box details/summary
  10. Sidebar Auteurs — onglets (.sb-tab), recherche/filtre
  11. Liste auteurs   — .ab, .ab-badges
  12. Fiche auteur    — .author-title, .idea-card, .cit-card,
                        .oeuvre-card, .dial-card
  13. Sidebar Concepts — .cb
  14. Fiche concept   — .concept-title, .tension-item
  15. Liens inline    — .cterm (terme cliquable), .an-link (auteur)
   ══════════════════════════════════════════════════════════════════ */

/* ── 1. Variables globales ───────────────────────────────────────── */
:root{
  --color-background-primary:#1e1e1e;
  --color-background-secondary:#2a2a2a;
  --color-text-primary:#f5f5f5;
  --color-text-secondary:#d4d4d4;
  --color-text-tertiary:#a0a0a0;
  --color-border-tertiary:#3a3a3a;
  --color-border-secondary:#555555;
  --color-background-info:#1e2d1e;
  --color-border-info:#2d5a2d;
  --color-text-info:#6abf6a;
  --border-radius-lg:12px;
  --border-radius-md:8px;
}
/* ── 2. Layout de base ───────────────────────────────────────────── */
body{font-family:'Inter',system-ui,sans-serif;background:#121212;height:100vh;padding:16px;overflow:hidden;}
*{box-sizing:border-box;margin:0;padding:0}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
.wrap{height:calc(100vh - 32px);display:flex;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;}
.sidebar{width:155px;flex-shrink:0;background:var(--color-background-secondary);border-right:0.5px solid var(--color-border-tertiary);display:flex;flex-direction:column;overflow:hidden;}
.sb-fixed{flex-shrink:0;padding:0 7px;}
.sidebar-list{flex:1;overflow-y:auto;padding:0 7px 8px;height:0;min-height:0;}
/* ── 3. Sidebar — liste des notions ─────────────────────────────── */
.stitle{font-size:10px;font-weight:500;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.06em;padding:0 6px 8px;flex-shrink:0;}
.nb{padding:7px 9px;border-radius:var(--border-radius-md);cursor:pointer;font-size:12px;color:var(--color-text-secondary);border:0.5px solid transparent;transition:all .15s;line-height:1.3;display:flex;align-items:center;gap:6px;flex-shrink:0;}
.nb:hover{background:var(--color-background-primary);color:var(--color-text-primary)}
.nb.active{background:var(--color-background-primary);color:var(--color-text-primary);border-color:var(--color-border-secondary);font-weight:500}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.main-content{flex:1;overflow-y:auto;padding:18px 22px 24px;height:0;min-height:0;}

/* ── 4. Tabs — barre d'onglets principale ────────────────────────── */
.tabs{display:flex;gap:2px;border-bottom:0.5px solid var(--color-border-tertiary);padding:10px 22px 0;flex-shrink:0;}
.tab{padding:7px 14px;font-size:12px;cursor:pointer;color:var(--color-text-secondary);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;border-radius:0}
.tab:hover{color:var(--color-text-primary)}
.tab.active{color:var(--color-text-primary);font-weight:500;border-bottom-color:currentColor}

.notion-head{display:flex;align-items:center;gap:10px;margin-bottom:14px;margin-top:18px}
.nbadge{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.ntitle{font-size:17px;font-weight:500;color:var(--color-text-primary)}
.nsub{font-size:12px;color:var(--color-text-secondary);margin-top:2px}

.def-box{background:var(--color-background-secondary);border-left:2.5px solid var(--color-border-secondary);padding:11px 13px;border-radius:0 var(--border-radius-md) var(--border-radius-md) 0;margin-bottom:16px;font-size:13px;color:var(--color-text-secondary);line-height:1.65}
.kw{font-weight:500;color:var(--color-text-primary)}

.slabel{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--color-text-tertiary);margin-bottom:8px}

/* ── 6. Contenu notion — onglet Auteurs (.ag/.ac) ────────────────── */
.ag{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:9px;margin-bottom:16px}
.ac{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:10px 12px}
.an{font-size:12px;font-weight:500;margin-bottom:2px}
.aw{font-size:11px;color:var(--color-text-tertiary);font-style:italic;margin-bottom:4px}
.ai{font-size:12px;color:var(--color-text-secondary);line-height:1.5}
.aq{font-size:11px;color:var(--color-text-tertiary);font-style:italic;margin-top:5px;border-left:2px solid var(--color-border-tertiary);padding-left:7px;line-height:1.4}

/* ── 6b. Contenu notion — onglet Textes (.tbox/.ti2) ─────────────── */
.tbox{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:11px 13px;margin-bottom:16px}
.ti2{display:flex;flex-direction:column;gap:3px;padding:8px 0;border-bottom:0.5px solid var(--color-border-tertiary);font-size:12px;line-height:1.5}
.ti2:last-child{border-bottom:none;padding-bottom:0}
.tinum{font-weight:500;color:var(--color-text-primary);flex-shrink:0}
.titxt{color:var(--color-text-secondary)}

/* ── 6c. Contenu notion — onglet Axes (.axe-card/.sp) ───────────── */
.axe-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:12px 14px;margin-bottom:10px}
.axe-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.axe-num{font-size:10px;font-weight:500;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.05em}
.axe-title{font-size:13px;font-weight:500;color:var(--color-text-primary)}
.axe-pb{font-size:11px;color:var(--color-text-secondary);margin-bottom:8px;font-style:italic}
.sp{margin:4px 0 0 0;padding:0}
.sp-item{display:flex;gap:7px;font-size:12px;color:var(--color-text-secondary);padding:3px 0;line-height:1.45;border-bottom:0.5px solid var(--color-border-tertiary)}
.sp-item:last-child{border-bottom:none}
.sp-letter{font-weight:500;color:var(--color-text-primary);flex-shrink:0;min-width:14px}
.sp-content{color:var(--color-text-secondary)}
.sp-ref{font-size:10px;color:var(--color-text-tertiary);display:block;margin-top:1px}

/* ── 6d. Contenu notion — onglet Exemples (.ex-card) ─────────────── */
.ex-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:11px 13px;margin-bottom:9px}
.ex-head{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.ex-tag{font-size:10px;font-weight:500;padding:2px 8px;border-radius:20px;flex-shrink:0}
.ex-title{font-size:12px;font-weight:500;color:var(--color-text-primary)}
.ex-body{font-size:12px;color:var(--color-text-secondary);line-height:1.55}
.ex-lien{font-size:10px;color:var(--color-text-tertiary);margin-top:4px;font-style:italic}

/* ── 6e. Contenu notion — onglets Liens & Dissertations ──────────── */
.liens-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
.lpill{font-size:11px;padding:4px 10px;border-radius:20px;cursor:pointer;border:0.5px solid;color:inherit;background:transparent;transition:opacity .15s}
.lpill:hover{opacity:.7}
.diss-list{margin-bottom:4px}
.dq{font-size:12px;color:var(--color-text-secondary);padding:5px 0 5px 12px;position:relative;line-height:1.4;border-bottom:0.5px solid var(--color-border-tertiary)}
.dq:last-child{border-bottom:none}
.dq::before{content:"?";position:absolute;left:0;color:var(--color-text-tertiary);font-size:11px;top:6px}

/* ── Éléments nouveaux ────────────────────────────────────────── */
:root{
  --color-new:#C8923A;
  --color-new-bg:#2a2210;
  --color-new-border:#5a3e1a;
}
.new-badge{
  display:inline-flex;align-items:center;gap:3px;
  font-size:9px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
  background:var(--color-new-bg);color:var(--color-new);
  border:0.5px solid var(--color-new-border);
  border-radius:4px;padding:1px 6px;flex-shrink:0;
}
.ac.is-new{border-color:var(--color-new-border);background:var(--color-new-bg)}
.ac.is-new .an{position:relative}
.ti2.is-new{background:var(--color-new-bg);border-radius:4px;padding:5px 7px;margin-bottom:2px;border-bottom:none!important}
.ti2.is-new .tinum{color:var(--color-new)}
.axe-card.is-new{border-color:var(--color-new-border);background:var(--color-new-bg)}
.axe-card.is-new .axe-num{color:var(--color-new)}
.ex-card.is-new{border-color:var(--color-new-border);background:var(--color-new-bg)}
.dq.is-new{color:var(--color-new);border-bottom-color:var(--color-new-border)}
.dq.is-new::before{color:var(--color-new)}

/* ── Éléments modifiés ────────────────────────────────────────── */
:root{
  --color-mod:#4A9CC8;
  --color-mod-bg:#0d1e2a;
  --color-mod-border:#1d4c6e;
}
.modified-badge{
  display:inline-flex;align-items:center;gap:3px;
  font-size:9px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
  background:var(--color-mod-bg);color:var(--color-mod);
  border:0.5px solid var(--color-mod-border);
  border-radius:4px;padding:1px 6px;flex-shrink:0;
}
.ac.is-modified{border-color:var(--color-mod-border);background:var(--color-mod-bg)}
.ac.is-modified .an{color:var(--color-mod)!important}
.ti2.is-modified{background:var(--color-mod-bg);border-radius:4px;padding:5px 7px;margin-bottom:2px;border-bottom:none!important}
.ti2.is-modified .tinum{color:var(--color-mod)}
.axe-card.is-modified{border-color:var(--color-mod-border);background:var(--color-mod-bg)}
.axe-card.is-modified .axe-num{color:var(--color-mod)}
.ex-card.is-modified{border-color:var(--color-mod-border);background:var(--color-mod-bg)}
.dq.is-modified{color:var(--color-mod);border-bottom-color:var(--color-mod-border)}
.dq.is-modified::before{color:var(--color-mod)}
.idea-card.is-modified{border-color:var(--color-mod-border);background:var(--color-mod-bg)}

/* ── Bouton retour ───────────────────────────────────────────── */
.back-btn{
  display:inline-flex;align-items:center;gap:4px;
  padding:5px 10px;font-size:11px;font-weight:500;
  color:var(--color-text-tertiary);background:transparent;
  border:0.5px solid var(--color-border-tertiary);
  border-radius:var(--border-radius-md);cursor:pointer;
  font-family:inherit;transition:all .15s;flex-shrink:0;
  margin-right:6px;line-height:1;
}
.back-btn:hover{color:var(--color-text-primary);border-color:var(--color-border-secondary);background:var(--color-background-primary)}
.back-btn:disabled{opacity:.3;cursor:default;pointer-events:none}

/* ── Définition enrichie ─────────────────────────────────────── */
.def-box details{margin-top:10px;border-top:0.5px solid var(--color-border-tertiary);padding-top:8px}
.def-box summary{cursor:pointer;font-size:11px;font-weight:600;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.07em;list-style:none;display:flex;align-items:center;gap:5px;user-select:none}
.def-box summary::-webkit-details-marker{display:none}
.def-box summary::before{content:'▶';font-size:8px;transition:transform .2s}
.def-box details[open] summary::before{content:'▼'}
.def-box details[open] summary{color:var(--color-text-secondary)}
.def-sec{margin-top:9px}
.def-sec-title{font-size:10px;font-weight:600;color:var(--color-text-primary);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.def-sec-body{font-size:12px;color:var(--color-text-secondary);line-height:1.65;padding-left:9px;border-left:2px solid var(--color-border-secondary);margin-bottom:7px}
.def-sec-body strong{color:var(--color-text-primary);font-weight:500}

/* ── Sidebar tabs Notions / Auteurs ─────────────────────────── */
.sb-tabs{display:flex;gap:2px;margin-bottom:8px;padding:0 2px}
.sb-tab{flex:1;padding:5px 4px;font-size:10px;font-weight:500;text-align:center;cursor:pointer;border-radius:var(--border-radius-md);color:var(--color-text-tertiary);border:0.5px solid transparent;transition:all .15s;line-height:1.2}
.sb-tab:hover{color:var(--color-text-primary)}
.sb-tab.active{background:var(--color-background-primary);color:var(--color-text-primary);border-color:var(--color-border-tertiary)}

/* ── Author search & filter ──────────────────────────────────── */
.sb-search-row{display:flex;gap:4px;padding:0 2px;margin-bottom:6px}
.sb-search{flex:1;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:5px 8px;font-size:11px;color:var(--color-text-primary);outline:none;font-family:inherit;min-width:0}
.sb-search::placeholder{color:var(--color-text-tertiary)}
.sb-search:focus{border-color:var(--color-border-secondary)}
.sb-filter-btn{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:5px 7px;cursor:pointer;font-size:11px;color:var(--color-text-tertiary);transition:all .15s;flex-shrink:0;line-height:1}
.sb-filter-btn:hover{color:var(--color-text-primary);border-color:var(--color-border-secondary)}
.sb-filter-btn.active{color:var(--color-new);border-color:var(--color-new-border);background:var(--color-new-bg)}
.filter-panel{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:8px 7px;margin:0 2px 6px;display:none}
.filter-panel.open{display:block}
.filter-panel-title{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--color-text-tertiary);margin-bottom:6px}
.filter-notions{display:flex;flex-direction:column;gap:3px;margin-bottom:7px}
.filter-notion-item{display:flex;align-items:center;gap:6px;cursor:pointer;padding:3px 4px;border-radius:5px;transition:background .12s}
.filter-notion-item:hover{background:var(--color-background-secondary)}
.filter-notion-check{width:12px;height:12px;border-radius:3px;border:1.5px solid var(--color-border-secondary);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:8px;transition:all .12s}
.filter-notion-check.checked{border-color:transparent}
.filter-notion-label{font-size:11px;color:var(--color-text-secondary);line-height:1.2}
.filter-actions{display:flex;gap:4px}
.filter-action-btn{flex:1;padding:4px 0;font-size:10px;border-radius:5px;cursor:pointer;border:0.5px solid var(--color-border-tertiary);background:transparent;color:var(--color-text-tertiary);font-family:inherit;transition:all .12s}
.filter-action-btn:hover{color:var(--color-text-primary);border-color:var(--color-border-secondary)}
.sb-results-count{font-size:9px;color:var(--color-text-tertiary);padding:0 4px 4px;text-transform:uppercase;letter-spacing:.05em}

/* ── Author list items ──────────────────────────────────────── */
.ab{padding:7px 9px;border-radius:var(--border-radius-md);cursor:pointer;font-size:12px;color:var(--color-text-secondary);border:0.5px solid transparent;transition:all .15s}
.ab:hover{background:var(--color-background-primary);color:var(--color-text-primary)}
.ab.active{background:var(--color-background-primary);color:var(--color-text-primary);border-color:var(--color-border-secondary);font-weight:500}
.ab-name{line-height:1.3;margin-bottom:3px}
.ab-badges{display:flex;flex-wrap:wrap;gap:2px}
.ab-bdg{width:6px;height:6px;border-radius:50%;flex-shrink:0;display:inline-block}

/* ── Author fiche header ─────────────────────────────────────── */
.author-title{font-size:17px;font-weight:500;color:var(--color-text-primary)}
.author-courant{display:inline-flex;align-items:center;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;padding:2px 8px;border-radius:20px;margin-top:2px}
.author-def-box{background:var(--color-background-secondary);border-left:2.5px solid var(--color-border-secondary);padding:11px 13px;border-radius:0 var(--border-radius-md) var(--border-radius-md) 0;margin-bottom:16px;font-size:13px;color:var(--color-text-secondary);line-height:1.65}

/* ══════════════════════════════════════════════════════════════════
   A. DONNÉES — NOTIONS
   ──────────────────────────────────────────────────────────────────

   Pour chaque notion, les propriétés sont :

     s        → sous-titre / question d'accroche
     def      → définition HTML (peut contenir un <details> dépliable)
     auteurs  → tableau d'auteurs, chacun avec :
                  n  = nom  ·  w = œuvre  ·  i = idée  ·  q = citation
                  new? / modified? → affiche un badge coloré
     textes   → textes du cours (n = titre, t = contenu)
     axes     → 3 axes de dissertation, chacun avec :
                  n = "Axe 1"  ·  t = titre  ·  pb = problématique
                  sps = sous-parties [{l, c, r}] (lettre, contenu, référence)
     exemples → exemples mobilisables (tag, tit, body, lien)
     liens    → noms d'autres notions liées (navigables)
     diss     → questions de dissertation (string ou {q, new?})
   ══════════════════════════════════════════════════════════════════ */
const D={
conscience:{c:"#534AB7",l:"Conscience",s:"Qu'est-ce que la conscience ?",
def:"La <span class='kw'>conscience</span> est la présence à soi et au monde. On distingue la <span class='kw'>conscience immédiate</span> (perception du monde) et la <span class='kw'>conscience réflexive</span> (retour sur soi). Mais la psychanalyse (Freud) remet en cause sa transparence : une grande part de la vie psychique nous échappe.<details><summary>Approfondir la notion</summary><div class='def-sec'><div class='def-sec-title'>Étymologie &amp; distinctions</div><div class='def-sec-body'>Du latin <em>cum scientia</em> (« avec savoir »). On distingue : <strong>conscience psychologique</strong> (présence au monde, perception) ; <strong>conscience morale</strong> (sens du bien et du mal, voix intérieure) ; <strong>conscience politique</strong> (prise de conscience collective, engagement). Ces trois sens se recoupent souvent.</div></div><div class='def-sec'><div class='def-sec-title'>Le problème du cogito (Descartes)</div><div class='def-sec-body'>Le cogito (<em>Méditations</em>, 1641) pose la conscience comme seule certitude indubitable. Mais est-ce une substance ou un acte ? Nietzsche critique le cogito : dire « je pense » présuppose un sujet substantiel qui n'est pas prouvé — il ne faut dire que « ça pense ». Hume va encore plus loin : le moi n'est qu'un « faisceau de perceptions » sans unité stable.</div></div><div class='def-sec'><div class='def-sec-title'>Conscience et inconscient</div><div class='def-sec-body'>La psychanalyse freudienne (Ça / Moi / Surmoi) montre que la conscience n'est que la partie émergée de l'iceberg psychique. Les désirs refoulés, les pulsions, les actes manqués révèlent que le moi n'est pas « maître en sa propre maison ». La conscience n'est donc ni transparente ni souveraine.</div></div><div class='def-sec'><div class='def-sec-title'>Identité et intersubjectivité</div><div class='def-sec-body'>Hegel : la conscience de soi naît dans le <strong>regard d'autrui</strong> (dialectique maître/esclave). Locke : l'identité personnelle se fonde sur la mémoire (continuité de conscience). Ricœur distingue <em>idem</em> (identité numérique, permanence) et <em>ipse</em> (identité narrative, récit de soi). Sartre : la conscience est néant — elle n'est jamais « chose ».</div></div></details>",
auteurs:[
{n:"Descartes",w:"Méditations métaphysiques, 1641",i:"Cogito : 'Je pense donc je suis'. La conscience est le seul fondement indubitable. Dualisme : l'âme (pensée) et le corps (étendue) sont deux substances distinctes.",q:"'Je pense, donc je suis'"},
{n:"Freud",w:"Introduction à la psychanalyse, 1916",i:"L'inconscient comme iceberg : le moi n'est pas maître en sa propre maison. Ça / Moi / Surmoi. Les pulsions refoulées agissent à notre insu (rêves, lapsus, actes manqués).",q:"'Le moi n'est pas maître dans sa propre maison'"},
{n:"Sartre",w:"L'Être et le Néant, 1943",i:"La conscience est néant : elle n'est jamais chose. Elle est toujours intentionnelle (dirigée vers autre chose). La mauvaise foi = se croire une chose déterminée.",q:"'La conscience est ce qu'elle n'est pas et n'est pas ce qu'elle est'"},
{n:"Hegel",w:"Phénoménologie de l'Esprit, 1807",i:"Dialectique maître/esclave : la conscience de soi naît dans le conflit. Je me reconnais dans le regard de l'autre. L'autoconscience est médiatisée par autrui.",q:"'La conscience de soi n'existe que reconnue'"},
{n:"Bergson",w:"Matière et mémoire, 1896",i:"La conscience est durée vécue, flux continu. Elle n'est pas réductible au cerveau. La mémoire est la substance du moi.",q:"La conscience = durée intérieure, non espace mesurable"},
{n:"Locke",w:"Essai sur l'entendement humain, 1690",i:"L'identité personnelle repose sur la conscience mémorielle : je suis la même personne par continuité de mes souvenirs.",q:"La mémoire = fondement de l'identité personnelle"},
{n:"Hume",w:"Traité de la nature humaine, 1739",i:"Le moi n'est pas une substance immuable mais un 'faisceau de perceptions' qui se succèdent à toute vitesse. 'L'esprit est une sorte de théâtre où diverses perceptions font successivement leur apparition.' Il n'y a ni simplicité ni identité dans le moi : nous inventons la notion de 'substance' pour masquer ce flux.",q:"'Les hommes ne sont rien d'autre qu'un faisceau ou une collection de différentes perceptions'"},
{n:"Ricœur",w:"Écrits et conférences 1 — Autour de la psychanalyse, 2008",i:"L'identité narrative : nous apprenons à devenir le narrateur de notre propre histoire. La subjectivité n'est ni une suite incohérente d'événements ni une substantialité immuable : c'est une identité narrative qui se construit par le récit. Ce que nous appelons 'soi' est médiatisé par les récits culturels que nous appliquons à notre vie.",q:"'Nous apprenons à devenir le narrateur de notre propre histoire'"},
{n:"Alain",w:"Études",i:"L'idée du Moi se forme corrélativement à l'idée des autres. C'est par le langage, le nom propre, les jugements d'autrui que nous tenons la première connaissance de nous-mêmes. L'honneur = sentiment intérieur des sanctions extérieures. La conscience de soi est toujours socialement médiatisée.",q:"'C'est des autres que nous tenons la première connaissance de nous-mêmes'"},
{n:"Nietzsche",w:"Par-delà le Bien et le Mal, 1886",i:"Critique du cogito cartésien : 'je' est une simple hypothèse grammaticale. La routine du langage nous fait supposer un sujet là où il n'y a que processus. 'Quelque chose pense' ne suppose pas nécessairement un sujet substantiel. La conscience de soi est une construction fictive de la grammaire.",q:"'Ce que l'on appelle le je n'est rien d'autre qu'une hypothèse grammaticale'"},
{new:true,n:"Kant",w:"Anthropologie du point de vue pragmatique",i:"L'enfant qui commence à dire 'je' opère un retournement décisif : auparavant il se sentait simplement, maintenant il se pense. Ce passage s'effectue à travers le langage et l'intersubjectivité : c'est parce qu'autrui m'adresse un 'tu' que je peux me saisir comme 'je'. La conscience réflexive émerge dans et par le rapport à l'autre.",q:"Le langage et l'intersubjectivité sont la condition de la conscience réflexive"},
{new:true,n:"Pascal",w:"Pensées",i:"L'homme est 'un roseau pensant', le plus faible de la nature, mais sa grandeur est dans sa pensée. La conscience de la mort distingue l'homme de la nature aveugle : quand l'univers l'écraserait, l'homme serait encore plus noble que ce qui le tue, parce qu'il sait qu'il meurt. La conscience humaine n'est pas une faiblesse mais une dignité.",q:"'L'homme n'est qu'un roseau, le plus faible de la nature, mais c'est un roseau pensant'"},
],
textes:[
{n:"Descartes — le cogito",t:"Même si je me trompe, c'est moi qui me trompe : la pensée ne peut être mise en doute. Certitude irréductible du sujet pensant."},
{n:"Freud — inconscient et rêve",t:"Le rêve est la 'voie royale' vers l'inconscient. Les actes manqués, lapsus révèlent les désirs refoulés qui agissent à notre insu."},
{n:"Cours p.24 — corps et conscience",t:"Concept religieux du corps : âme/corps séparés (Platon, Descartes). Concept biologique : corps objet d'études (dissections, greffes). Le corps est constitutif de l'identité du sujet."},
{n:"Agence Biomédecine (doc cours)",t:"'Être un corps' vs 'avoir un corps' : ambivalence culturelle. Le don d'organes pose la question de l'identité corporelle et de la conscience de soi en tant que personne."},
{n:"Hume, Traité de la nature humaine (cours p.143)",t:"Quand je pénètre au plus intime de ce que j'appelle 'moi', je tombe toujours sur telle ou telle perception particulière. Je ne peux jamais me saisir 'moi' sans saisir une perception. L'identité du moi est une fiction : nous inventons un principe unificateur pour relier des perceptions discontinues."},
{n:"Locke, Essai sur l'entendement humain — identité personnelle (cours p.142)",t:"La conscience accompagne toujours la pensée. C'est elle qui fait que chacun est ce qu'il appelle 'soi'. L'identité personnelle = identité de conscience. Problème : la conscience est interrompue par l'oubli — sommes-nous 'la même chose pensante' à travers le temps ?"},
{n:"Sartre, L'existentialisme est un humanisme — extrait 4 (cours p.138)",t:"L'intersubjectivité : pour obtenir une vérité quelconque sur moi, il faut que je passe par l'autre. L'autre est indispensable à mon existence, aussi bien qu'à la connaissance que j'ai de moi. C'est dans le monde de l'intersubjectivité que l'homme décide ce qu'il est."},
{n:"Descartes, Discours de la méthode (cours p.138)",t:"Même en supposant que tout soit faux, il faut nécessairement que 'moi qui pense, je sois quelque chose'. 'Je pense, donc je suis' : certitude première et indubitable. L'âme (res cogitans) est distincte du corps (res extensa) : elle n'a besoin d'aucun lieu ni d'aucune chose matérielle."},
{n:"Ricœur, 'La vie : un récit en quête de narrateur' (cours p.138-139)",t:"La vie n'est pas vécue comme un roman mais nous lui appliquons une intelligence narrative. L'identité narrative est la seule qui échappe à l'alternative entre changement pur et identité absolue. C'est en nous racontant que nous nous constituons comme sujets."},
{n:"Alain, Études (cours p.139)",t:"La chronologie de mes souvenirs est élaborée, discutée, contrôlée en commun. 'J'apprends ma propre histoire.' L'existence sociale tient par l'intérieur : l'honneur = sentiment intérieur des sanctions extérieures. Le moi individu est distinct des autres mais connu par eux."},
{n:"Nietzsche, Par-delà le Bien et le Mal — texte complémentaire (cours p.140)",t:"La superstition des logiciens : croire que 'je pense' implique un 'je' comme sujet. Quelque chose pense — mais ce 'quelque chose' est déjà une interprétation du processus, non le processus lui-même. Le sujet 'je' est une hypothèse grammaticale, non une certitude."},
{n:"Hegel, Esthétique (cours p.141)",t:"L'homme se constitue pour soi par son activité pratique. Il est poussé à se trouver lui-même dans ce qui lui est donné extérieurement. Il parvient en changeant les choses extérieures qu'il marque du sceau de son intériorité. Exemple : le petit garçon qui jette des pierres dans l'eau et admire les ronds — il bénéficie du spectacle de sa propre activité."},
{new:true,n:"Kant, Anthropologie du point de vue pragmatique — l'enfant dit 'je'",t:"Avant de dire 'je', l'enfant parle de lui à la troisième personne ('Pierre veut'). Le jour où il dit 'je' pour la première fois, c'est un retournement décisif : il se pense lui-même. Ce passage est lié au langage — à la fois signe et condition de la conscience réflexive. L'intersubjectivité (le 'tu' d'autrui) précède l'individuation du 'je'."},
{new:true,n:"Pascal, Pensées — le roseau pensant",t:"L'homme est un roseau, le plus faible de la nature. Un souffle de vent peut le tuer. Mais quand l'univers l'écraserait, l'homme serait encore plus noble que ce qui le tue, parce qu'il sait qu'il meurt et que l'avantage que l'univers a sur lui, l'univers n'en sait rien. La conscience de la mort est la marque de la dignité humaine, non de sa faiblesse."},
{new:true,n:"Sartre, L'Être et le Néant — la honte et le regard d'autrui",t:"La honte révèle à autrui un être que je suis mais qui m'échappe. Je découvre que je suis quelque chose pour l'autre avant d'être quelque chose pour moi. Le regard d'autrui est un intermédiaire qui renvoie de moi à moi-même. La conscience de soi n'est donc pas auto-suffisante : elle passe nécessairement par l'autre. Critique du cogito cartésien : autrui possède une part de moi-même."},
],
axes:[
{n:"Axe 1",t:"La conscience comme certitude et fondement du sujet",pb:"La conscience peut-elle être notre seul point d'appui pour connaître ?",
sps:[
{l:"A",c:"Oui : le cogito cartésien fonde la certitude absolue. Le doute hyperbolique aboutit à la seule vérité indubitable : 'Je pense, donc je suis'.",r:"Descartes, Méditations I"},
{l:"B",c:"Mais la conscience immédiate peut être trompeuse : illusions, hallucinations. La certitude du cogito ne garantit pas la vérité du monde extérieur.",r:"Descartes lui-même le reconnaît (malin génie)"},
{l:"C",c:"La conscience réflexive enrichit le cogito : connaissance de soi, non simple sentiment d'exister. Elle implique un effort de retour sur ses actes et jugements.",r:"Alain : 'La conscience n'est pas un miroir'"},
]},
{n:"Axe 2",t:"Les limites de la conscience : l'inconscient",pb:"Sommes-nous vraiment transparents à nous-mêmes ?",
sps:[
{l:"A",c:"Non : Freud montre que la conscience est la partie émergée de l'iceberg. Ça, Moi, Surmoi. Les pulsions refoulées orientent nos comportements à notre insu.",r:"Freud, Introduction à la psychanalyse"},
{l:"B",c:"La mauvaise foi (Sartre) n'est pas l'inconscient : c'est une fuite consciente-mais-niée de notre liberté. L'homme se ment à lui-même volontairement.",r:"Sartre, L'Être et le Néant"},
{l:"C",c:"Nuance : même si l'inconscient existe, la psychanalyse vise à ramener les conflits à la conscience. La cure = élargissement de la conscience sur l'inconscient.",r:"Freud : 'Là où était le ça, le moi doit advenir'"},
]},
{n:"Axe 3",t:"Conscience de soi et reconnaissance par autrui",pb:"La conscience de soi naît-elle du rapport à l'autre ?",
sps:[
{l:"A",c:"Oui : pour Hegel, la conscience ne peut se reconnaître qu'en rencontrant une autre conscience. Le conflit maître/esclave révèle que l'autoconscience a besoin d'être reconnue.",r:"Hegel, Phénoménologie de l'Esprit"},
{l:"B",c:"Sartre : le regard d'autrui peut aussi être aliénant ('l'enfer c'est les autres'). Le regard objectivant me transforme en chose.",r:"Sartre, Huis clos"},
{l:"C",c:"Synthèse : la conscience de soi se construit dans et par le rapport à autrui, mais cette construction peut être aliénante ou libératrice selon la qualité de la reconnaissance.",r:"Honneth : la lutte pour la reconnaissance"},
]},
{n:"Axe 4",t:"Prendre conscience de soi, est-ce devenir insaisissable ?",pb:"La conscience de soi est-elle le fondement de l'identité personnelle ou la révélation de son insaisissabilité ?",
sps:[
{l:"A",c:"Prendre conscience de soi, c'est justement parvenir à se saisir : Descartes (cogito = certitude première), Hegel (conscience de soi via l'activité pratique et la reconnaissance). La conscience réflexive enrichit le sujet.",r:"Descartes, Discours de la méthode ; Hegel, Esthétique"},
{l:"B",c:"La conscience de soi révèle l'insaisissabilité du sujet : une part de moi m'est étrangère (Freud — rêves, lapsus, actes manqués). L'inconscient donne sens à ce qui ne semblait pas en avoir, mais la conscience n'en a plus le monopole. 'L'inconscient est structuré comme un langage' (Lacan).",r:"Freud, Introduction à la psychanalyse ; Sartre, L'Être et le Néant"},
{l:"C",c:"C'est pourquoi le moi est insaisissable : aporie de l'identité (Hume — le moi = flux de perceptions ; Nietzsche — le 'je' est une hypothèse grammaticale) et aporie de la mortalité (Heidegger — la seule certitude de la conscience est sa finitude). L'identité narrative (Ricœur) est la seule voie : nous nous constituons par le récit.",r:"Hume, Traité de la nature humaine ; Heidegger, Être et Temps ; Ricœur, Autour de la psychanalyse"},
]},
],
exemples:[
{tag:"Littérature",tit:"Proust — À la recherche du temps perdu",body:"La mémoire involontaire (madeleine de Proust) révèle que la conscience n'est pas maîtresse de ses propres contenus. Un goût ressuscite toute une époque : le passé 'habite' en nous à notre insu.",lien:"→ Bergson (durée), inconscient (Freud)"},
{tag:"Cas clinique",tit:"Cas de dédoublement de personnalité",body:"Certains patients présentent plusieurs états de conscience distincts et amnésiques l'un pour l'autre. Cela interroge l'unité du sujet et l'identité personnelle fondée sur la mémoire.",lien:"→ Locke (identité = mémoire), Freud (ça/moi/surmoi)"},
{tag:"Science",tit:"Neurosciences — expérience de Libet (1983)",body:"Le cerveau prépare le mouvement 300ms avant que le sujet ait conscience de sa décision. Cela suggère que la conscience serait 'en retard' sur le cerveau : notre sentiment de décision consciente serait une illusion rétrospective.",lien:"→ Remet en cause le libre arbitre, le cogito"},
{tag:"Société",tit:"Don d'organes (cours — Agence Biomédecine)",body:"La question 'ai-je un corps ou suis-je un corps ?' divise les Français. 32% des 16-25 ans pensent que s'il y a un au-delà, il faut 'entrer en entier'. Le corps est constitutif de l'identité consciente du sujet.",lien:"→ Corps, technique, identité"},
{tag:"Science — Cours",tit:"Victor, l'enfant sauvage de l'Aveyron",body:"Victor, retrouvé dans les bois vers 1800, ne sursautait pas au coup de fusil tiré derrière lui (signifiant pourtant un danger), mais réagissait au son d'une noix qu'on décortiquait. La conscience est toujours prise dans un réseau de significations : on ne perçoit que ce qui a un sens pour soi. La conscience est intentionnelle et culturellement médiatisée.",lien:"→ Conscience intentionnelle, Husserl, culture vs nature"},
{tag:"Philosophie — Cours",tit:"Hume et le moi comme 'théâtre'",body:"Hume compare l'esprit à un théâtre où des perceptions défilent sans qu'on sache où sont représentées les scènes ni de quels matériaux il est fait. Quand je cherche mon 'moi', je ne trouve que des perceptions. Cette thèse remet en cause toute identité substantielle du sujet et ouvre la question de l'identité narrative (Ricœur).",lien:"→ Hume (flux de perceptions), Ricœur (identité narrative), Nietzsche (critique du cogito)"},
{tag:"Philosophie — Cours",tit:"Hegel : l'enfant qui jette des pierres dans l'eau",body:"Hegel dans l'Esthétique : le petit garçon qui jette des pierres dans l'eau et admire les ronds qui se forment bénéficie du spectacle de sa propre activité. C'est la forme la plus primitive de conscience de soi par l'œuvre : je me retrouve dans ce que je produis. La conscience de soi naît dans et par l'activité pratique.",lien:"→ Hegel (travail, conscience), Travail (notion liée)"},
],

diss:["La conscience de soi est-elle une connaissance de soi ?","Peut-on agir de façon inconsciente ?","L'inconscient remet-il en cause la liberté ?","Suis-je ce que j'ai conscience d'être ?","Le corps est-il constitutif de l'identité ?",{q:"Prendre conscience de soi, est-ce devenir insaisissable ?"},{q:"La conscience de soi est-elle le fondement de l'identité personnelle ?"},{q:"Avoir conscience de soi, est-ce se connaître ?"},{new:true,q:"La conscience de soi naît-elle dans le rapport à autrui ?"},{new:true,q:"Le langage est-il la condition de la conscience réflexive ?"}]
},
nature:{c:"#1D9E75",l:"Nature",s:"Qu'est-ce qui est naturel ?",
def:"La <span class='kw'>nature</span> désigne le monde physique (<em>phusis</em>), l'essence propre d'un être, ou ce qui s'oppose à la culture et à la technique. Enjeu : y a-t-il une 'bonne nature' à respecter ou à dépasser ? La frontière nature/culture est-elle nette ?<details><summary>Approfondir la notion</summary><div class='def-sec'><div class='def-sec-title'>Étymologie &amp; trois sens</div><div class='def-sec-body'>Du latin <em>natura</em> (naissance, essence), traduit le grec <em>physis</em> (ce qui croît spontanément). Trois sens : (1) <strong>nature vs culture</strong> — ce qui est inné vs acquis ; (2) <strong>nature d'une chose</strong> — son essence, ce qu'elle est par définition ; (3) <strong>la Nature</strong> — l'ensemble du monde physique, le cosmos. La culture <em>(latin colere)</em> désigne l'ensemble des acquis transmis en société — et non hérités biologiquement.</div></div><div class='def-sec'><div class='def-sec-title'>Nature vs Culture</div><div class='def-sec-body'>Rousseau : « l'homme est né libre » mais la société le corrompt (état de nature pacifique idéalisé). Lévi-Strauss : la prohibition de l'inceste est universelle (nature) mais son contenu varie (culture) — la frontière nature/culture est elle-même culturelle. Frans de Waal : les comportements altruistes et empathiques existent chez les chimpanzés — la morale a des racines naturelles.</div></div><div class='def-sec'><div class='def-sec-title'>La nature a-t-elle des droits ?</div><div class='def-sec-body'>Christopher Stone (<em>Should Trees Have Standing?</em>) : les arbres devraient avoir une personnalité juridique. Michel Serres (<em>Le Contrat naturel</em>) : étendre le contrat social à la nature. Constitution équatorienne (2008) : la <em>Pacha Mama</em> a des droits constitutionnels. Gange et Yamuna reconnus « personnes morales » en Inde (2017). Code civil français (2015) : l'animal est reconnu comme « être doué de sensibilité ».</div></div><div class='def-sec'><div class='def-sec-title'>Technique, nature et responsabilité</div><div class='def-sec-body'>Descartes : nous rendre « maîtres et possesseurs de la nature ». Jonas (<em>Le Principe responsabilité</em>) : notre puissance technique crée des obligations envers les générations futures. L'CRISPR (Emmanuelle Charpentier, Nobel 2020) pose la question de la modification du génome humain — jusqu'où peut-on « corriger » la nature ?</div></div></details>",
auteurs:[
{n:"Aristote",w:"Physique / Parties des animaux",i:"La nature est un principe interne de mouvement. La main : 'outil à faire des outils'. L'homme est un animal politique par nature. La nature ne fait rien en vain.",q:"'La main semble être non pas un outil, mais plusieurs'"},
{n:"Descartes",w:"Discours de la méthode, 1637 (TEXTE 9)",i:"Nous rendre 'maîtres et possesseurs de la nature' grâce à la physique pratique. La nature est une machine que la science peut dominer pour améliorer nos conditions de vie.",q:"'Nous rendre comme maîtres et possesseurs de la nature'"},
{n:"Rousseau",w:"Discours sur l'inégalité, 1755",i:"Homme naturellement bon, libre et solitaire. La société et la propriété le corrompent. L'état de nature est un mythe régulateur qui sert à critiquer la société présente.",q:"'L'homme est né libre et partout il est dans les fers'"},
{n:"Hans Jonas",w:"Le Principe responsabilité, 1990 (TEXTE 5)",i:"La technique moderne menace la nature et les générations futures. 'Heuristique de la peur' : anticiper le pire pour agir responsablement. Nouveau devoir envers la nature.",q:"'Agis de façon que les effets de ton action soient compatibles avec la permanence d'une vie humaine authentique'"},
{n:"Darwin",w:"L'Origine des espèces, 1859",i:"Sélection naturelle : la nature ne poursuit aucune finalité. L'homme est issu de la nature animale sans rupture absolue. La 'nature humaine' est une construction évolutive.",q:"L'homme : un primate évolué, sans rupture fondamentale avec l'animal"},
{n:"Platon",w:"Protagoras (TEXTE 6 du cours)",i:"Mythe de Prométhée : l'homme est 'nu, sans chaussures, sans armes'. Épiméthée a tout distribué aux animaux. Prométhée vole le feu technique pour compenser la nudité naturelle de l'homme.",q:"L'homme : être déficient naturel, compensé par la technique"},
{n:"Frans de Waal",w:"L'Âge de l'empathie / Le Bonobo et l'athée",i:"Les primates (bonobos, chimpanzés) manifestent des comportements d'empathie, de partage, de réconciliation. La morale a des racines naturelles : la pitié naturelle ne serait pas un monopole humain. Contre Hobbes : la nature n'est pas seulement guerre, elle inclut aussi la coopération et la solidarité.",q:"'La morale précède la religion et n'a pas besoin d'elle'"},
{n:"Épicure",w:"Lettre à Ménécée / Maximes Capitales",i:"Distinction désirs naturels et nécessaires / naturels et non nécessaires / ni naturels ni nécessaires. Seuls les premiers méritent d'être satisfaits. La nature définit les limites du bonheur réel. Contre la démesure des désirs artificiels.",q:"'La nature nous a fait peu riches de besoins'"},
{n:"Christopher Stone",w:"'Les arbres doivent-ils pouvoir plaider ?' (1972)",i:"Argument pragmatique pour les droits de la nature : forêts, rivières et éléments naturels devraient avoir des droits positifs. Les entités naturelles ne peuvent pas parler — mais les entreprises, États, propriétés et nourrissons non plus, et les juristes parlent pour eux. Stone propose qu'une personne soucieuse d'un objet naturel puisse saisir un tribunal pour mettre en place une tutelle (guardianship).",q:"Les entités naturelles méritent le même statut juridique que les personnes morales"},
{new:true,n:"Baptiste Morizot",w:"Manières d'être vivant, 2020",i:"Diplomatie inter-espèces : face aux conflits entre espèces (loup/brebis/berger), il faut une approche diplomatique visant l'intérêt commun de toutes les formes de vie. Être diplomate = se sentir légèrement traître envers tout le monde, maintenir l'ambivalence entre tous les points de vue contradictoires. Concept d'égards ajustés à toutes les formes de vie.",q:"'Être diplomate, c'est se sentir légèrement traître envers tout le monde'"},
{new:true,n:"Michel Serres",w:"Le Contrat naturel, 1990",i:"Notre rapport actuel à la nature = parasitisme (on prend tout, on ne donne rien). Il faut passer du contrat exclusivement social à un contrat naturel de symbiose et de réciprocité. Le droit de symbiose définit la responsabilité réciproque : autant la nature donne à l'homme, autant celui-ci doit rendre à celle-là, devenue sujet de droit.",q:"Passer du parasitisme à la symbiose : un nouveau contrat naturel"},
{new:true,n:"François Ost",w:"La Nature hors la loi. L'écologie à l'épreuve du droit, 1995",i:"Contre la thèse des droits de la nature : le langage des droits présuppose la conscience de l'égale dignité et l'aptitude à la faire valoir par la parole et l'action. L'asymétrie vivant/humain (seul l'humain a accédé au sens) justifie non des droits de la nature mais des devoirs asymétriques de responsabilité des humains envers elle.",q:"L'asymétrie humain/vivant fonde des devoirs (pas des droits) : nous devons protéger la nature, elle ne peut pas revendiquer"},
{new:true,n:"Val Plumwood",w:"Dans l'œil du crocodile. L'humanité comme proie, 2021",i:"Récit d'une attaque de crocodile en 1985 : l'humain se découvre proie, membre d'une communauté biotique. Le dualisme homme/nature (l'humain comme esprit pur séparé du corps et des animaux) est une construction culturelle millénaire — une erreur profonde. Appel à se réidentifier en termes écologiques : solidarité avec les autres vivants, réformer notre conception de la mort comme nourriture partagée.",q:"Le dualisme homme/nature est une erreur culturelle : nous sommes des animaux parmi les animaux"},
],
textes:[
{n:"TEXTE 9 — Descartes, Discours de la méthode",t:"La physique pratique permet de connaître force du feu, eau, air. Maîtres et possesseurs de la nature : le premier bien est la santé."},
{n:"TEXTE 5 — Jonas, Le Principe responsabilité",t:"Prométhée déchaîné par la science. La promesse de la technique s'est inversée en menace. Heuristique de la peur comme boussole."},
{n:"TEXTE 6 — Platon, Protagoras",t:"Mythe de Prométhée : Épiméthée distribue les qualités aux animaux, oublie l'homme. Prométhée vole le feu à Héphaïstos. Zeus envoie justice et pudeur à tous les hommes."},
{n:"TEXTE 7 — Aristote, Parties des animaux",t:"La main comme outil polymorphe : griffe, serre, corne, lance. L'homme peut acquérir le plus grand nombre de techniques grâce à la main."},
{n:"Stone, 'Les arbres doivent-ils pouvoir plaider ?' (1972) — argument pragmatique",t:"Les entités naturelles (forêts, rivières) ne peuvent pas parler mais les entreprises, États, nourrissons non plus — et les juristes parlent pour eux. Accorder des droits à la nature est juridiquement possible et moralement cohérent. La tutelle (guardianship) permettrait de représenter les intérêts des objets naturels devant les tribunaux."},
{new:true,n:"Morizot, Manières d'être vivant — le Chantier Castor",t:"Projet de guérison d'une rivière en alliance avec les castors (entité naturelle hybride). Méthode : incision (élargir les rivières), guérison des maladies (contrer l'érosion), alliance et réciprocité avec le castor et la rivière, utilisation de moyens naturels (biomimétisme, lowtech). Le lowtech = catégorie de techniques simples, appropriables, durables, résilientes."},
{new:true,n:"Serres, Le Contrat naturel — parasitisme vs symbiose",t:"Notre rapport actuel à la nature est parasitaire : nous prenons tout sans rendre. Le droit de maîtrise se réduit au parasitisme. Le droit de symbiose définit la responsabilité réciproque — comme un contrat entre partenaires, où chacun doit à l'autre. La nature devient sujet de droit."},
{new:true,n:"Jonas, Le Principe responsabilité — impératif écologique",t:"'Agis de façon que les effets de ton action soient compatibles avec la permanence d'une vie authentiquement humaine sur terre.' L'âge de la civilisation technique rend l'avenir de l'humanité et de la biosphère la première obligation collective. La responsabilité s'étend au-delà de l'intersubjectif jusqu'à la survie future de l'espèce et de la biosphère entière."},
{new:true,n:"Ost, La Nature hors la loi — devoirs asymétriques",t:"Le langage des droits suppose la conscience de l'égale dignité et l'aptitude à la faire valoir. Entre le vivant et l'humain s'établit une asymétrie : seul l'humain a accédé au niveau du sens. Non pas que les animaux aient des droits à faire valoir, mais bien que les hommes ont des devoirs asymétriques de responsabilité — justifiés par la vulnérabilité des bénéficiaires et la nécessité de respecter les symbioses biologiques."},
],
axes:[
{n:"Axe 1",t:"La nature comme norme et modèle",pb:"Ce qui est naturel est-il nécessairement bon ?",
sps:[
{l:"A",c:"Rousseau : la nature est bonne, la société corrompt. L'homme naturel est libre, égal, bon. Le 'retour à la nature' comme critique de la civilisation.",r:"Rousseau, Discours sur l'inégalité"},
{l:"B",c:"Mais l'appel à la nature peut être un argument fallacieux (sophisme naturaliste) : ce qui est naturel n'est pas automatiquement bon (maladies, prédation, mort sont naturelles).",r:"Hume : 'Le fait n'implique pas le droit'"},
{l:"C",c:"Aristote propose un juste milieu : la nature fixe des limites et des fins. La technique doit s'y conformer (médecine curative) sans les transgresser (médecine transhumaniste).",r:"Aristote, Physique II"},
]},
{n:"Axe 2",t:"La domination de la nature par la technique",pb:"Devons-nous maîtriser la nature ou la respecter ?",
sps:[
{l:"A",c:"Descartes : la physique pratique nous permet de dominer la nature pour notre bien-être (santé, confort). La technique est la réalisation du projet cartésien de domination.",r:"TEXTE 9 — Discours de la méthode"},
{l:"B",c:"Mais la domination a des limites : destructions écologiques, dérèglement climatique. La technique peut détruire les conditions de vie sur Terre.",r:"GIEC, données climatiques actuelles"},
{l:"C",c:"Jonas : face à la puissance technique, nouveau devoir. La nature a une valeur intrinsèque. 'Heuristique de la peur' : agir selon le principe de précaution.",r:"TEXTE 5 — Jonas"},
]},
{n:"Axe 3",t:"Y a-t-il une 'nature humaine' ?",pb:"L'homme a-t-il une essence naturelle fixe ?",
sps:[
{l:"A",c:"Oui : Aristote (animal politique), les religions (créé à l'image de Dieu), la sociobiologie. L'homme a une nature qui le prédispose à certains comportements.",r:"Aristote, Politique I"},
{l:"B",c:"Non : Sartre ('l'existence précède l'essence'). L'homme n'a pas de nature préalable, il se définit par ses choix. Beauvoir : même chose pour les femmes ('on ne naît pas femme').",r:"Sartre, L'existentialisme est un humanisme"},
{l:"C",c:"Nuance évolutive : il y a des tendances naturelles (sociabilité, langage, outil) mais elles sont plastiques. La culture transforme et dépasse la nature sans la supprimer totalement.",r:"Darwin, Lévi-Strauss"},
]},
{new:true,n:"Axe 4",t:"La nature a-t-elle des droits ?",pb:"Peut-on reconnaître un statut juridique à la nature ?",
sps:[
{l:"A",c:"Par définition, la nature n'a pas de droits (Hobbes, Léviathan 1651) : l'état de nature est antérieur à tout droit — 'là où il n'y a pas de loi, rien n'est injuste'. Le droit suppose la parole, la conscience et l'action — ce dont animaux et plantes sont dépourvus (Ost). Nous avons des droits sur la nature, pas elle sur nous.",r:"Hobbes, Léviathan ; Ost, La Nature hors la loi"},
{l:"B",c:"Argument pragmatique : accorder des droits aux entités naturelles est juridiquement possible et moralement cohérent (Stone). Les forêts et rivières devraient avoir des droits positifs — comme les entreprises ou les nourrissons, les juristes pourraient parler pour elles. Exemples : Constitution équatorienne (2007, Pacha Mama), fleuve Gange reconnu personne morale (Inde, 2017).",r:"Stone, 'Les arbres doivent-ils pouvoir plaider ?' 1972"},
{l:"C",c:"La responsabilité morale des humains envers toutes les entités naturelles impose de mettre en place des relations justes, de symbiose et de réciprocité (Jonas, Serres, Morizot). Le principe responsabilité s'étend au-delà de l'intersubjectif jusqu'à la biosphère entière. Même sans droits formels, nous avons des devoirs envers la nature.",r:"Jonas, Le Principe responsabilité ; Serres, Le Contrat naturel ; Morizot, Manières d'être vivant"},
]},
],
exemples:[
{tag:"Écologie",tit:"Le dérèglement climatique",body:"La hausse des températures mondiales (+1,5°C depuis l'ère pré-industrielle) est la conséquence directe de la domination technico-industrielle de la nature. C'est l'illustration concrète de l'avertissement de Jonas sur les effets irréversibles de la technique.",lien:"→ Jonas (principe responsabilité), Descartes (domination nature)"},
{tag:"Anthropologie",tit:"Claude Lévi-Strauss — l'universalité de la culture",body:"L'opposition nature/culture se retrouve dans toutes les sociétés : la prohibition de l'inceste est universelle mais son contenu varie. Il n'y a pas de société 'purement naturelle' : l'homme est toujours déjà culturel.",lien:"→ Rousseau, question de la nature humaine"},
{tag:"Mythe — Cours",tit:"Mythe de Prométhée (Platon, Protagoras — TEXTE 6)",body:"L'homme est l'animal déficient par excellence : nu, sans griffes, sans fourrure, sans vitesse. Il compense par la technique (feu volé à Héphaïstos) et par la vie politique (justice et pudeur données par Zeus à tous les hommes).",lien:"→ Technique, Justice, État"},
{tag:"Science",tit:"OGM et transgénèse",body:"Les OGM illustrent le projet cartésien poussé à l'extrême : modifier le génome des plantes pour les adapter à nos besoins. Mais ils posent la question des limites éthiques : jusqu'où peut-on 'corriger' la nature ?",lien:"→ Devoir, technique, Jonas"},
{new:true,tag:"Droit — Cours",tit:"Constitution équatorienne (2008) — Pacha Mama",body:"Première constitution nationale à reconnaître des droits à la nature (Pacha Mama, 'là où la vie est reproduite et se produit'). La nature a le droit à son existence, à son maintien et à la régénération de ses cycles vitaux. Exemple concret de la thèse de Stone mis en pratique au niveau constitutionnel.",lien:"→ Stone, Serres, Jonas, droits de la nature"},
{new:true,tag:"Droit — Cours",tit:"Gange et Yamuna reconnus personnes morales (Inde, 2017)",body:"La haute cour de l'Uttarakhand a qualifié les fleuves Gange et Yamuna d'entités vivantes ayant le statut de personne morale. Illustration directe de l'argument de Stone : les juristes parlent pour des entités qui ne peuvent pas parler. La décision a été suspendue mais ouvre un débat mondial.",lien:"→ Stone (tutelle), droits de la nature"},
{new:true,tag:"Droit",tit:"Code civil français (2015) — l'animal sensible",body:"La réforme du Code civil en 2015 reconnaît que l'animal est 'un être doué de sensibilité'. Étape intermédiaire entre le statut de chose et celui de sujet de droit. Illustre les avancées et les limites du droit actuel : l'animal n'est plus une chose, mais n'a pas encore de droits positifs.",lien:"→ Frans de Waal, droits de la nature, Stone"},
{new:true,tag:"Philosophie — Cours",tit:"Chantier Castor — Morizot (diplomatie inter-espèces)",body:"Alliance avec les castors pour régénérer une rivière : incision, guérison des 'maladies' de la rivière (érosion), réciprocité avec le castor. Le lowtech (biomimétisme, techniques simples et appropriables) comme modèle. La technique au service de la diplomatie inter-espèces plutôt que de la domination de la nature.",lien:"→ Morizot (diplomatie), Serres (symbiose), technique"},
{new:true,tag:"Philosophie — Cours",tit:"Val Plumwood — l'humanité comme proie",body:"Attaquée par un crocodile en 1985, Plumwood découvre que l'humain est aussi une proie — membre d'une communauté biotique, pas maître d'une nature extérieure. Cette expérience remet en cause le dualisme homme/nature occidental : nous sommes des animaux parmi les animaux, pris dans des réseaux écologiques de prédation réciproque.",lien:"→ Plumwood (dualisme homme/nature), Morizot, droits de la nature"},
],

bonheur:{c:"#EF9F27",l:"Bonheur",s:"En quoi consiste le bonheur ?",
def:"Le <span class='kw'>bonheur</span> est un état durable de satisfaction complète, distinct du plaisir (fugace) et du contentement passager. Question centrale : le bonheur est-il accessible ? Doit-il guider la morale ? Le désir est-il obstacle ou chemin vers lui ?<details><summary>Approfondir la notion</summary><div class='def-sec'><div class='def-sec-title'>Distinctions conceptuelles clés</div><div class='def-sec-body'><strong>Bonheur</strong> (état durable, complet) ≠ <strong>plaisir</strong> (fugace, sensoriel) ≠ <strong>contentement</strong> (satisfaction passagère) ≠ <strong>joie</strong> (élan vers quelque chose). En grec : <em>eudaimonia</em> (Aristote — activité de l'âme conforme à la vertu) vs <em>hedone</em> (plaisir sensoriel, hédonisme). Épicure distingue : ataraxie (paix de l'âme) + aponie (absence de douleur corporelle).</div></div><div class='def-sec'><div class='def-sec-title'>Bonheur et désir</div><div class='def-sec-body'>Schopenhauer : le désir est infini, la satisfaction provisoire — oscillation entre douleur (manque) et ennui (satisfaction vide). Platon (<em>Gorgias</em>, tonneau des Danaïdes) : combler un désir en crée un autre. Spinoza : le bonheur est la puissance d'exister — la joie augmente notre puissance d'agir. Le désir n'est pas forcément obstacle : il peut être moteur (Aristote).</div></div><div class='def-sec'><div class='def-sec-title'>Bonheur et morale</div><div class='def-sec-body'>Kant : le bonheur ne peut fonder la morale (il est empirique et variable). Le devoir est inconditionné. Mill (utilitarisme) : le bonheur du plus grand nombre <em>est</em> le fondement de la morale. Nietzsche (<em>Aurore</em>) : la glorification du travail empêche le bonheur authentique qui nécessite l'oisiveté. Bourdieu (<em>La Distinction</em>) : les préférences esthétiques (goûts) sont socialement déterminées — le bonheur lui-même est un habitus de classe.</div></div><div class='def-sec'><div class='def-sec-title'>Peut-on apprendre à être heureux ?</div><div class='def-sec-body'>Épicure : oui, par l'exercice de la sagesse (calcul des désirs). Aristote : oui, par la pratique des vertus morales et intellectuelles. Les stoïciens : le bonheur ne dépend que de ce qui dépend de nous (nos représentations, nos jugements). Kant : on peut mériter le bonheur (vertu) mais il ne se commande pas — il arrive ou n'arrive pas.</div></div></details>",
auteurs:[
{n:"Épicure",w:"Lettre à Ménécée, ~300 av. J.-C.",i:"Ataraxie (absence de trouble de l'âme) + aponie (absence de douleur). 3 types de désirs : naturels et nécessaires / naturels non nécessaires / vains et vides. La sagesse = bien choisir ses désirs.",q:"'Il n'y a pas de vie heureuse sans prudence, beauté morale et justice'"},
{n:"Aristote",w:"Éthique à Nicomaque, ~335 av. J.-C.",i:"Eudaimonia = activité de l'âme conforme à la vertu. Le bonheur est la fin ultime (souverain bien). Il exige vertu ET biens extérieurs (santé, amis, fortune). Ce n'est pas un état mais une activité.",q:"'Le bonheur est une activité de l'âme conforme à la vertu'"},
{n:"Kant",w:"Fondements de la métaphysique des mœurs, 1785",i:"Le bonheur ne peut fonder la morale : il est empirique et variable. Le devoir est inconditionné. Un homme vertueux mérite d'être heureux mais le bonheur n'est pas le critère de l'action morale.",q:"'Sois digne d'être heureux' — mais le bonheur n'est pas le but de la morale"},
{n:"J.-S. Mill",w:"L'Utilitarisme, 1863",i:"Le bonheur (plaisir, absence de douleur) est le fondement de la morale. 'Le plus grand bonheur du plus grand nombre.' Distinction plaisirs inférieurs/supérieurs.",q:"'Il vaut mieux être Socrate insatisfait qu'un idiot satisfait'"},
{n:"Schopenhauer",w:"Le Monde comme volonté, 1819",i:"Le bonheur est illusion : le désir est infini et la satisfaction toujours provisoire. Oscillation entre douleur (désir) et ennui (satisfaction). Voie du salut : ascèse, art, compassion.",q:"'La vie oscille comme un pendule entre la douleur et l'ennui'"},
{n:"Nietzsche",w:"Aurore, 1881 (texte cours)",i:"La glorification du travail cache la peur de la liberté (divertissement pascalien). Le travail constitue 'la meilleure des polices' car il occupe les individus et empêche la réflexion. Le bonheur authentique nécessite l'oisiveté.",q:"'Un tel travail constitue la meilleure des polices'"},
],
textes:[
{n:"Épicure — classification des désirs",t:"Naturels et nécessaires (manger) : à satisfaire. Naturels non nécessaires (luxe) : indifférents. Vains (gloire, richesse) : à rejeter. La sagesse réside dans ce discernement."},
{n:"Aristote — eudaimonia",t:"Le bonheur n'est pas une sensation mais une activité. Il exige les vertus morales (courage, justice) et intellectuelles (phronesis). Les biens extérieurs sont aussi nécessaires."},
{n:"Nietzsche, Aurore (cours p.25/18)",t:"Le travail comme 'meilleure des polices' : occupe les individus, les détourne de la réflexion, crée sécurité sociale. Le bonheur authentique nécessite l'oisiveté et la maîtrise de soi."},
{n:"Cours p.55 — le désir et le bonheur",t:"Le désir peut être obstacle (Schopenhauer : désir insatiable) ou condition (Aristote : désir de vivre conforme à la vertu). B1 (contrainte) → B2 (consommation) → B3 (plaisir) : le bonheur n'est pas au bout du désir immédiat."},
],
axes:[
{n:"Axe 1",t:"Le bonheur comme fin ultime de l'existence",pb:"Le bonheur est-il le souverain bien ?",
sps:[
{l:"A",c:"Oui, pour Aristote : toutes nos actions visent une fin, et cette fin ultime est le bonheur (eudaimonia). Il n'est pas moyen mais fin. C'est l'activité conforme à notre nature d'être rationnel.",r:"Aristote, Éthique à Nicomaque I"},
{l:"B",c:"Oui aussi pour l'utilitarisme : Mill fait du bonheur le fondement de toute la morale. L'action juste est celle qui maximise le bonheur global ('greatest happiness principle').",r:"Mill, L'Utilitarisme"},
{l:"C",c:"Mais Schopenhauer : la volonté de vivre est insatiable, le bonheur parfait est impossible. Toute satisfaction n'est que suppression provisoire d'une douleur. L'aspiration au bonheur est source de souffrance.",r:"Schopenhauer, Le Monde comme volonté"},
]},
{n:"Axe 2",t:"Bonheur et morale : conflit ou accord ?",pb:"Doit-on sacrifier le bonheur à la vertu, ou vice-versa ?",
sps:[
{l:"A",c:"Kant : opposition nette. Le bonheur est empirique, le devoir est rationnel. Agir par recherche du bonheur n'est pas moral. Seul compte le respect de la loi morale.",r:"Kant, Fondements de la métaphysique des mœurs"},
{l:"B",c:"Mill : pas d'opposition. L'utilitarisme fait coïncider bonheur et morale. Agir moralement, c'est contribuer au bonheur collectif. La vertu est instrumentale au bonheur.",r:"Mill, L'Utilitarisme"},
{l:"C",c:"Aristote : synthèse. Le bonheur exige la vertu (on ne peut être heureux sans être vertueux). Mais la vertu seule ne suffit pas : il faut aussi des biens extérieurs. Bonheur et vertu se conditionnent mutuellement.",r:"Aristote, Éthique à Nicomaque X"},
]},
{n:"Axe 3",t:"Le désir est-il obstacle ou chemin vers le bonheur ?",pb:"Faut-il satisfaire ses désirs ou apprendre à les maîtriser ?",
sps:[
{l:"A",c:"Le désir comme obstacle : Épicure (les désirs vains nous torturent), Schopenhauer (le désir est souffrance), Bouddhisme (l'attachement est source de douleur). Maîtriser ses désirs = voie vers l'ataraxie.",r:"Épicure, Lettre à Ménécée"},
{l:"B",c:"Le désir comme condition : sans désir, pas d'élan vital. Spinoza : 'Le désir est l'essence de l'homme.' Nietzsche : la volonté de puissance comme désir d'expansion.",r:"Spinoza, Éthique III ; Nietzsche"},
{l:"C",c:"Synthèse : tout dépend du type de désir (Épicure : naturels/nécessaires vs vains). La sagesse consiste à hiérarchiser ses désirs, non à les supprimer tous.",r:"Cours p.55 — schéma B1/B2/B3"},
]},
],
exemples:[
{tag:"Littérature",tit:"Camus — L'Étranger / Le Mythe de Sisyphe",body:"Meursault vit dans l'instant sans projet de bonheur. Sisyphe, condamné à recommencer éternellement, est déclaré 'heureux' par Camus : accepter l'absurde sans se mentir est la seule forme de bonheur authentique.",lien:"→ Schopenhauer (absurde), Sartre (existence)"},
{tag:"Psychologie",tit:"'Bullshit Jobs' — David Graeber (cours)",body:"Graeber distingue les jobs pénibles mais utiles des 'bullshit jobs' (bien payés mais inutiles). Ces derniers créent un malaise profond car ils privent le travailleur de sens. Le bonheur ne se réduit pas au confort matériel.",lien:"→ Travail, aliénation, sens"},
{tag:"Philosophie",tit:"Divertissement pascalien",body:"Pascal : l'homme fuit la conscience de sa misère dans le divertissement (chasse, jeu, fêtes). Il ne cherche pas tant le bonheur que l'oubli de son malheur. Nietzsche reprend cette idée pour le travail (cours p.19).",lien:"→ Cours p.19, Nietzsche Aurore"},
{tag:"Société",tit:"Le paradoxe d'Easterlin",body:"Dans les pays riches, au-delà d'un certain seuil de revenu, la richesse supplémentaire n'augmente plus le bonheur. Ce paradoxe empirique illustre la thèse épicurienne : les désirs vains (luxe, status) ne rendent pas heureux.",lien:"→ Épicure (désirs vains), Mill (qualité vs quantité)"},
],
