<style>
:root{
  --color-background-primary:#1e1e1e;
  --color-background-secondary:#2a2a2a;
  --color-text-primary:#f0f0f0;
  --color-text-secondary:#c8c8c8;
  --color-text-tertiary:#888888;
  --color-border-tertiary:#3a3a3a;
  --color-border-secondary:#555555;
  --color-background-info:#1e2d1e;
  --color-border-info:#2d5a2d;
  --color-text-info:#6abf6a;
  --border-radius-lg:12px;
  --border-radius-md:8px;
}
body{font-family:'Inter',system-ui,sans-serif;background:#121212;min-height:100vh;padding:16px;}
*{box-sizing:border-box;margin:0;padding:0}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
.wrap{display:flex;min-height:700px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden}
.sidebar{width:155px;flex-shrink:0;background:var(--color-background-secondary);border-right:0.5px solid var(--color-border-tertiary);padding:10px 7px;display:flex;flex-direction:column;gap:3px}
.stitle{font-size:10px;font-weight:500;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.06em;padding:0 6px 8px}
.nb{padding:7px 9px;border-radius:var(--border-radius-md);cursor:pointer;font-size:12px;color:var(--color-text-secondary);border:0.5px solid transparent;transition:all .15s;line-height:1.3;display:flex;align-items:center;gap:6px}
.nb:hover{background:var(--color-background-primary);color:var(--color-text-primary)}
.nb.active{background:var(--color-background-primary);color:var(--color-text-primary);border-color:var(--color-border-secondary);font-weight:500}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.main{flex:1;overflow:auto;padding:18px 22px 24px}
.tabs{display:flex;gap:2px;margin-bottom:18px;border-bottom:0.5px solid var(--color-border-tertiary);padding-bottom:0;flex-wrap:wrap}
.tab{padding:7px 12px;font-size:12px;cursor:pointer;color:var(--color-text-secondary);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.tab:hover{color:var(--color-text-primary)}
.tab.active{color:var(--color-text-primary);font-weight:500;border-bottom-color:currentColor}
.notion-head{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.nbadge{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.ntitle{font-size:17px;font-weight:500;color:var(--color-text-primary)}
.nsub{font-size:12px;color:var(--color-text-secondary);margin-top:2px}
.def-box{background:var(--color-background-secondary);border-left:2.5px solid var(--color-border-secondary);padding:11px 13px;border-radius:0 var(--border-radius-md) var(--border-radius-md) 0;margin-bottom:16px;font-size:13px;color:var(--color-text-secondary);line-height:1.65}
.kw{font-weight:500;color:var(--color-text-primary)}
.slabel{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--color-text-tertiary);margin-bottom:8px}
.ag{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:9px;margin-bottom:16px}
.ac{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:10px 12px}
.an{font-size:12px;font-weight:500;margin-bottom:2px}
.aw{font-size:11px;color:var(--color-text-tertiary);font-style:italic;margin-bottom:4px}
.ai{font-size:12px;color:var(--color-text-secondary);line-height:1.5}
.aq{font-size:11px;color:var(--color-text-tertiary);font-style:italic;margin-top:5px;border-left:2px solid var(--color-border-tertiary);padding-left:7px;line-height:1.4}
.anew{border-color:var(--color-border-info);background:var(--color-background-info)}
.new-badge{font-size:9px;font-weight:500;padding:1px 6px;border-radius:10px;background:var(--color-background-info);color:var(--color-text-info);margin-left:6px;vertical-align:middle}
.tbox{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:11px 13px;margin-bottom:16px}
.ti2{display:flex;gap:8px;padding:5px 0;border-bottom:0.5px solid var(--color-border-tertiary);font-size:12px;line-height:1.5}
.ti2:last-child{border-bottom:none;padding-bottom:0}
.tinum{font-weight:500;color:var(--color-text-primary);flex-shrink:0}
.titxt{color:var(--color-text-secondary)}
.axe-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:12px 14px;margin-bottom:10px}
.axe-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.axe-num{font-size:10px;font-weight:500;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.05em}
.axe-title{font-size:13px;font-weight:500;color:var(--color-text-primary)}
.axe-pb{font-size:11px;color:var(--color-text-secondary);margin-bottom:8px;font-style:italic}
.sp{margin:4px 0 0 0;padding:0}
.sp-item{display:flex;gap:7px;font-size:12px;padding:3px 0;line-height:1.45;border-bottom:0.5px solid var(--color-border-tertiary)}
.sp-item:last-child{border-bottom:none}
.sp-letter{font-weight:500;color:var(--color-text-primary);flex-shrink:0;min-width:14px}
.sp-content{color:var(--color-text-secondary)}
.sp-ref{font-size:10px;color:var(--color-text-tertiary);display:block;margin-top:1px}
.ex-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:11px 13px;margin-bottom:9px}
.ex-head{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.ex-tag{font-size:10px;font-weight:500;padding:2px 8px;border-radius:20px;flex-shrink:0}
.ex-title{font-size:12px;font-weight:500;color:var(--color-text-primary)}
.ex-body{font-size:12px;color:var(--color-text-secondary);line-height:1.55}
.ex-lien{font-size:10px;color:var(--color-text-tertiary);margin-top:4px;font-style:italic}
.liens-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
.lpill{font-size:11px;padding:4px 10px;border-radius:20px;cursor:pointer;border:0.5px solid;background:transparent;transition:opacity .15s}
.lpill:hover{opacity:.7}
.dq{font-size:12px;color:var(--color-text-secondary);padding:5px 0 5px 12px;position:relative;line-height:1.4;border-bottom:0.5px solid var(--color-border-tertiary)}
.dq:last-child{border-bottom:none}
.dq::before{content:"?";position:absolute;left:0;color:var(--color-text-tertiary);font-size:11px;top:6px}
.plan-box{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px 14px;margin-bottom:14px}
.plan-title{font-size:12px;font-weight:500;color:var(--color-text-primary);margin-bottom:6px}
.plan-part{font-size:12px;color:var(--color-text-secondary);padding:3px 0 3px 10px;border-left:2px solid var(--color-border-secondary);margin-bottom:3px;line-height:1.45}
.plan-sub{font-size:11px;color:var(--color-text-tertiary);padding-left:14px;margin-bottom:2px}
.ethique-box{background:var(--color-background-info);border:0.5px solid var(--color-border-info);border-radius:var(--border-radius-md);padding:10px 13px;margin-bottom:14px;font-size:12px;color:var(--color-text-secondary);line-height:1.6}
</style>

<script>
const D={
conscience:{c:"#534AB7",l:"Conscience",s:"Qu'est-ce que la conscience ?",
def:"La <span class='kw'>conscience</span> est la présence à soi et au monde. On distingue la <span class='kw'>conscience immédiate</span> et la <span class='kw'>conscience réflexive</span>. La psychanalyse (Freud) remet en cause sa transparence. La biologie (Frans de Waal) montre que des formes primitives de conscience existent chez l'animal.",
auteurs:[
{n:"Descartes",w:"Méditations métaphysiques, 1641",i:"Cogito : 'Je pense donc je suis'. Dualisme âme/corps. La conscience est le seul fondement indubituble.",q:"'Je pense, donc je suis'"},
{n:"Freud",w:"Introduction à la psychanalyse, 1916",i:"L'inconscient : le moi n'est pas maître en sa propre maison. Ça / Moi / Surmoi. Rêves, lapsus, actes manqués révèlent l'inconscient.",q:"'Le moi n'est pas maître dans sa propre maison'"},
{n:"Sartre",w:"L'Être et le Néant, 1943",i:"Conscience = néant, toujours intentionnelle. Mauvaise foi = se croire une chose déterminée pour fuir l'angoisse de la liberté.",q:"'La conscience est ce qu'elle n'est pas et n'est pas ce qu'elle est'"},
{n:"Hegel",w:"Phénoménologie de l'Esprit, 1807",i:"Dialectique maître/esclave : la conscience de soi naît dans le conflit et la reconnaissance par autrui.",q:"'La conscience de soi n'existe que reconnue'"},
{n:"Bergson",w:"Matière et mémoire, 1896",i:"Conscience = durée vécue, flux continu irréductible au cerveau. La mémoire est la substance du moi.",q:"La conscience = durée intérieure, non espace mesurable"},
{n:"Frans de Waal",w:"L'Âge de l'empathie, 2009",i:"Le comportement moral des animaux prouve un substrat biologique de la conscience morale. Les neurones miroirs et l'empathie existent chez les primates. La conscience n'est pas une exclusivité humaine.",q:"'On a tous un sens moral' — origine naturelle de la conscience morale",isNew:true},
],
textes:[
{n:"Descartes — le cogito",t:"Même si je me trompe, c'est moi qui me trompe. La pensée ne peut être mise en doute. Certitude irréductible du sujet pensant."},
{n:"Freud — inconscient et rêve",t:"Le rêve est la 'voie royale' vers l'inconscient. Actes manqués, lapsus révèlent les désirs refoulés."},
{n:"Cours p.24 — corps et conscience",t:"'Être un corps' vs 'avoir un corps'. Don d'organes : ambivalence culturelle. Le corps est constitutif de l'identité du sujet. Rapport Agence Biomédecine."},
{n:"Frans de Waal — neurones miroirs",t:"L'inscription de l'empathie dans un canal corporel. Substrat biologique de l'empathie. 'ON A TOUS UN SENS MORAL' — se pose-t-on des devoirs moraux spécifiques ?",isNew:true},
],
axes:[
{n:"Axe 1",t:"La conscience comme certitude et fondement",pb:"La conscience peut-elle être notre seul point d'appui ?",
sps:[
{l:"A",c:"Oui : le cogito cartésien fonde la certitude absolue. 'Je pense donc je suis' : seule vérité indubituble après le doute hyperbolique.",r:"Descartes, Méditations I"},
{l:"B",c:"Mais la conscience immédiate peut être trompeuse : illusions, hallucinations. Le cogito ne garantit pas la vérité du monde extérieur.",r:"Descartes lui-même (malin génie)"},
{l:"C",c:"La conscience réflexive est un effort : elle implique un retour actif sur ses actes et jugements, non un simple miroir.",r:"Alain : 'La conscience n'est pas un miroir'"},
]},
{n:"Axe 2",t:"Les limites de la conscience : l'inconscient",pb:"Sommes-nous vraiment transparents à nous-mêmes ?",
sps:[
{l:"A",c:"Non : Freud. La conscience est la partie émergée de l'iceberg. Les pulsions refoulées (Ça) orientent nos comportements à notre insu.",r:"Freud, Introduction à la psychanalyse"},
{l:"B",c:"La mauvaise foi (Sartre) n'est pas l'inconscient : c'est une fuite consciente-mais-niée de notre liberté. L'homme se ment volontairement.",r:"Sartre, L'Être et le Néant"},
{l:"C",c:"Nuance : la cure psychanalytique vise à élargir la conscience sur l'inconscient. 'Là où était le Ça, le Moi doit advenir.'",r:"Freud : objectif thérapeutique"},
]},
{n:"Axe 3",t:"La conscience morale : naturelle ou construite ?",pb:"Le sens moral est-il inné ou acquis ?",
sps:[
{l:"A",c:"Rousseau : le sens moral a une origine naturelle. La pitié et la bonté naturelle précèdent la réflexion. Primauté chronologique du sentiment moral.",r:"Rousseau, Discours sur l'inégalité ; cours p.68"},
{l:"B",c:"Frans de Waal : les animaux montrent des comportements moraux (empathie, réciprocité, sens de l'équité). Les neurones miroirs = substrat biologique de la conscience morale.",r:"Frans de Waal, cours p.70"},
{l:"C",c:"Mais Kant : la conscience morale est une construction rationnelle, non un sentiment. L'impératif catégorique est universel précisément parce qu'il dépasse les émotions contingentes.",r:"Kant, Fondements de la métaphysique des mœurs"},
]},
],
exemples:[
{tag:"Biologie",tit:"Frans de Waal — empathie chez les primates",body:"Les chimpanzés consolent les individus en détresse, les éléphants s'entraident, les corbeaux vengent leurs morts. Ces comportements suggèrent une forme de conscience morale animale. De Waal : 'le comportement moral ou non dépend du changement des circonstances.'",lien:"→ Conscience morale, devoir, nature"},
{tag:"Science",tit:"Expérience de Libet (1983)",body:"Le cerveau prépare le mouvement 300ms avant que le sujet ait conscience de sa décision. La conscience serait 'en retard' sur le cerveau — notre sentiment de décision consciente serait une illusion rétrospective.",lien:"→ Libre arbitre, Freud, déterminisme"},
{tag:"Littérature",tit:"Proust — la mémoire involontaire",body:"La madeleine ressuscite une époque entière à l'insu de Marcel. Illustre que la conscience n'est pas maîtresse de ses propres contenus (Bergson : durée, Freud : inconscient).",lien:"→ Bergson, Freud, identité"},
{tag:"Société",tit:"Don d'organes — Agence Biomédecine",body:"'Être un corps ou avoir un corps ?' : 32% des jeunes pensent qu'entrer en entier dans l'au-delà est important. Le don d'organes interroge l'identité corporelle et la conscience de soi en tant que personne.",lien:"→ Corps, technique, identité"},
],
liens:["Liberté","Nature","Devoir"],
diss:["La conscience de soi est-elle une connaissance de soi ?","Peut-on agir de façon inconsciente ?","L'inconscient remet-il en cause la liberté ?","Le sens moral est-il naturel ou construit ?","Le corps est-il constitutif de l'identité ?"]
},

nature:{c:"#1D9E75",l:"Nature",s:"Qu'est-ce qui est naturel ?",
def:"La <span class='kw'>nature</span> désigne le monde physique (phusis), l'essence propre d'un être, ou ce qui s'oppose à la culture. Enjeu : y a-t-il une 'bonne nature' à respecter ou à dépasser ? La frontière nature/culture est-elle nette ?",
auteurs:[
{n:"Aristote",w:"Physique / Parties des animaux (TEXTE 7)",i:"Nature = principe interne de mouvement. La main : 'outil à faire des outils'. L'homme est un animal politique par nature.",q:"'La main semble être non pas un outil, mais plusieurs'"},
{n:"Descartes",w:"Discours de la méthode, 1637 (TEXTE 9)",i:"'Maîtres et possesseurs de la nature' grâce à la physique pratique. La nature est une machine dominable par la science.",q:"'Nous rendre comme maîtres et possesseurs de la nature'"},
{n:"Rousseau",w:"Discours sur l'inégalité, 1755",i:"Homme naturellement bon, libre et solitaire. La société et la propriété le corrompent. L'état de nature est un mythe régulateur.",q:"'L'homme est né libre et partout il est dans les fers'"},
{n:"Hans Jonas",w:"Le Principe responsabilité, 1990 (TEXTE 5)",i:"La technique moderne menace la nature. Heuristique de la peur : anticiper le pire. Devoir envers les générations futures.",q:"'Agis de façon que les effets de ton action soient compatibles avec la permanence d'une vie humaine authentique'"},
{n:"Darwin",w:"L'Origine des espèces, 1859",i:"Sélection naturelle sans finalité. L'homme issu de la nature animale sans rupture absolue.",q:"L'homme : un primate évolué"},
{n:"Platon",w:"Protagoras (TEXTE 6)",i:"Mythe de Prométhée : l'homme est nu, sans défenses naturelles. Épiméthée oublie l'homme. Prométhée vole le feu technique.",q:"L'homme : être déficient naturel, compensé par la technique"},
],
textes:[
{n:"TEXTE 9 — Descartes",t:"Maîtres et possesseurs de la nature. La physique pratique pour connaître feu, eau, air. Le premier bien est la santé."},
{n:"TEXTE 5 — Jonas",t:"Prométhée déchaîné par la science. La promesse s'est inversée en menace. Heuristique de la peur."},
{n:"TEXTE 6 — Platon, Protagoras",t:"Épiméthée répartit les qualités aux animaux, oublie l'homme. Prométhée vole le feu. Zeus envoie justice et pudeur à tous."},
{n:"TEXTE 7 — Aristote",t:"La main comme outil polymorphe : griffe, serre, corne, lance. L'homme peut acquérir toutes les techniques."},
],
axes:[
{n:"Axe 1",t:"La nature comme norme et modèle",pb:"Ce qui est naturel est-il nécessairement bon ?",
sps:[
{l:"A",c:"Rousseau : la nature est bonne, la société corrompt. L'homme naturel est libre et bon. Critique de la civilisation.",r:"Rousseau, Discours sur l'inégalité"},
{l:"B",c:"Sophisme naturaliste (Hume) : ce qui est naturel n'est pas automatiquement bon — maladies, prédation, mort sont naturelles aussi.",r:"Hume : 'le fait n'implique pas le droit'"},
{l:"C",c:"Aristote : la nature fixe des fins. La technique doit s'y conformer (médecine curative) sans les transgresser (transhumanisme).",r:"Aristote, Physique II"},
]},
{n:"Axe 2",t:"La domination de la nature par la technique",pb:"Devons-nous maîtriser la nature ou la respecter ?",
sps:[
{l:"A",c:"Descartes : la physique pratique pour améliorer notre vie. La domination de la nature est le projet cartésien.",r:"TEXTE 9"},
{l:"B",c:"Dérèglement climatique : destructions écologiques prouvent les limites de ce projet. La domination a des effets irréversibles.",r:"GIEC ; données contemporaines"},
{l:"C",c:"Jonas : la nature a une valeur intrinsèque. Heuristique de la peur, principe de précaution.",r:"TEXTE 5 — Jonas"},
]},
{n:"Axe 3",t:"Y a-t-il une 'nature humaine' ?",pb:"L'homme a-t-il une essence naturelle fixe ?",
sps:[
{l:"A",c:"Oui : Aristote (animal politique), biologie évolutive, religions. Des tendances naturelles (langage, sociabilité, outil) définissent l'homme.",r:"Aristote, Politique ; Frans de Waal"},
{l:"B",c:"Non : Sartre ('l'existence précède l'essence'). L'homme se définit par ses actes. Beauvoir : 'On ne naît pas femme, on le devient.'",r:"Sartre ; Beauvoir"},
{l:"C",c:"Nuance : il y a des tendances naturelles plastiques. La culture transforme la nature sans la supprimer. Lévi-Strauss : il n'y a pas de société purement naturelle.",r:"Darwin ; Lévi-Strauss"},
]},
],
exemples:[
{tag:"Écologie",tit:"Le dérèglement climatique",body:"Hausse des températures +1,5°C depuis l'ère pré-industrielle — conséquence directe de la domination technico-industrielle de la nature. Illustration de l'avertissement de Jonas sur les effets irréversibles.",lien:"→ Jonas, Descartes, technique"},
{tag:"Mythe — Cours",tit:"Mythe de Prométhée (TEXTE 6)",body:"L'homme = animal déficient : nu, sans griffes, sans fourrure. Il compense par la technique (feu volé) et la vie politique (justice et pudeur données par Zeus à tous).",lien:"→ Technique, justice, État"},
{tag:"Anthropologie",tit:"Lévi-Strauss — prohibition de l'inceste",body:"Universelle mais de contenu variable selon les cultures : elle est à la fois un fait naturel (universalité) et culturel (contenu variable). Frontière nature/culture toujours déjà franchie.",lien:"→ Culture, nature humaine"},
{tag:"Science",tit:"OGM et transgénèse",body:"Modification du génome des plantes : projet cartésien poussé à l'extrême. Pose la question des limites éthiques de la domination de la nature.",lien:"→ Devoir, Jonas, technique"},
],
liens:["Technique","Liberté","Devoir","État"],
diss:["L'être humain est-il un être naturel ?","Faut-il respecter la nature ?","Y a-t-il une nature humaine ?","La technique nous éloigne-t-elle de la nature ?","L'homme a-t-il des devoirs envers la nature ?"]
},

bonheur:{c:"#EF9F27",l:"Bonheur",s:"En quoi consiste le bonheur ?",
def:"Le <span class='kw'>bonheur</span> est un état durable de satisfaction complète. Question centrale : le bonheur est-il accessible ? Le désir est-il obstacle ou condition ? Doit-il guider la morale ? Le cours contient une <span class='kw'>dissertation modèle complète</span> sur 'Satisfaire ses désirs, est-ce être heureux ?'",
auteurs:[
{n:"Épicure",w:"Lettre à Ménécée, ~300 av. J.-C.",i:"Ataraxie + aponie. 3 types de désirs : naturels nécessaires / naturels non nécessaires / vains. La sagesse = bien trier ses désirs.",q:"'Il n'y a pas de vie heureuse sans prudence, beauté morale et justice'"},
{n:"Aristote",w:"Éthique à Nicomaque, -335",i:"Eudaimonia = activité de l'âme conforme à la vertu. Fin ultime, non un moyen. Exige vertu ET biens extérieurs.",q:"'Le bonheur est une activité de l'âme conforme à la vertu'"},
{n:"Kant",w:"Fondements de la métaphysique des mœurs, 1785",i:"Le bonheur ne fonde pas la morale : empirique et variable. Le devoir est inconditionné.",q:"'Sois digne d'être heureux' — mais le bonheur n'est pas le but de la morale"},
{n:"Mill",w:"L'Utilitarisme, 1863",i:"Le bonheur = fondement de la morale. 'Plus grand bonheur du plus grand nombre.' Distinction plaisirs inférieurs/supérieurs.",q:"'Il vaut mieux être Socrate insatisfait qu'un idiot satisfait'"},
{n:"Schopenhauer",w:"Le Monde comme volonté, 1818",i:"Le bonheur est illusion. Oscillation entre douleur (désir insatisfait) et ennui (désir comblé).",q:"'La vie oscille comme un pendule entre la douleur et l'ennui'"},
{n:"Nietzsche",w:"Aurores, 1881 ",i:"Critique du travail comme instrument de contrôle social. La 'glorification du travail' cache la peur de l'individu libre. Le bonheur authentique nécessite la maîtrise de soi et l'oisiveté.",q:"'Un tel travail constitue la meilleure des polices'"},
{n:"Marc-Aurèle",w:"Pensées pour moi-même",i:"Stoïcisme : conjurer ses craintes, accepter ce qui ne dépend pas de nous. Substituer une appréhension lucide du réel à la croyance fausse. Ataraxie dans l'accord de soi au monde.",q:"'Accepter ce qui ne dépend pas de nous' — voie stoïcienne vers l'ataraxie",isNew:true},
],
textes:[
{n:"Épicure — classification des désirs",t:"Naturels nécessaires (manger) : à satisfaire. Naturels non nécessaires (luxe) : indifférents. Vains (gloire, richesse) : à rejeter. La sagesse réside dans ce discernement."},
{n:"Nietzsche, Aurores ",t:"Le travail comme 'meilleure des polices' : occupe les individus, les détourne de la réflexion et de la maîtrise de soi."},
{n:"Cours p.55 — schéma désir/bonheur",t:"B1 (contrainte) → B2 (consommation) → B3 (plaisir). Le bonheur n'est pas au bout du désir immédiat. Le désir peut être obstacle ou condition selon son type."},
{n:"Dissertation modèle — 'Satisfaire ses désirs, est-ce être heureux ?'",t:"I. Le désir insatiable empêche le bonheur (Schopenhauer). II. Le désir comme force vitale (Rousseau). III. Maîtrise des désirs = voie vers l'ataraxie (Épicure, Stoïciens). Ouverture : dépendance inhérente à la condition humaine.",isNew:true},
{n:"Peter Singer — famine, richesse et moralité",t:"Souffrance des Bengalis : si nos actions peuvent empêcher des souffrances graves sans sacrifier quoi que ce soit d'importance morale comparable, nous devons moralement le faire. Conséquentialisme : impartialité totale.",isNew:true},
],
axes:[
{n:"Axe 1",t:"Le désir est-il obstacle au bonheur ?",pb:"Satisfaire ses désirs, est-ce être heureux ?",
sps:[
{l:"I",c:"Oui : le désir insatiable est source de souffrance. Schopenhauer : oscillation douleur/ennui. L'homme ne peut jamais être pleinement satisfait.",r:"Schopenhauer ; Épicure (désirs vains)"},
{l:"II",c:"Non : le désir est une force vitale (Rousseau : désir magnifie l'objet). Spinoza : 'le désir est l'essence de l'homme'. Sans désir, vie malheureuse.",r:"Rousseau ; Spinoza, Éthique III"},
{l:"III",c:"Synthèse : le bonheur ne peut s'atteindre que dans la maîtrise des désirs. Épicure : trier les désirs. Stoïciens (Marc-Aurèle) : accepter ce qui ne dépend pas de nous.",r:"Épicure, Lettre à Ménécée ; cours p.69"},
]},
{n:"Axe 2",t:"Bonheur et morale : conflit ou accord ?",pb:"Doit-on sacrifier le bonheur à la vertu ?",
sps:[
{l:"A",c:"Kant : opposition nette. Le bonheur est empirique, le devoir rationnel. Agir par recherche du bonheur n'est pas moral.",r:"Kant, Fondements"},
{l:"B",c:"Mill/Singer : pas d'opposition. L'utilitarisme fait coïncider bonheur et morale. Agir moralement = contribuer au bonheur collectif.",r:"Mill, L'Utilitarisme ; Singer"},
{l:"C",c:"Aristote : synthèse. Le bonheur exige la vertu. Mais la vertu seule ne suffit pas : il faut aussi des biens extérieurs. Bonheur et vertu se conditionnent.",r:"Aristote, Éthique à Nicomaque X"},
]},
{n:"Axe 3",t:"Le bonheur est-il accessible ?",pb:"Peut-on être vraiment heureux ?",
sps:[
{l:"A",c:"Non : Schopenhauer (désir infini), Freud (malaise dans la civilisation). La civilisation réprime les pulsions, source d'un malaise irréductible.",r:"Schopenhauer ; Freud, Malaise dans la civilisation"},
{l:"B",c:"Critères de mesure : IDH / BNB (indicateur de bonheur/bien-être) — cours p.67. 4 critères : taille de la population, degré d'engagement, utilité marginale décroissante, IDH/BNB. Difficultés d'un calcul global et impartial.",r:"Cours p.67 — critères utilitaristes",isNew:true},
{l:"C",c:"Épicure / Stoïcisme : oui, si on maîtrise ses désirs et ses craintes. L'ataraxie est accessible à tous par la philosophie pratique.",r:"Épicure, Lettre à Ménécée ; Marc-Aurèle"},
]},
],
exemples:[
{tag:"Cours — dissertation",tit:"Plan modèle : 'Satisfaire ses désirs, est-ce être heureux ?'",body:"I. Non : le désir insatiable empêche le bonheur (Schopenhauer, désirs vains d'Épicure). II. Mais le désir est force vitale (Rousseau magnifie l'objet, Spinoza : essence de l'homme). III. Synthèse : maîtrise des désirs = voie vers l'ataraxie (Épicure trier, Stoïciens accepter). Ouverture : la dépendance est inhérente à la condition humaine.",lien:"→ Cours p.66-69, plan complet avec références"},
{tag:"Psychologie",tit:"Paradoxe d'Easterlin",body:"Au-delà d'un certain seuil de revenu, la richesse supplémentaire n'augmente plus le bonheur. Illustre la thèse épicurienne : les désirs vains ne rendent pas heureux.",lien:"→ Épicure (désirs vains), Mill (qualité vs quantité)"},
{tag:"Philosophie",tit:"Divertissement pascalien",body:"Pascal : l'homme fuit la conscience de sa misère dans le divertissement (chasse, jeu). Il ne cherche pas tant le bonheur que l'oubli de son malheur. Nietzsche reprend cette idée pour le travail.",lien:"→ Nietzsche Aurores, cours p.19"},
{tag:"Littérature",tit:"Camus — Le Mythe de Sisyphe",body:"Sisyphe, condamné à recommencer éternellement, est déclaré 'heureux' par Camus : accepter l'absurde sans se mentir est la seule forme de bonheur authentique.",lien:"→ Schopenhauer (absurde), Sartre"},
],
liens:["Liberté","Devoir","Conscience","Justice"],
diss:["Satisfaire ses désirs, est-ce être heureux ?","Le bonheur est-il affaire privée ?","Le désir est-il obstacle au bonheur ?","Le bonheur est-il compatible avec le devoir moral ?","Peut-on enseigner le bonheur ?"]
},

justice:{c:"#D85A30",l:"Justice",s:"Qu'est-ce qu'une société juste ?",
def:"La <span class='kw'>justice</span> est une vertu morale et un principe politique. Elle implique l'égalité — arithmétique ou proportionnelle ? <span class='kw'>Nancy Fraser</span> (nouveau) distingue trois dimensions : redistribution, reconnaissance, représentation.",
auteurs:[
{n:"Platon",w:"La République / Protagoras (TEXTE 6)",i:"Justice = harmonie de la cité. Zeus donne justice et pudeur à TOUS les hommes comme condition de la vie en société.",q:"'Tout homme incapable de pudeur et de justice sera exterminé comme un fléau de la société'"},
{n:"Aristote",w:"Éthique à Nicomaque, Liv. V",i:"Justice distributive (mérite) et corrective (égalité arithmétique). La justice = juste milieu.",q:"'La justice distributive : à chacun selon son mérite'"},
{n:"Rawls",w:"Théorie de la justice, 1971",i:"Voile d'ignorance. 2 principes : égale liberté + principe de différence. La répartition des atouts naturels est un 'fait moral arbitraire'.",q:"'Les inégalités sont justifiées si elles profitent aux plus défavorisés'"},
{n:"Marx",w:"Critique du programme de Gotha, 1875",i:"Le droit proportionnel au travail est toujours un droit bourgeois. Stade supérieur : 'De chacun selon ses capacités, à chacun selon ses besoins.'",q:"'De chacun selon ses capacités, à chacun selon ses besoins'"},
{n:"Nancy Fraser",w:"Redistribution ou reconnaissance ?, 2004",i:"La justice sociale a 3 dimensions : redistribution économique, reconnaissance culturelle/identitaire, représentation politique. Une injustice peut toucher ces 3 niveaux simultanément.",q:"Justice = redistribution + reconnaissance + représentation",isNew:true},
{n:"Axel Honneth",w:"La Lutte pour la reconnaissance, 1992",i:"La justice passe par la lutte pour la reconnaissance : affective (famille), juridique (État), sociale (estime de soi). L'injustice = mépris, déni de reconnaissance.",q:"L'injustice = déni de reconnaissance à l'un des trois niveaux",isNew:true},
{n:"Hobbes",w:"Léviathan, 1651",i:"Sans État, pas de justice. État de nature = guerre de tous contre tous.",q:"'L'homme est un loup pour l'homme' à l'état de nature"},
],
textes:[
{n:"TEXTE 6 — Platon, Protagoras",t:"Zeus distribue justice et pudeur à tous (pas seulement aux spécialistes). Sans vertu civique partagée, pas de cité."},
{n:"Rawls — Théorie de la justice",t:"La répartition actuelle est le résultat cumulatif de répartitions antérieures d'atouts naturels. Ces contingences sont moralement arbitraires. Principe de différence : les inégalités ne sont justifiées que si elles profitent aux plus défavorisés.",isNew:true},
{n:"Marx — Critique du programme de Gotha",t:"Le travail individuel de chaque producteur = sa part de la journée sociale de travail. Le droit égal est donc toujours un droit bourgeois. Stade supérieur : à chacun selon ses besoins.",isNew:true},
{n:"Nancy Fraser — justice sociale",t:"Deux paradigmes : redistribution (économique) et reconnaissance (culturelle). Au-delà, représentation (politique). Ces paradigmes divergent dans leur implémentation mais tous deux visent la justice.",isNew:true},
{n:"Exercice de la flûte",t:"Pierre (a fabriqué la flûte) → libertarianisme : droit de propriété. Paul (le seul qui ne sait pas jouer) → égalitarisme économique. Jacqueline (la seule qui sait bien jouer) → utilitarisme : maximiser. Qui doit avoir la flûte ? 3 conceptions de justice.",isNew:true},
],
axes:[
{n:"Axe 1",t:"Justice = égalité arithmétique ou proportionnelle ?",pb:"Traiter tout le monde pareil, est-ce juste ?",
sps:[
{l:"A",c:"Égalité arithmétique (corrective, Aristote) : même traitement pour tous. 'La loi est la même pour tous.' Modèle de la justice devant la loi.",r:"Aristote, Éthique à Nicomaque V"},
{l:"B",c:"Mais l'égalité formelle peut masquer les inégalités réelles. Anatole France : 'La loi interdit également aux riches et aux pauvres de coucher sous les ponts.'",r:"Rawls : principe de différence"},
{l:"C",c:"Rawls : les inégalités sont justes seulement si elles profitent aux plus défavorisés. La discrimination positive comme application possible.",r:"Rawls, Théorie de la justice"},
]},
{n:"Axe 2",t:"Les 3 dimensions de la justice sociale",pb:"La justice se réduit-elle à la redistribution économique ?",
sps:[
{l:"A",c:"Non, selon Nancy Fraser : la justice a 3 dimensions — redistribution (égalité économique), reconnaissance (respect des identités culturelles), représentation (égalité de voix politique).",r:"Nancy Fraser, cours p.75",isNew:true},
{l:"B",c:"Honneth : la justice passe par la lutte pour la reconnaissance à 3 niveaux : affectif (famille/amour), juridique (droits), social (estime professionnelle). L'injustice = mépris à l'un de ces niveaux.",r:"Honneth, cours p.75",isNew:true},
{l:"C",c:"Rawls intègre partiellement ces dimensions : le principe d'égale liberté couvre la représentation, le principe de différence la redistribution. Mais la reconnaissance culturelle reste absente.",r:"Rawls vs Fraser : débat contemporain"},
]},
{n:"Axe 3",t:"Peut-on légitimement désobéir aux lois injustes ?",pb:"L'obligation d'obéir aux lois est-elle absolue ?",
sps:[
{l:"A",c:"Non (Hobbes, Hegel) : la légitimité de l'État repose sur l'obéissance. La désobéissance menace l'ordre social.",r:"Hobbes, Léviathan"},
{l:"B",c:"Oui : désobéissance civile (Thoreau, Gandhi, MLK). Face à des lois injustes, la conscience morale peut exiger la résistance.",r:"Martin Luther King, Lettre de Birmingham"},
{l:"C",c:"Rawls : la désobéissance civile est légitime si elle est non-violente, publique, et accepte ses conséquences légales. Elle vise à changer la loi, non à la supprimer.",r:"Rawls, Théorie de la justice"},
]},
],
exemples:[
{tag:"Cours — exercice",tit:"La flûte de Pierre, Paul et Jacqueline",body:"Exercice du cours : qui mérite la flûte ? Pierre (l'a fabriquée) → libertarianisme / droit de propriété. Paul (ne sait pas jouer) → égalitarisme. Jacqueline (sait jouer) → utilitarisme. Illustre les 3 grandes conceptions de la justice.",lien:"→ Rawls, Mill, libertarianisme",isNew:true},
{tag:"Actualité",tit:"Nancy Fraser — reconnaissance des minorités",body:"Les luttes LGBTQ+, féministes, antiracistes réclament à la fois redistribution économique (égalité salariale), reconnaissance culturelle (visibilité, dignité) et représentation politique. Fraser : aucune de ces dimensions ne peut être sacrifiée aux autres.",lien:"→ Fraser, Honneth, justice sociale",isNew:true},
{tag:"Histoire",tit:"Rosa Parks (1955) — désobéissance civile",body:"Refuse de céder sa place dans un bus à un blanc en Alabama. Déclenche le boycott des bus de Montgomery. Résistance à une loi formellement valide mais moralement injuste.",lien:"→ Rawls, Thoreau, désobéissance civile"},
{tag:"Philosophie",tit:"Le voile d'ignorance de Rawls",body:"Si vous choisissiez les règles de la société sans savoir si vous serez riche ou pauvre, homme ou femme, vous choisiriez des règles justes. Le voile d'ignorance simule l'impartialité.",lien:"→ Rawls, contrat social"},
],
liens:["État","Liberté","Devoir","Bonheur"],
diss:["La justice exige-t-elle l'égalité ?","Peut-on légitimement désobéir aux lois ?","La justice sociale se réduit-elle à la redistribution ?","Justice et vengeance sont-elles compatibles ?","Peut-on être juste sans l'État ?"]
},

devoir:{c:"#993556",l:"Devoir",s:"Sommes-nous obligés d'agir moralement ?",
def:"Le <span class='kw'>devoir moral</span> est une obligation inconditionnelle de la raison (Kant). Mais le cours distingue <span class='kw'>éthique</span> (ethos = manière d'être, questionnement sur la vie bonne) et <span class='kw'>morale</span> (mores = coutumes, normes et valeurs). Deux grandes approches : <span class='kw'>déontologisme</span> (Kant) et <span class='kw'>conséquentialisme</span> (Singer, Bentham).",
auteurs:[
{n:"Kant",w:"Fondements de la métaphysique des mœurs, 1785",i:"Impératif catégorique : agir par devoir, non conformément au devoir. Deux formulations : universalisation + humanité comme fin. Déontologisme : la morale ne peut se baser sur les conséquences.",q:"'Agis de telle sorte que tu traites l'humanité toujours comme une fin, jamais seulement comme un moyen'"},
{n:"Peter Singer",w:"Famine, richesse et moralité, 1972",i:"Conséquentialisme : si nos actions peuvent empêcher des souffrances graves sans rien sacrifier d'importance morale comparable, nous devons moralement le faire. Impartialité totale : un Bengali compte autant qu'un voisin.",q:"'Prévenir quelque chose de mauvais est bien, sans pour autant sacrifier quelque chose d'importance morale comparable'",isNew:true},
{n:"Bentham",w:"Introduction aux principes de la morale, 1789",i:"Calcul hédoniste : additionner plaisirs et peines de tous les individus affectés. La bonne action = celle qui produit le plus de bonheur global. Calcul global ET impartial des conséquences.",q:"'Le plus grand bonheur du plus grand nombre'",isNew:true},
{n:"Hans Jonas",w:"Le Principe responsabilité, 1990 (TEXTE 5)",i:"Nouveau devoir face à la technique : responsabilité envers les générations futures. Heuristique de la peur.",q:"'Agis de façon que les effets de ton action soient compatibles avec la permanence d'une vie humaine authentique'"},
{n:"Sartre",w:"L'existentialisme est un humanisme, 1945",i:"Condamnés à être libres. Le devoir vient de notre liberté radicale. Mauvaise foi = fuir cette responsabilité.",q:"'Condamné à être libre'"},
{n:"Durkheim",w:"De la division du travail social, 1893",i:"Le devoir moral est un fait social : la morale = conscience collective intériorisée.",q:"La morale = 'manière d'agir obligatoire' issue du social"},
{n:"Simone Weil",w:"L'Enracinement, 1943 (TEXTE 10)",i:"Devoir de l'ingénieur envers les travailleurs. La technique doit servir l'homme.",q:"'Poser en termes techniques les problèmes des répercussions des machines sur le bien-être moral des ouvriers'"},
],
textes:[
{n:"Cours p.64 — Éthique et morale (NOUVEAU)",t:"Éthique (ethos = manière d'être) : s'interroger sur nos manières de vivre, la vie bonne, heureuse, vertueuse. Morale (mores = coutumes) : ensemble de normes et valeurs. Distinction fondamentale.",isNew:true},
{n:"Cours p.65 — Dilemme moral : mentir ou non ?",t:"Kant : 'Il ne faut jamais mentir sous peine de détruire la confiance.' Dilemme moral = tension entre plusieurs règles morales. Nécessité de les hiérarchiser / prioriser.",isNew:true},
{n:"Peter Singer — corpus déontologie/conséquentialisme",t:"Option 1 : conséquentialisme (Bentham, Singer) — calcul global et impartial des conséquences. Option 2 : déontologisme (Kant) — impératif catégorique, fondé sur la raison, universel.",isNew:true},
{n:"Kant — 3 formulations de l'impératif catégorique",t:"(1) Universalisation. (2) Humanité comme fin. (3) Législation universelle. Distinction devoir/inclination."},
{n:"TEXTE 5 — Jonas",t:"Heuristique de la peur comme boussole. Loi de Gabor. Anticiper la catastrophe."},
{n:"TEXTE 10 — Simone Weil",t:"Les ingénieurs doivent intégrer le bien-être moral des ouvriers. Devoir professionnel élargi."},
],
axes:[
{n:"Axe 1",t:"Déontologisme vs conséquentialisme",pb:"La morale doit-elle se fonder sur les principes ou sur les conséquences ?",
sps:[
{l:"A",c:"Déontologisme (Kant) : la valeur morale d'un acte ne dépend pas de ses conséquences mais de sa conformité à la loi morale. L'impératif catégorique est universel et inconditionnel.",r:"Kant, Fondements ; cours p.71"},
{l:"B",c:"Conséquentialisme (Bentham, Singer) : la bonne action = celle qui produit le plus de bonheur global. Calcul impartial. Un Bengali souffrant compte autant qu'un voisin.",r:"Singer, cours p.71 ; Bentham"},
{l:"C",c:"Dilemme : le conséquentialisme peut justifier des actes injustes (torturer un innocent pour sauver dix). Le déontologisme peut conduire à des absurdités (mentir à l'assassin — Kant). Les deux approches ont des limites.",r:"Dilemme cours p.65"},
]},
{n:"Axe 2",t:"Éthique vs morale : vie bonne vs normes",pb:"Doit-on chercher la vie bonne ou obéir à des règles ?",
sps:[
{l:"A",c:"Éthique : questionnement sur nos manières de vivre. S'interroger sur la vie bonne, heureuse, vertueuse. Aristote : la vertu comme habitude, la prudence (phronesis) comme guide.",r:"Aristote ; cours p.64"},
{l:"B",c:"Morale : ensemble de normes et valeurs héritées de la société et de la culture (mores = coutumes). Durkheim : la morale est un fait social, intériorisation de la conscience collective.",r:"Durkheim ; cours p.64"},
{l:"C",c:"Tension : l'éthique personnelle peut entrer en conflit avec les normes morales collectives. La désobéissance civile, l'objection de conscience : cas où l'éthique personnelle prime sur la morale sociale.",r:"Thoreau ; Antigone (Sophocle)"},
]},
{n:"Axe 3",t:"De nouveaux devoirs : la responsabilité envers l'avenir",pb:"Avons-nous des devoirs envers ce qui n'existe pas encore ?",
sps:[
{l:"A",c:"Jonas : la technique crée des effets irréversibles. Les générations futures ne peuvent pas défendre leurs droits. Devoir de les protéger : 'heuristique de la peur'.",r:"Jonas, cours TEXTE 5"},
{l:"B",c:"Singer élargit aussi le devoir : si nous pouvons empêcher une souffrance grave sans grand sacrifice, nous le devons — peu importe la distance géographique ou temporelle.",r:"Singer, cours p.71"},
{l:"C",c:"Weil : devoir de l'ingénieur envers les travailleurs. Devoir professionnel élargi à la dimension humaine. La technique doit servir l'homme, pas le capital.",r:"TEXTE 10 — Simone Weil"},
]},
],
exemples:[
{tag:"Cours — corpus",tit:"Déontologisme vs conséquentialisme",body:"Situation : des gens meurent de faim au Bengale. Singer : nous avons le devoir moral d'aider car nous pouvons le faire sans grand sacrifice (conséquentialisme). Kant : notre devoir est défini par la loi morale universelle, non par le calcul des conséquences (déontologisme).",lien:"→ Singer, Kant, Bentham — cours p.71",isNew:true},
{tag:"Philosophie",tit:"Le dilemme du menteur",body:"Kant : 'Il ne faut jamais mentir, même pour protéger quelqu'un.' Un assassin demande où est sa victime — faut-il mentir ? Kant dit non. C'est l'exemple classique de la rigidité du déontologisme.",lien:"→ Kant, déontologisme, dilemme moral",isNew:true},
{tag:"Histoire",tit:"Procès de Nuremberg (1945-46)",body:"Les officiers nazis invoquent le devoir d'obéissance. Le tribunal reconnaît que certains actes sont criminels même si légaux. Le devoir moral prime sur le devoir légal.",lien:"→ Kant (humanité comme fin), désobéissance"},
{tag:"Littérature",tit:"Antigone (Sophocle)",body:"Antigone doit choisir entre obéir à la loi de Créon (ne pas enterrer son frère) et obéir à la loi divine. Elle choisit le devoir moral contre le devoir légal et en meurt.",lien:"→ Désobéissance civile, justice naturelle"},
],
liens:["Liberté","Justice","Conscience","Nature","Technique"],
diss:["Le devoir est-il toujours rationnel ?","Déontologisme ou conséquentialisme — quelle approche est préférable ?","Éthique et morale sont-elles la même chose ?","L'homme a-t-il des devoirs envers la nature ?","Le devoir est-il une contrainte ou une liberté ?"]
},

travail:{c:"#3B6D11",l:"Travail",s:"Le travail libère-t-il ou aliène-t-il ?",
def:"Le <span class='kw'>travail</span> transforme la nature par l'activité humaine. Il est potentiellement <span class='kw'>aliénant</span> (pénible, marchandisé) et <span class='kw'>libérateur</span> (réalisation de soi). Arendt distingue labor/work/action. Nietzsche critique le culte du travail. Weil appelle à un travail non servile.",
auteurs:[
{n:"Hegel",w:"Phénoménologie de l'Esprit, 1807",i:"Dialectique maître/esclave : l'esclave se libère par le travail. Le travail = médiation entre l'homme et le monde.",q:"'C'est dans le travail que l'esclave se retrouve lui-même'"},
{n:"Marx",w:"Manuscrits de 1844 / Le Capital, 1867",i:"4 formes d'aliénation : produit, activité, espèce, autrui. Plus-value = exploitation. Mais le travail libre est l'essence de l'homme.",q:"'Le travail aliéné arrache à l'homme son activité vitale'"},
{n:"Arendt",w:"Condition de l'homme moderne, 1958 (extraits cours p.35)",i:"Labor (nécessité biologique) vs Work/Œuvre (fabrique monde durable) vs Action (politique, libre). Le labor seul ne réalise pas l'homme.",q:"Travail (répétitif) ≠ Œuvre (durable) ≠ Action (politique)"},
{n:"Nietzsche",w:"Aurores, 1881",i:"Le travail comme 'meilleure des polices' : occupe les individus, les détourne de la réflexion, crée sécurité sociale. La glorification du travail cache la peur de l'individu libre.",q:"'Un tel travail constitue la meilleure des polices'"},
{n:"Simone Weil",w:"Condition ouvrière / Enracinement, 1943 (TEXTE 10)",i:"Le travail servile = gouverné par la nécessité. Condition d'un travail non servile : que le travailleur comprenne la finalité de son geste. Devoir de l'ingénieur envers les travailleurs.",q:"'La matière sort ennoblie de la fabrique, les travailleurs en sortent avilis'"},
{n:"Lafargue",w:"Le Droit à la paresse, 1880",i:"Pamphlet contre le culte du travail. Revendication du temps libre comme droit fondamental.",q:"'Une étrange folie possède les classes ouvrières : la passion du travail'"},
],
textes:[
{n:"Arendt — Extraits 1-4",t:"Extrait 1 : dans l'Antiquité, travailler = être asservi. Extrait 2 : le labor reproduit la vie biologique (cycle). Extrait 3 : la productivité = surplus au-delà des besoins. Extrait 4 : le travail conserve le monde commun."},
{n:"Nietzsche — Aurores",t:"'Un tel travail constitue la meilleure des polices.' La glorification du travail cache la peur de l'individu. Le travailleur dur est 'dangereux' : il n'a plus de maîtrise de lui-même."},
{n:"Weil — Condition première d'un travail non servile",t:"Le travail servile est gouverné par la nécessité, non la finalité. Exécuté à cause d'un besoin, non en vue d'un bien. Seule une 'lumière d'éternité' rend le travail supportable."},
{n:"Cours p.30-31 — Plan dissertation aliénation",t:"I. Le travail peut être aliénation (peine, servile, déshumanisant). II. Le travail constitue une condition nécessaire à l'émancipation (transforme la nature, crée surplus, garantit temps libre)."},
],
axes:[
{n:"Axe 1",t:"Le travail comme aliénation",pb:"Le travail prive-t-il l'homme de sa liberté ?",
sps:[
{l:"A",c:"Le travail comme peine : étym. tripalium. Dans l'Antiquité, réservé aux esclaves. Labor d'Arendt : asservissement à la nécessité biologique, cycle sans fin.",r:"Arendt, Extrait 1 ; cours p.35"},
{l:"B",c:"Marx : 4 formes d'aliénation du travail salarié. La plus-value = vol légalisé. Le travailleur est étranger à son produit, son activité, son espèce, ses semblables.",r:"Marx, Manuscrits de 1844"},
{l:"C",c:"Nietzsche : culte du travail = instrument de contrôle social. 'Bullshit jobs' (Graeber) : emplois inutiles mais bien payés, source de malaise. Burn-out/bore-out comme pathologies.",r:"Nietzsche, Aurores ; Graeber, cours p.19"},
]},
{n:"Axe 2",t:"Le travail comme condition de l'émancipation",pb:"Le travail peut-il libérer l'homme ?",
sps:[
{l:"A",c:"Hegel : l'esclave se libère par le travail. En transformant la matière, il se forme lui-même et s'y retrouve.",r:"Hegel, Phénoménologie"},
{l:"B",c:"L'œuvre (Arendt) : fabrique un monde durable et commun. Ce que je crée me survit. Différence fondamentale avec le labor.",r:"Arendt, Extrait 3 ; cours p.31"},
{l:"C",c:"Le surplus créé par le travail (Marx/Arendt) garantit un temps libre. Ce temps libre est la condition de la vie politique et culturelle.",r:"Cours p.31"},
]},
{n:"Axe 3",t:"Quel sens donner au travail aujourd'hui ?",pb:"Le travail est-il encore une valeur ?",
sps:[
{l:"A",c:"Weil : condition première d'un travail non servile. Le travail doit être gouverné par la finalité, non la nécessité. La 'lumière d'éternité' comme condition de sens.",r:"Weil, cours p.40"},
{l:"B",c:"Graeber — 'Bullshit jobs' : des millions d'emplois modernes sont perçus comme inutiles. Le travail bien payé mais vide de sens cause autant de souffrance que le travail pénible.",r:"Graeber, cours p.19"},
{l:"C",c:"Pascal / Nietzsche : le travail détourne du néant et de la mort. Divertissement pascalien. Mais il peut aussi 'fortifier le corps et ruiner l'esprit'. La valeur du travail dépend de ses conditions.",r:"Cours p.19 — Pascal, Nietzsche"},
]},
],
exemples:[
{tag:"Cinéma",tit:"Chaplin — Les Temps modernes (1936)",body:"Charlot sur la chaîne fordiste répète indéfiniment le même geste. Image parfaite de l'aliénation : le corps s'adapte à la machine, l'homme perd son humanité.",lien:"→ Marx (aliénation), Arendt (labor)"},
{tag:"Cours — texte",tit:"Weil — Condition première d'un travail non servile",body:"'Il y a dans le travail un élément irréductible de servitude [...] On l'exécute à cause d'un besoin, non en vue d'un bien.' La seule chose qui rend le travail supportable : 'une lumière d'éternité'.",lien:"→ Aliénation, bonheur, sens"},
{tag:"Contemporain",tit:"Burn-out et bore-out",body:"Deux pathologies inverses : le burn-out (excès de travail) et le bore-out (ennui au travail). Illustrent que le travail peut 'fortifier le corps et ruiner l'esprit'.",lien:"→ Nietzsche, Graeber, aliénation"},
{tag:"Histoire",tit:"La révolution industrielle (XIXe s.)",body:"Le passage à l'usine transforme le rapport au travail : le paysan qui maîtrisait son cycle devient ouvrier parcellaire. Marx analyse cette transformation comme source d'aliénation.",lien:"→ Marx, Arendt, cours p.30"},
],

},

technique:{c:"#185FA5",l:"Technique",s:"La technique nous libère-t-elle ou nous aliène-t-elle ?",
def:"La <span class='kw'>technique</span> est l'ensemble des procédés rationnels visant à transformer la nature. Elle pose la question de la <span class='kw'>maîtrise</span>. Simondon propose une troisième voie : développer une <span class='kw'>culture technique</span> pour dépasser la technophobie.",
auteurs:[
{n:"Aristote",w:"Les Parties des animaux (TEXTE 7)",i:"La main = 'outil à faire des outils'. Ce n'est pas parce que l'homme a des mains qu'il est intelligent — c'est parce qu'il est intelligent qu'il a des mains.",q:"'La main semble être non pas un outil, mais plusieurs'"},
{n:"Bergson",w:"L'Évolution créatrice, 1907 (TEXTE 8)",i:"Homo faber : l'intelligence est d'abord faculté de fabriquer. Notre vie sociale gravite autour des outils.",q:"'L'intelligence est la faculté de fabriquer des objets artificiels, en particulier des outils à faire des outils'"},
{n:"Descartes",w:"Discours de la méthode, 1637 (TEXTE 9)",i:"'Maîtres et possesseurs de la nature'. La physique pratique pour améliorer nos conditions de vie.",q:"'Nous rendre comme maîtres et possesseurs de la nature'"},
{n:"Simondon",w:"Du Mode d'existence des objets techniques, 1958 (TEXTES 11-15)",i:"La méconnaissance de la machine = principale cause d'aliénation. L'homme comme 'organisateur permanent' (chef d'orchestre). Machine ouverte (haute technicité) vs automatique (bas degré).",q:"'La plus forte cause d'aliénation réside dans la méconnaissance de la machine'"},
{n:"Jonas",w:"Le Principe responsabilité, 1990 (TEXTE 5)",i:"Loi de Gabor : tout ce qui est possible sera réalisé. Heuristique de la peur. Encadrement éthique de la technique.",q:"'Le Prométhée définitivement déchaîné réclame une éthique'"},
{n:"Ellul",w:"Le Système technicien, 1977",i:"La technique est notre milieu naturel actuel. Système autonome qui conditionne toute la société.",q:"La technique comme milieu total"},
{n:"Simone Weil",w:"L'Enracinement, 1943 (TEXTE 10)",i:"Devoir moral de l'ingénieur envers les travailleurs. La technique doit servir l'homme, pas le capital.",q:"'Poser en termes techniques les problèmes du bien-être moral des ouvriers'"},
],
textes:[
{n:"TEXTE 7 — Aristote",t:"La main comme outil polymorphe : griffe, serre, corne, lance. L'homme peut acquérir toutes les techniques."},
{n:"TEXTE 8 — Bergson, Homo faber",t:"L'invention mécanique est la démarche essentielle de l'intelligence. La machine à vapeur définira notre âge."},
{n:"TEXTE 9 — Descartes",t:"Maîtres et possesseurs de la nature. La santé = 'premier bien et fondement de tous les autres biens'."},
{n:"TEXTE 10 — Simone Weil",t:"Les ingénieurs ne pensent qu'aux bénéfices et à la production, jamais aux ouvriers. Devoir d'intégrer le bien-être moral."},
{n:"TEXTES 11-15 — Simondon",t:"11: culture ignore réalité humaine de la technique. 12: aliénation de l'utilisateur ignorant. 13: puissance de l'homme habile. 14: machine automatique vs ouverte. 15: l'homme comme organisateur permanent."},
{n:"TEXTE 5 — Jonas",t:"Heuristique de la peur. Loi de Gabor : tout ce qui est possible sera exhaustivement tenté."},
],
axes:[
{n:"Axe 1",t:"La technique libère et prolonge la puissance humaine",pb:"La technique est-elle l'expression de la liberté humaine ?",
sps:[
{l:"A",c:"La technique prolonge les capacités naturelles. Aristote : la main est 'outil à faire des outils'. Bergson : l'homo faber précède l'homo sapiens.",r:"TEXTES 7 et 8"},
{l:"B",c:"Descartes : la maîtrise de la nature améliore nos conditions de vie. La médecine, l'agriculture, les transports libèrent des contraintes naturelles.",r:"TEXTE 9"},
{l:"C",c:"Simondon (TEXTE 13) : l'homme habile entretient une 'relation de causalité récurrente' avec la matière. La technique au service de la créativité.",r:"TEXTE 13"},
]},
{n:"Axe 2",t:"La technique aliène et échappe à la maîtrise",pb:"L'homme maîtrise-t-il encore la technique ?",
sps:[
{l:"A",c:"Ellul : la technique est notre milieu naturel actuel. Elle n'est plus un outil mais un système autonome. La loi de Gabor : tout ce qui est possible sera réalisé.",r:"Ellul ; Jonas, cours p.2"},
{l:"B",c:"Simondon (TEXTE 12) : aliénation de l'utilisateur ignorant. L'homme connaît ce qui entre et sort de la machine mais pas ce qui s'y passe.",r:"TEXTE 12"},
{l:"C",c:"Jonas : effets irréversibles à l'échelle planétaire (nucléaire, OGM, IA). Nous ne pouvons plus maîtriser le développement technique dans sa logique d'auto-accroissement.",r:"TEXTE 5"},
]},
{n:"Axe 3",t:"La culture technique comme réponse",pb:"Comment vivre avec la technique sans être dominé par elle ?",
sps:[
{l:"A",c:"Simondon (TEXTE 11) : la technophobie vient de la méconnaissance. La culture s'est défendue contre les techniques à tort. Les objets techniques contiennent une réalité humaine.",r:"TEXTE 11"},
{l:"B",c:"L'homme doit devenir 'organisateur permanent' des machines (TEXTE 15), comme chef d'orchestre. Non les surveiller mais les coordonner.",r:"TEXTE 15"},
{l:"C",c:"Jonas + Weil convergent : encadrement éthique et légal. Devoir de l'ingénieur (Weil), principe de précaution (Jonas).",r:"TEXTE 10 + TEXTE 5"},
]},
],
exemples:[
{tag:"Contemporain",tit:"Intelligence artificielle générative",body:"L'IA illustre la loi de Gabor : ce qui est techniquement possible (générer des images, des textes, des voix) sera réalisé, sans qu'aucun acteur ne décide globalement. Pose les questions de Simondon (aliénation de l'utilisateur ignorant) et de Jonas (effets irréversibles).",lien:"→ Loi Gabor, Simondon TEXTE 12, Jonas"},
{tag:"Mythe — Cours",tit:"Mythe de Prométhée (TEXTE 6)",body:"Prométhée vole le feu à Héphaïstos pour compenser la nudité naturelle de l'homme. Mais son châtiment (enchaîné, foie dévoré) symbolise le danger de la démesure technique (hybris).",lien:"→ Nature, devoir, Jonas"},
{tag:"Philosophie",tit:"Greffes d'organes — conférence cours",body:"Les greffes illustrent la puissance et les limites éthiques de la technique médicale. Greffe du cœur : symbolique de l'organe. Greffe de visage : limites de la transformation du corps humain. Lien avec la notion de nature humaine.",lien:"→ Corps, conscience, nature, devoir"},
{tag:"Histoire",tit:"Machine à vapeur — révolution industrielle",body:"Illustre Bergson : la machine à vapeur 'tracera la route du progrès'. Elle modifie les habitudes sociales, les conditions de travail, la structure des villes. L'homo faber transforme son propre milieu.",lien:"→ TEXTE 8 (Bergson), Marx, travail"},
],
liens:["Nature","Travail","Liberté","Devoir","État"],
diss:["La technique est-elle libératrice ?","L'homme maîtrise-t-il la technique ?","La technique peut-elle résoudre tous les problèmes ?","Faut-il craindre la technique ?","La culture technique est-elle possible ?"]
},

etat:{c:"#5F5E5A",l:"État",s:"L'État est-il nécessaire ?",
def:"L'<span class='kw'>État</span> détient le monopole de la violence légitime (Weber) sur un territoire. Il naît d'un contrat social ou d'un rapport de force. Question centrale : l'État est-il garant de la liberté ou menace contre elle ?",
auteurs:[
{n:"Hobbes",w:"Léviathan, 1651",i:"Sans État : état de nature = guerre de tous contre tous. Le Léviathan garantit la paix par sa puissance absolue.",q:"'L'homme est un loup pour l'homme'"},
{n:"Locke",w:"Traité du gouvernement civil, 1690",i:"L'état de nature est pacifique mais fragile. L'État protège les droits naturels. Contrat révocable.",q:"L'État = protecteur des droits naturels, révocable"},
{n:"Rousseau",w:"Du Contrat social, 1762",i:"Volonté générale : souveraineté du peuple. Le contrat transforme la liberté naturelle en liberté civile.",q:"'L'obéissance à la loi qu'on s'est prescrite est liberté'"},
{n:"Hegel",w:"Principes de la philosophie du droit, 1820",i:"L'État est la réalité effective de la liberté objective. Famille → société civile → État.",q:"'L'État est la réalité effective de la liberté concrète'"},
{n:"Marx",w:"L'Idéologie allemande / Le Manifeste, 1848",i:"L'État = instrument de la classe dominante. Infrastructure économique → superstructure (État, droit). Objectif : dépérissement de l'État.",q:"'L'État n'est que le comité d'affaires de la bourgeoisie'"},
{n:"Weber",w:"Le Savant et le politique, 1919",i:"L'État = monopole de la violence physique légitime. 3 légitimités : traditionnelle, charismatique, légale-rationnelle.",q:"'L'État revendique le monopole de la violence physique légitime'"},
],
textes:[
{n:"Hobbes — état de nature",t:"Sans loi : pas de justice, ni propriété. 'La force et la ruse sont les deux vertus cardinales.'"},
{n:"Rousseau — contrat social",t:"Aliéner la liberté naturelle pour gagner la liberté civile. Loi = volonté générale ≠ volonté de tous."},
{n:"Marx — infrastructure/superstructure",t:"Infrastructure économique détermine la superstructure. L'État bourgeois protège les intérêts du capital."},
{n:"TEXTE 6 — Platon",t:"Zeus donne justice et pudeur à tous pour que la cité soit possible. L'État repose sur une éducation morale des citoyens."},
],
axes:[
{n:"Axe 1",t:"L'État comme nécessité",pb:"Peut-on se passer de l'État ?",
sps:[
{l:"A",c:"Hobbes : sans État, guerre de tous contre tous. Vie 'solitaire, misérable, bestiale et brève'. L'État est la condition de toute vie sociale stable.",r:"Hobbes, Léviathan XIII"},
{l:"B",c:"Locke : l'état de nature est pacifique, gouverné par la loi naturelle. L'État n'est pas nécessaire pour éviter la guerre, mais pour trancher les conflits.",r:"Locke, Traité du gouvernement civil"},
{l:"C",c:"Anarchisme (Proudhon) : l'État est lui-même source de violence. Les associations libres peuvent organiser la vie collective. Mais cette thèse reste très exigeante.",r:"Proudhon : 'l'anarchie c'est l'ordre sans le pouvoir'"},
]},
{n:"Axe 2",t:"L'État et la liberté",pb:"L'État garantit-il la liberté ou la menace-t-il ?",
sps:[
{l:"A",c:"L'État protège la liberté (Locke, Rousseau) : sans État, la liberté du plus faible est nulle. La liberté civile est supérieure à la liberté naturelle.",r:"Locke, Rousseau Du Contrat social"},
{l:"B",c:"Mais l'État peut devenir tyrannie. Tocqueville : 'tyrannie de la majorité', despotisme doux. L'État providence peut conduire à une 'douce servitude'.",r:"Tocqueville, De la démocratie en Amérique"},
{l:"C",c:"Marx : l'État bourgeois est structurellement oppresseur. Il protège la liberté formelle mais maintient l'inégalité réelle.",r:"Marx, Le Capital ; La Question juive"},
]},
{n:"Axe 3",t:"La légitimité de l'État",pb:"Pourquoi obéit-on à l'État ?",
sps:[
{l:"A",c:"Consentement (Locke, Rousseau) : l'État est légitime si les citoyens y ont consenti. La démocratie = forme la plus légitime.",r:"Rousseau, Du Contrat social III"},
{l:"B",c:"Weber : 3 types de légitimité — traditionnelle, charismatique, légale-rationnelle. L'État moderne repose sur la loi, non la personne du gouvernant.",r:"Weber, Le Savant et le politique"},
{l:"C",c:"Rawls : l'État est légitime s'il respecte les principes de justice que les citoyens auraient choisis derrière le voile d'ignorance.",r:"Rawls, Théorie de la justice"},
]},
],
exemples:[
{tag:"Histoire",tit:"La Révolution française (1789)",body:"Passage de la légitimité traditionnelle (roi de droit divin) à la légitimité légale-rationnelle (souveraineté nationale). La Déclaration des droits = idée lockéenne que l'État protège les droits naturels.",lien:"→ Locke, Rousseau, légitimité"},
{tag:"Philosophie",tit:"Le Léviathan de Hobbes",body:"La couverture (1651) : un souverain géant dont le corps est fait de milliers de sujets. L'État = la somme des volontés individuelles qui lui ont cédé leur force en échange de la sécurité.",lien:"→ Hobbes, contrat social"},
{tag:"Actualité",tit:"États faillis (Somalie, Libye post-2011)",body:"Quand l'État s'effondre, c'est l'état de nature (guerre civile, milices, insécurité totale) qui revient. Preuve a contrario de la nécessité de l'État.",lien:"→ Hobbes, Weber"},
{tag:"Contemporain",tit:"Évasion fiscale et justice sociale",body:"Le débat sur l'évasion fiscale des multinationales illustre Marx : l'État protège les intérêts du capital. Rawls demanderait si cette situation profite aux plus défavorisés.",lien:"→ Marx, Rawls"},
],
liens:["Justice","Liberté","Travail","Devoir","Nature"],
diss:["Peut-on se passer de l'État ?","L'État est-il garant de la liberté ?","D'où vient la légitimité de l'État ?","Obéir à l'État, est-ce renoncer à sa liberté ?","L'État peut-il être injuste ?"]
},

liberte:{c:"#D4537E",l:"Liberté",s:"Sommes-nous vraiment libres ?",
def:"La <span class='kw'>liberté</span> peut être négative (absence de contraintes), positive (capacité d'agir selon sa raison) ou politique (participation à la loi commune). Enjeu : compatible avec le déterminisme ? Avec la morale ? Avec l'État ? Est-elle donnée ou conquise ?",
auteurs:[
{n:"Kant",w:"Fondements de la métaphysique des mœurs, 1785",i:"Liberté = autonomie. L'hétéronomie n'est pas la vraie liberté. L'homme libre dans l'ordre noumènal (raison), déterminé dans le phénoménal (nature).",q:"'L'autonomie de la volonté est le principe suprême de la moralité'"},
{n:"Sartre",w:"L'Être et le Néant, 1943",i:"Condamné à être libre. L'existence précède l'essence. Mauvaise foi = se prendre pour une chose déterminée.",q:"'Je suis condamné à être libre'"},
{n:"Spinoza",w:"Éthique, 1677",i:"La liberté n'est pas le libre arbitre mais la nécessité comprise. Agir librement = agir selon sa propre nature rationnelle.",q:"'Est libre la chose qui existe par la seule nécessité de sa nature'"},
{n:"Rousseau",w:"Du Contrat social, 1762",i:"Liberté naturelle vs liberté civile. 'L'obéissance à la loi qu'on s'est prescrite est liberté.' La liberté civile est supérieure.",q:"'L'obéissance à la loi qu'on s'est prescrite est liberté'"},
{n:"Mill",w:"De la liberté, 1859",i:"Principe de non-nuisance. Liberté d'expression absolue. Critique du despotisme de la majorité.",q:"'Le seul but légitime pour restreindre la liberté, c'est la protection d'autrui'"},
{n:"Freud",w:"Malaise dans la civilisation, 1930",i:"La liberté est limitée par les pulsions inconscientes. Le sentiment de liberté est en partie illusoire.",q:"L'inconscient limite notre sentiment de liberté"},
],
textes:[
{n:"Kant — autonomie vs hétéronomie",t:"Hétéronomie : obéir à ses désirs, au bonheur, à l'autorité. Autonomie : obéir à la loi que la raison se donne. Seule l'autonomie est vraie liberté morale."},
{n:"Sartre — mauvaise foi",t:"Le garçon de café joue à être garçon de café : en adoptant parfaitement son rôle, il nie sa liberté. La mauvaise foi = fuite de l'angoisse de la liberté."},
{n:"Rousseau — liberté civile et loi",t:"Aliéner la liberté naturelle pour gagner la liberté civile et morale. La loi juste = celle qu'on s'est donnée soi-même."},
{n:"Spinoza — nécessité et liberté",t:"Agir librement ≠ agir sans cause. Agir librement = agir selon sa nature propre (raison), non sous contrainte externe."},
],
axes:[
{n:"Axe 1",t:"La liberté et le déterminisme",pb:"Le déterminisme est-il compatible avec la liberté ?",
sps:[
{l:"A",c:"Déterminisme radical : tout est causé (Spinoza, neurosciences, Freud). Le libre arbitre est une illusion due à notre ignorance des causes.",r:"Spinoza, Éthique II ; Freud ; Libet"},
{l:"B",c:"Liberté comme nécessité comprise (Spinoza) : la vraie liberté = agir selon sa propre nature rationnelle. Le sage est libre non parce qu'il échappe aux causes mais parce qu'il les comprend.",r:"Spinoza, Éthique IV-V"},
{l:"C",c:"Sartre : même en situation, nous avons toujours une liberté de conscience irréductible. La mauvaise foi = nier cette liberté.",r:"Sartre, L'Être et le Néant"},
]},
{n:"Axe 2",t:"Liberté et morale : autonomie vs contrainte",pb:"Obéir à une règle, est-ce être libre ?",
sps:[
{l:"A",c:"Kant : la vraie liberté = autonomie morale. Obéir à la loi morale que la raison se donne = être vraiment libre. Obéir à ses désirs = hétéronomie = esclavage.",r:"Kant, Fondements"},
{l:"B",c:"Rousseau : la liberté civile > liberté naturelle. Obéir à la loi commune qu'on s'est donnée = s'obéir à soi-même.",r:"Rousseau, Du Contrat social"},
{l:"C",c:"Mill : la liberté individuelle doit être protégée contre l'État et la société. Seule limite : nuire à autrui.",r:"Mill, De la liberté"},
]},
{n:"Axe 3",t:"La liberté est-elle possible dans la société ?",pb:"La vie sociale est-elle un obstacle à la liberté ?",
sps:[
{l:"A",c:"La société comme obstacle : Rousseau (l'homme est né libre mais partout il est dans les fers). La propriété et les inégalités enchaînent l'homme.",r:"Rousseau, Discours sur l'inégalité"},
{l:"B",c:"La société comme condition : Hegel, Aristote. L'homme est un animal politique ; hors de la cité, il serait 'dieu ou bête'. La liberté réelle se réalise dans les institutions.",r:"Aristote, Politique ; Hegel"},
{l:"C",c:"Synthèse : la liberté civile n'est pas la destruction de la liberté naturelle mais son dépassement. On perd la liberté brute mais on gagne une liberté plus haute, garantie et raisonnée.",r:"Rousseau, Du Contrat social I"},
]},
],
exemples:[
{tag:"Philosophie",tit:"Le garçon de café de Sartre",body:"Sartre décrit un garçon de café qui joue parfaitement son rôle : mouvements trop précis, trop vifs. Il est de mauvaise foi car il se traite comme une chose (être-en-soi) pour fuir l'angoisse de sa liberté.",lien:"→ Sartre (mauvaise foi), conscience"},
{tag:"Cinéma",tit:"Matrix (1999)",body:"Les humains vivent dans une simulation en croyant être libres. Néo découvre qu'il est déterminé par un programme. La pilule rouge = choix de la vérité et de la vraie liberté.",lien:"→ Spinoza (illusion libre arbitre), Sartre"},
{tag:"Droit",tit:"DDHC 1789",body:"'La liberté consiste à pouvoir faire tout ce qui ne nuit pas à autrui.' Reprise du principe de non-nuisance de Locke et Mill.",lien:"→ Mill, Locke, État, justice"},
{tag:"Histoire",tit:"L'esclavage antique et moderne",body:"L'esclave : exemple limite de la privation de liberté. Pour Arendt, l'esclavage était légitimé car le labor abaissait l'homme au rang d'animal. Pour Marx, le salariat est une forme moderne d'esclavage.",lien:"→ Arendt, Marx, Hegel (maître/esclave)"},
],

}

const KEYS=Object.keys(D);
let cur=KEYS[0], curTab='auteurs';
const TABS=['auteurs','textes','axes','exemples','diss'];
const TLABELS={'auteurs':'Auteurs','textes':'Textes','axes':'Axes & sous-parties','exemples':'Exemples','diss':'Dissertations'};

function renderSB(){
  const sb=document.getElementById('sb');
  sb.innerHTML='<div class="stitle">Notions</div>';
  KEYS.forEach(k=>{
    const el=document.createElement('div');
    el.className='nb'+(k===cur?' active':'');
    el.innerHTML=`<span class="dot" style="background:${D[k].c}"></span>${D[k].l}`;
    el.onclick=()=>{cur=k;curTab='auteurs';renderSB();renderContent()};
    sb.appendChild(el);
  });
}

function tab(id){curTab=id;renderContent()}

function renderContent(){
  const n=D[cur], c=n.c;
  let html=`
<div class="notion-head">
  <div class="nbadge" style="background:${c}"></div>
  <div><div class="ntitle">${n.l}</div><div class="nsub">${n.s}</div></div>
</div>
<div class="def-box">${n.def}</div>
<div class="tabs">${TABS.map(t=>`<div class="tab${curTab===t?' active':''}" onclick="tab('${t}')">${TLABELS[t]}</div>`).join('')}</div>`;

  if(curTab==='auteurs'){
    html+=`<div class="slabel">Auteurs et idées clés</div><div class="ag">`;
    n.auteurs.forEach(a=>{
      const isNew=a.isNew;
      html+=`<div class="ac${isNew?' anew':''}"><div class="an" style="color:${c}">${a.n}${isNew?`<span class="new-badge">NOUVEAU</span>`:''}</div><div class="aw">${a.w}</div><div class="ai">${a.i}</div>${a.q?`<div class="aq">${a.q}</div>`:''}</div>`;
    });
    html+=`</div>`;
  }
  else if(curTab==='textes'){
    html+=`<div class="slabel">Textes étudiés en cours</div><div class="tbox">`;
    n.textes.forEach(t=>{
      html+=`<div class="ti2"${t.isNew?' style="background:var(--color-background-info);border-radius:4px;padding:6px 8px;"':''}><span class="tinum">${t.n}${t.isNew?` <span class="new-badge">NOUVEAU</span>`:''}</span><span class="titxt">${t.t}</span></div>`;
    });
    html+=`</div>`;
  }
  else if(curTab==='axes'){
    html+=`<div class="slabel">Axes de dissertation avec sous-parties</div>`;
    n.axes.forEach(a=>{
      html+=`<div class="axe-card"><div class="axe-head"><span class="axe-num">${a.n}</span><span class="axe-title">${a.t}</span></div><div class="axe-pb">Problématique : ${a.pb}</div><div class="sp">`;
      a.sps.forEach(sp=>{
        html+=`<div class="sp-item"><span class="sp-letter">${sp.l}.</span><span class="sp-content">${sp.c}${sp.isNew?` <span class="new-badge">NOUVEAU</span>`:''}<span class="sp-ref">${sp.r}</span></span></div>`;
      });
      html+=`</div></div>`;
    });
  }
  else if(curTab==='exemples'){
    const tagColors={'Littérature':'#534AB7','Science':'#1D9E75','Société':'#5F5E5A','Écologie':'#1D9E75','Anthropologie':'#3B6D11','Mythe — Cours':'#EF9F27','Psychologie':'#534AB7','Philosophie':'#185FA5','Cinéma':'#D4537E','Histoire':'#993556','Contemporain':'#185FA5','Actualité':'#D85A30','Droit':'#5F5E5A','Cours — texte':'#EF9F27','Cours — dissertation':'#EF9F27','Cours — corpus':'#EF9F27','Cours — exercice':'#EF9F27','Biologie':'#1D9E75'};
    html+=`<div class="slabel">Exemples concrets mobilisables</div>`;
    n.exemples.forEach(e=>{
      const tc=tagColors[e.tag]||c;
      html+=`<div class="ex-card${e.isNew?' anew':''}"><div class="ex-head"><span class="ex-tag" style="background:${tc}18;color:${tc};border:0.5px solid ${tc}40">${e.tag}</span><span class="ex-title">${e.tit}${e.isNew?` <span class="new-badge">NOUVEAU</span>`:''}</span></div><div class="ex-body">${e.body}</div><div class="ex-lien">${e.lien}</div></div>`;
    });
  }
  else if(curTab==='diss'){
    html+=`<div class="slabel">Liens avec d'autres notions</div><div class="liens-row">${(n.liens||[]).map(l=>{const k=KEYS.find(k=>D[k].l===l);return k?`<div class="lpill" style="border-color:${D[k].c};color:${D[k].c}" onclick="cur='${k}';curTab='auteurs';renderSB();renderContent()">${l}</div>`:''}).join('')}</div>`;
    html+=`<div class="slabel">Questions de dissertation typiques</div><div>`;
    n.diss.forEach(q=>{html+=`<div class="dq">${q}</div>`});
    html+=`</div>`;
  }
  document.getElementById('main').innerHTML=html;
}

renderSB();renderContent();
</script>
</body>
</html>
